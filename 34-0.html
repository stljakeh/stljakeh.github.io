<!DOCTYPE html>

<head>

<title>34-0 - St. Louis Sports</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ===== LOADING ===== */

}
.loading .lds-ring { display: inline-block; width: 40px; height: 40px; margin-bottom: 16px; }

<nav>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <span class="current">34-0</span>
  </div>
  <div style="font-size:0.7rem;color:#444;letter-spacing:1px;text-transform:uppercase;">Draft &middot; Sim &middot; Conquer</div>
</nav>

<div id="app"></div>
<div id="modal" class="modal-overlay"></div>

<script>
// ========== CONFIGURATION ==========
const FORMATIONS = {
  '4-3-3': { gk: 1, def: 4, mid: 3, fwd: 3, label: '4-3-3', desc: '1 GK · 4 DEF · 3 MID · 3 FWD' },
  '4-4-2': { gk: 1, def: 4, mid: 4, fwd: 2, label: '4-4-2', desc: '1 GK · 4 DEF · 4 MID · 2 FWD' },
  '3-5-2': { gk: 1, def: 3, mid: 5, fwd: 2, label: '3-5-2', desc: '1 GK · 3 DEF · 5 MID · 2 FWD' },
  '3-4-3': { gk: 1, def: 3, mid: 4, fwd: 3, label: '3-4-3', desc: '1 GK · 3 DEF · 4 MID · 3 FWD' },
  '5-3-2': { gk: 1, def: 5, mid: 3, fwd: 2, label: '5-3-2', desc: '1 GK · 5 DEF · 3 MID · 2 FWD' },
};
const POS_ORDER = { G: 0, D: 1, M: 2, F: 3 };
const MIN_SEASON = 1996;
const MAX_SEASON = 2026;
const TOTAL_GAMES = 34;
const DRAW_RATE = 0.18;

// ========== MLS TEAMS (filled at runtime) ==========
let allMlsTeams = [];

// ========== STATE ==========
const state = {
  phase: 'splash',
  formation: null,
  slots: [],
  draftTeams: [],
  picks: [],
  teamRating: 0,
  games: [],
  currentGame: 0,
  record: { w: 0, d: 0, l: 0 },
  pickCount: { G: 0, D: 0, M: 0, F: 0 },
};

function getSlotDefs() {
  if (!state.formation) return [];
  const f = state.formation;
  return [
    ...Array(f.gk).fill('G'),
    ...Array(f.def).fill('D'),
    ...Array(f.mid).fill('M'),
    ...Array(f.fwd).fill('F'),
  ];
}

function resetState() {
  state.formation = null;
  state.slots = [];
  state.draftTeams = [];
  state.picks = [];
  state.teamRating = 0;
  state.games = [];
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.pickCount = { G: 0, D: 0, M: 0, F: 0 };
}

// ========== API ==========
async function fetchAllTeams() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams?limit=50';
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Failed to fetch teams');
  const data = await resp.json();
  const teams = data.sports[0].leagues[0].teams.map(t => ({
    id: t.team.id,
    name: t.team.displayName,
    abbr: t.team.abbreviation,
    location: t.team.location || t.team.displayName,
  }));
  return teams;
}

async function fetchRoster(teamId, season) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/${teamId}/roster?season=${season}`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (!data.athletes || data.athletes.length === 0) return null;
  return data.athletes;
}

// ========== PLAYER RATINGS ==========
function extractStat(athlete, name) {
  const stats = athlete.statistics;
  if (!stats) return 0;
  for (const sk in stats) {
    const splits = stats[sk];
    if (!splits || !splits.categories) continue;
    for (const cat of splits.categories) {
      if (!cat.stats) continue;
      for (const s of cat.stats) {
        if (s.name === name && s.value != null) {
          return s.value;
        }
      }
    }
  }
  return 0;
}

function computeRating(athlete) {
  const pos = (athlete.position && athlete.position.abbreviation) || 'M';
  const apps = extractStat(athlete, 'appearances');
  const goals = extractStat(athlete, 'totalGoals');
  const assists = extractStat(athlete, 'goalAssists');
  let base = 40 + apps * 0.5;
  if (pos === 'G') {
    base += 50;
    const saves = extractStat(athlete, 'saves');
    base += saves * 0.3;
  } else if (pos === 'D') {
    base += 5 + goals * 3 + apps * 0.2;
  } else if (pos === 'M') {
    base += 5 + (goals + assists) * 2 + apps * 0.2;
  } else if (pos === 'F') {
    base += 5 + goals * 4 + assists * 1.5 + apps * 0.1;
  }
  const noise = Math.random() * 6 - 3;
  return Math.round(Math.max(40, Math.min(99, base + noise)));
}

// ========== DRAFT LOGIC ==========
async function generateDraftTeams() {
  const usedTeams = new Set();
  const usedCombos = new Set();
  const result = [];
  let attempts = 0;
  const maxAttempts = 500;

  while (result.length < 11 && attempts < maxAttempts) {
    attempts++;
    let teamIdx = Math.floor(Math.random() * allMlsTeams.length);
    let team = allMlsTeams[teamIdx];
    let year = MIN_SEASON + Math.floor(Math.random() * (MAX_SEASON - MIN_SEASON + 1));
    const comboKey = `${team.id}-${year}`;

    if (usedCombos.has(comboKey)) continue;
    if (usedTeams.has(team.id)) continue;

    usedCombos.add(comboKey);
    result.push({ teamId: team.id, teamName: team.name, teamAbbr: team.abbr, year, roster: null, loaded: false });
  }
  return result;
}

async function loadDraftRosters() {
  const promises = state.draftTeams.map(async (dt, idx) => {
    const roster = await fetchRoster(dt.teamId, dt.year);
    if (roster && roster.length > 0) {
      const enriched = roster.map(a => ({
        ...a,
        rating: computeRating(a),
        pos: (a.position && a.position.abbreviation) || 'M',
      }));
      enriched.sort((a, b) => {
        const pa = POS_ORDER[a.pos] || 99;
        const pb = POS_ORDER[b.pos] || 99;
        if (pa !== pb) return pa - pb;
        return (b.rating || 0) - (a.rating || 0);
      });
      state.draftTeams[idx].roster = enriched;
      state.draftTeams[idx].loaded = true;
    } else {
      state.draftTeams[idx] = null;
    }
  });
  await Promise.all(promises);
  state.draftTeams = state.draftTeams.filter(dt => dt !== null);
  while (state.draftTeams.length < 11) {
    const fallback = await generateDraftFallback();
    if (fallback) state.draftTeams.push(fallback);
    else break;
  }
}

async function generateDraftFallback() {
  const usedIds = new Set(state.draftTeams.map(dt => dt.teamId));
  const usedCombos = new Set(state.draftTeams.map(dt => `${dt.teamId}-${dt.year}`));
  for (let i = 0; i < 100; i++) {
    const team = allMlsTeams[Math.floor(Math.random() * allMlsTeams.length)];
    if (usedIds.has(team.id)) continue;
    const year = MIN_SEASON + Math.floor(Math.random() * (MAX_SEASON - MIN_SEASON + 1));
    const comboKey = `${team.id}-${year}`;
    if (usedCombos.has(comboKey)) continue;
    const roster = await fetchRoster(team.id, year);
    if (roster && roster.length > 0) {
      const enriched = roster.map(a => ({
        ...a,
        rating: computeRating(a),
        pos: (a.position && a.position.abbreviation) || 'M',
      }));
      enriched.sort((a, b) => {
        const pa = POS_ORDER[a.pos] || 99;
        const pb = POS_ORDER[b.pos] || 99;
        if (pa !== pb) return pa - pb;
        return (b.rating || 0) - (a.rating || 0);
      });
      return { teamId: team.id, teamName: team.name, teamAbbr: team.abbr, year, roster: enriched, loaded: true };
    }
  }
  return null;
}

function validatePicks() {
  const slots = getSlotDefs();
  const counts = {};
  for (const p of state.picks) {
    if (!p) continue;
    counts[p.pos] = (counts[p.pos] || 0) + 1;
  }
  const needed = { G: state.formation.gk, D: state.formation.def, M: state.formation.mid, F: state.formation.fwd };
  const missing = {};
  let valid = true;
  for (const pos of ['G', 'D', 'M', 'F']) {
    const have = counts[pos] || 0;
    const need = needed[pos];
    if (have < need) {
      missing[pos] = need - have;
      valid = false;
    }
  }
  state.pickCount = { G: counts.G || 0, D: counts.D || 0, M: counts.M || 0, F: counts.F || 0 };
  return { valid, missing };
}

function computeTeamRating() {
  const ratings = state.picks.filter(p => p).map(p => p.rating);
  if (ratings.length === 0) return 0;
  return Math.round(ratings.reduce((a, b) => a + b, 0) / ratings.length);
}

// ========== SEASON LOGIC ==========
function generateOpponents() {
  const opponents = [];
  for (let i = 0; i < TOTAL_GAMES; i++) {
    const team = allMlsTeams[Math.floor(Math.random() * allMlsTeams.length)];
    const rating = Math.round(45 + Math.random() * 40);
    opponents.push({ team, rating, result: null, score: null });
  }
  return opponents;
}

function simulateGame(userRating, oppRating) {
  const winProb = userRating / (userRating + oppRating);
  const adjWinProb = winProb * (1 - DRAW_RATE);
  const adjDrawProb = DRAW_RATE;
  const r = Math.random();
  if (r < adjWinProb) return 'W';
  if (r < adjWinProb + adjDrawProb) return 'D';
  return 'L';
}

function generateScore(result, userRating, oppRating) {
  const diff = userRating - oppRating;
  const base = Math.max(0, Math.min(4, Math.round(1 + (diff / 30) + (Math.random() - 0.3))));
  if (result === 'W') {
    const ourGoals = Math.max(1, base + 1);
    const theirGoals = Math.max(0, Math.min(ourGoals - 1, Math.round(base * 0.4 + Math.random())));
    return { us: ourGoals, them: theirGoals };
  } else if (result === 'D') {
    const goals = Math.round(Math.random() * 2);
    return { us: goals, them: goals };
  } else {
    const theirGoals = Math.max(1, base + 2);
    const ourGoals = Math.max(0, Math.min(theirGoals - 1, Math.round(base * 0.3 + Math.random() - 0.3)));
    return { us: ourGoals, them: theirGoals };
  }
}

function advanceGame() {
  const idx = state.currentGame;
  if (idx >= TOTAL_GAMES) return;
  const game = state.games[idx];
  const outcome = simulateGame(state.teamRating, game.rating);
  const score = generateScore(outcome, state.teamRating, game.rating);
  game.result = outcome;
  game.score = score;
  state.record[outcome === 'W' ? 'w' : outcome === 'D' ? 'd' : 'l']++;
  state.currentGame++;
  return { outcome, score, game };
}

function isSeasonComplete() {
  return state.currentGame >= TOTAL_GAMES;
}

function isPerfect() {
  return state.record.w === TOTAL_GAMES && state.record.d === 0 && state.record.l === 0;
}

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  switch (state.phase) {
    case 'splash': renderSplash(app); break;
    case 'formation': renderFormation(app); break;
    case 'draft': renderDraft(app); break;
    case 'modifyDraft': renderDraft(app, true); break;
    case 'season': renderSeason(app); break;
    case 'result': renderResult(app); break;
  }
}

function renderSplash(app) {
  app.innerHTML = `
    <div class="splash">
      <h1>34-0</h1>
      <p class="tagline">Draft. Simulate. Conquer.</p>
      <p class="goal">Draft a team of MLS players from across history and try to go a perfect 34-0-0. You pick 11 players, one from each randomly rolled team and season. Then watch your squad battle through 34 games — can you finish flawless?</p>
      <button class="btn btn-primary" onclick="startDraft()">Start Draft</button>
    </div>
  `;
}

async function startDraft() {
  state.phase = 'formation';
  render();
}

function renderFormation(app) {
  const cards = Object.entries(FORMATIONS).map(([key, f]) => `
    <div class="formation-card" onclick="selectFormation('${key}')">
      <div class="f-name">${f.label}</div>
      <div class="f-detail">${f.desc}</div>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="page-title">
      <h1>34-0</h1>
    </div>
    <p class="subtitle">Choose your formation</p>
    <div class="formation-grid">${cards}</div>
  `;
}

async function selectFormation(key) {
  state.formation = FORMATIONS[key];
  state.slots = getSlotDefs();

  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="lds-ring" style="position:relative;display:block;"><div></div></div>Assembling draft pool...</div>`;

  if (allMlsTeams.length === 0) {
    try {
      allMlsTeams = await fetchAllTeams();
    } catch (e) {
      app.innerHTML = `<div style="text-align:center;padding:60px;color:#f44336;">Failed to load teams. <button class="btn btn-primary" onclick="selectFormation('${key}')">Retry</button></div>`;
      return;
    }
  }

  state.draftTeams = await generateDraftTeams();
  await loadDraftRosters();

  if (state.draftTeams.length < 11) {
    app.innerHTML = `<div style="text-align:center;padding:60px;color:#f44336;">Couldn't build a valid draft pool. <button class="btn btn-primary" onclick="selectFormation('${key}')">Retry</button></div>`;
    return;
  }

  state.picks = [];
  state.phase = 'draft';
  render();
}

function renderDraft(app, isModify) {
  const idx = isModify ? state.modifyIndex : state.picks.length;
  const total = 11;
  const currentTeam = state.draftTeams[idx];
  if (!currentTeam) {
    state.phase = 'result';
    render();
    return;
  }

  const slotDefs = getSlotDefs();
  const posLabels = { G: 'GK', D: 'DEF', M: 'MID', F: 'FWD' };
  const posColors = { G: 'gk', D: 'd', M: 'm', F: 'f' };

  const slotHtml = slotDefs.map((pos, i) => {
    const filled = state.picks[i] && !isModify;
    const p = state.picks[i];
    return `<div class="slot-dot ${posColors[pos].toLowerCase()} ${filled ? 'filled' : ''}" title="${posLabels[pos]}${filled ? ': ' + p.fullName : ''}">${pos}</div>`;
  }).join('');

  const playersByPos = {};
  for (const player of currentTeam.roster) {
    if (!playersByPos[player.pos]) playersByPos[player.pos] = [];
    playersByPos[player.pos].push(player);
  }

  const playerHtml = ['G', 'D', 'M', 'F'].filter(p => playersByPos[p]).map(pos => `
    <div class="position-header">${posLabels[pos]}</div>
    ${playersByPos[pos].map(p => `
      <div class="player-card" onclick="pickPlayer('${idx}','${p.id}')">
        <div>
          <span class="p-name">${p.fullName}</span>
          <span class="p-position">${p.pos}</span>
        </div>
        <div class="p-rating">${p.rating}</div>
      </div>
    `).join('')}
  `).join('');

  const picksHtml = state.picks.map((p, i) => {
    if (!p) return '';
    return `<div class="pick-badge" onclick="rePick(${i})">
      <span class="pp-pos">${posLabels[p.pos]}</span>
      <span class="pp-name">${p.fullName}</span>
      <span class="pp-rating">${p.rating}</span>
    </div>`;
  }).join('');

  const allPicked = state.picks.filter(Boolean).length >= 11;
  const nextBtn = `
    <div style="text-align:center;margin-top:20px;">
      ${allPicked ? `<button class="btn btn-primary" onclick="finalizeDraft()">Finalize Team</button>` :
        state.phase === 'modifyDraft' ? `<button class="btn btn-secondary" onclick="backToDraft()">Back to Draft</button>` :
        state.picks.length === idx ? '' :
        `<button class="btn btn-secondary" onclick="skipToEnd()">Skip to Review</button>`}
    </div>
  `;

  app.innerHTML = `
    <div class="page-title">
      <h1>34-0</h1>
    </div>
    <p class="subtitle">${isModify ? 'Re-pick a player' : `Round ${idx + 1} of ${total}`}</p>

    <div class="draft-header">
      <div class="draft-round">${isModify ? 'Modifying pick' : `Pick ${idx + 1} of ${total}`}</div>
      <div class="slot-tracker">${slotHtml}</div>
    </div>

    <div class="team-info-bar">
      <div class="team-badge">${currentTeam.teamAbbr}</div>
      <div class="team-detail">
        <div class="team-name-d">${currentTeam.teamName}</div>
        <div class="team-year">${currentTeam.year} Season · ${currentTeam.roster.length} players available</div>
      </div>
    </div>

    <div class="player-grid">${playerHtml}</div>

    ${picksHtml ? `<div class="picks-list">${picksHtml}</div>` : ''}
    ${nextBtn}
  `;
}

function pickPlayer(teamIdxStr, playerId) {
  const teamIdx = parseInt(teamIdxStr);
  const team = state.draftTeams[teamIdx];
  const player = team.roster.find(p => p.id === playerId);
  if (!player) return;

  const enriched = { ...player, pos: player.pos, teamId: team.teamId, teamName: team.teamName, teamAbbr: team.teamAbbr, year: team.year };

  const existingIdx = state.picks.findIndex(p => p && p.teamId === team.teamId);
  if (existingIdx >= 0) {
    state.picks[existingIdx] = enriched;
  } else {
    state.picks.push(enriched);
  }

  if (state.picks.filter(Boolean).length >= 11) {
    finalizeDraft();
    return;
  }

  state.phase = 'draft';
  render();
}

function rePick(index) {
  state.modifyIndex = index;
  state.phase = 'modifyDraft';
  render();
}

function backToDraft() {
  state.phase = 'draft';
  render();
}

function skipToEnd() {
  finalizeDraft();
}

function finalizeDraft() {
  const { valid, missing } = validatePicks();
  if (!valid) {
    const posLabels = { G: 'GK', D: 'DEF', M: 'MID', F: 'FWD' };
    const missingHtml = Object.entries(missing).map(([pos, count]) =>
      `<span class="missing-dot" style="background:${pos === 'G' ? '#C41E3A' : pos === 'D' ? '#003087' : pos === 'M' ? '#E80A4D' : '#00529B'}">${count}x ${posLabels[pos]}</span>`
    ).join('');
    const app = document.getElementById('app');
    app.innerHTML += `
      <div class="validation-error">
        Invalid formation — missing:<br>
        <div class="missing-list">${missingHtml}</div>
        <div style="margin-top:10px;font-size:0.8rem;">Click any pick above to re-select from that team.</div>
      </div>
    `;
    return;
  }

  state.teamRating = computeTeamRating();
  state.games = generateOpponents();
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.phase = 'season';
  render();
}

function renderSeason(app) {
  const pct = state.currentGame / TOTAL_GAMES * 100;
  const posLabels = { G: 'GK', D: 'DEF', M: 'MID', F: 'FWD' };

  let gamePreview = '';
  let playBtn = '';

  if (!isSeasonComplete()) {
    const game = state.games[state.currentGame];
    const winProb = state.teamRating / (state.teamRating + game.rating);
    gamePreview = `
      <div class="game-preview">
        <div class="game-num">Game ${state.currentGame + 1} of ${TOTAL_GAMES}</div>
        <div class="game-matchup">${state.teamRating} vs ${game.team.abbr} (${game.rating})</div>
        <div class="game-detail">Your team rating: ${state.teamRating} · Opponent rating: ${game.rating}</div>
        <div class="game-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>
      </div>
    `;
    playBtn = `<div style="text-align:center;margin-top:8px;"><button class="btn btn-primary" onclick="playGame()">Play Next Game</button></div>`;
  } else {
    gamePreview = `<div class="game-preview"><div class="game-num">Season Complete!</div></div>`;
    playBtn = `<div style="text-align:center;margin-top:8px;"><button class="btn btn-primary" onclick="showResult()">View Results</button></div>`;
  }

  const gameCells = state.games.map((g, i) => {
    let cls = 'game-cell';
    let content = '';
    if (g.result) {
      const rcls = g.result === 'W' ? 'win' : g.result === 'D' ? 'draw' : 'loss';
      cls += ` ${rcls}`;
      const scoreStr = `${g.score.us}-${g.score.them}`;
      content = `<div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result ${rcls}">${g.result} ${scoreStr}</div>`;
    } else if (i === state.currentGame) {
      cls += ' current';
      content = `<div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result" style="color:#888;">?</div>`;
    } else {
      cls += ' upcoming';
      content = `<div class="gc-num">Game ${i + 1}</div><div class="gc-opp">?</div>`;
    }
    return `<div class="${cls}">${content}</div>`;
  }).join('');

  const teamListHtml = state.picks.filter(p => p).map(p =>
    `<span class="rt-player">${posLabels[p.pos]} ${p.fullName} (${p.rating})</span>`
  ).join('');

  app.innerHTML = `
    <div class="page-title">
      <h1>34-0</h1>
    </div>
    <p class="subtitle">${state.formation.label} · ${state.teamRating} avg rating</p>

    <div class="season-header">
      <div class="record-display">
        <div class="r-item r-win"><div class="r-num">${state.record.w}</div><div class="r-label">Wins</div></div>
        <div class="r-item r-draw"><div class="r-num">${state.record.d}</div><div class="r-label">Draws</div></div>
        <div class="r-item r-loss"><div class="r-num">${state.record.l}</div><div class="r-label">Losses</div></div>
      </div>
      <div class="rating-bar">
        <span>Team: <strong>${state.teamRating}</strong></span>
        <span>Games: <strong>${state.currentGame}/${TOTAL_GAMES}</strong></span>
      </div>
    </div>

    ${gamePreview}
    ${playBtn}

    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px;background:#1a1a1a;border-radius:10px;border:1px solid #2a2a2a;">
      ${teamListHtml}
    </div>

    <div class="game-grid">${gameCells}</div>
  `;
}

function playGame() {
  const result = advanceGame();
  if (!result) return;
  showGameResult(result);

  setTimeout(() => {
    closeModal();
    if (isSeasonComplete()) {
      state.phase = 'result';
      render();
    } else {
      render();
    }
  }, 2000);
}

function showGameResult(result) {
  const modal = document.getElementById('modal');
  const labels = { W: 'WIN', D: 'DRAW', L: 'LOSS' };
  const colors = { W: 'win', D: 'draw', L: 'loss' };
  const scoreStr = `${result.score.us} - ${result.score.them}`;
  const game = state.games[state.currentGame - 1];

  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${colors[result.outcome]}">${labels[result.outcome]}</div>
      <div class="m-score">${scoreStr}</div>
      <div class="m-sub">vs ${game.team.name} · Record: ${state.record.w}-${state.record.d}-${state.record.l}</div>
      <div style="color:#555;font-size:0.7rem;">Game ${state.currentGame} of ${TOTAL_GAMES}</div>
    </div>
  `;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function showResult() {
  state.phase = 'result';
  render();
}

function renderResult(app) {
  const posLabels = { G: 'GK', D: 'DEF', M: 'MID', F: 'FWD' };
  const perfect = isPerfect();
  const recordStr = `${state.record.w}-${state.record.d}-${state.record.l}`;

  const teamHtml = state.picks.filter(p => p).map(p =>
    `<span class="rt-player">${posLabels[p.pos]} ${p.fullName} (${p.rating}) &middot; ${p.teamAbbr} ${p.year}</span>`
  ).join('');

  app.innerHTML = `
    <div class="result-screen">
      <div class="big-record ${perfect ? 'perfect' : 'normal'}">${recordStr}</div>
      <div class="result-title">${perfect ? 'PERFECT SEASON! 34-0-0!' : 'Season Complete'}</div>
      <div class="result-detail">
        ${perfect
          ? 'You did it. A flawless season. Every game. Every opponent. Undefeated.'
          : `Your ${state.formation.label} squad finished ${recordStr}. ${state.record.w >= 20 ? 'A strong season!' : state.record.w >= 10 ? 'A respectable campaign.' : 'Tough season — better luck next time.'}`}
        <br><br>
        <span style="color:#555;">Team rating: ${state.teamRating} · Formation: ${state.formation.label}</span>
      </div>
      <div class="result-team">${teamHtml}</div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="restart()">Try Again</button>
        <button class="btn btn-secondary" onclick="document.getElementById('app').innerHTML=document.getElementById('app').innerHTML">See Schedule</button>
      </div>
    </div>
  `;
}

function restart() {
  resetState();
  state.phase = 'formation';
  render();
}

// ========== INIT ==========
render();
</script>
