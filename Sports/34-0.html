body {

nav {

  padding: 12px 16px;

  border-radius: 10px;
  border: 1px solid #2a2a2a;
}
nav .nav-links { display: flex; gap: 20px; align-items: center; }
nav a {

  text-transform: uppercase;
}
nav a:hover { color: #fff; }
nav .current {

  font-size: 0.85rem;

}
#app { width: 100%; max-width: 900px; }
.page-title { text-align: center; margin-bottom: 8px; }

.subtitle { text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 24px; }

/* ===== SPLASH ===== */
.splash { text-align: center; padding: 60px 20px; }
.splash h1 { font-size: 5rem; font-weight: 800; letter-spacing: 8px; margin-bottom: 8px; }
.splash .tagline { color: #666; font-size: 1rem; margin-bottom: 40px; }
.splash .goal { color: #555; font-size: 0.85rem; line-height: 1.6; max-width: 500px; margin: 0 auto 32px; }

/* ===== FORMATION SELECTOR ===== */
.formation-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  max-width: 700px;
  margin: 32px auto;
}
.formation-card {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.formation-card:hover { border-color: #E80A4D; background: #222; }
.formation-card .f-name { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
.formation-card .f-detail { font-size: 0.75rem; color: #888; line-height: 1.6; }

/* ===== PITCH / SLOT GRID ===== */
.pitch-header {

  padding: 12px 16px;
  background: #1a1a1a;
  border-radius: 10px;
  border: 1px solid #2a2a2a;

}

.pitch {

  background: #111;
  border-radius: 16px;
  border: 1px solid #2a2a2a;
  margin-bottom: 16px;
}
.pitch-row {

  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.pitch-row.gk-row { margin-bottom: 6px; }
.pitch-slot {

  min-height: 80px;
  padding: 10px 8px;
  background: #1a1a1a;
  border: 2px solid;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.pitch-slot:hover { transform: scale(1.05); background: #222; }
.pitch-slot .ps-pos {

}
.pitch-slot .ps-name { font-size: 0.7rem; font-weight: 600; line-height: 1.2; margin-top: 4px; }
.pitch-slot .ps-rating { font-size: 0.65rem; color: #4caf50; margin-top: 2px; }
.pitch-slot .ps-empty { font-size: 0.65rem; color: #555; font-style: italic; margin-top: 4px; }
.pitch-slot.empty { border-style: dashed; opacity: 0.7; }
.pitch-slot.filled { cursor: pointer; }
.pitch-slot.pool-empty { border-color: #444 !important; opacity: 0.3; cursor: not-allowed; }
.pool-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #1a1a1a;
  border-radius: 8px;
  border: 1px solid #2a2a2a;
  font-size: 0.75rem;
  color: #888;
  margin-bottom: 12px;
}

/* ===== PICK VIEW ===== */
.pick-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: #1a1a1a;
  border-radius: 10px;
  border: 1px solid #2a2a2a;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.pick-team-info {

  align-items: center;
  gap: 12px;
}
.pick-team-info .pti-badge {

  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.65rem;

}
.pick-team-info .pti-name { font-weight: 700; font-size: 0.9rem; }
.pick-team-info .pti-year { color: #888; font-size: 0.75rem; }
.player-grid { display: grid; gap: 8px; }
.player-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;

  transition: all 0.15s;
}
.player-card:hover { border-color: #E80A4D; background: #222; }
.player-card .pc-name { font-weight: 600; font-size: 0.85rem; }
.player-card .pc-rating {

  font-size: 0.8rem;
  font-weight: 700;

}
.player-card .pc-pos {
  font-size: 0.7rem;
  color: #888;
  margin-left: 8px;

}

/* ===== BUTTONS ===== */
.btn {

  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;

.btn-primary { background: #E80A4D; color: #fff; }
.btn-primary:hover { background: #c00940; }

.btn-secondary { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; }

.game-cell .gc-result.loss { background: #3a1a1a; color: #f44336; }

  margin-bottom: 12px;
  font-size: 0.75rem;
  color: #888;
}

/* ===== MODAL ===== */
.modal-overlay {

  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.active { display: flex; }
.modal-box {

.modal-box .m-result.draw { color: #ff9800; }
.modal-box .m-result.loss { color: #f44336; }

.modal-box .m-sub { font-size: 0.8rem; color: #666; margin-bottom: 20px; line-height: 1.5; }

/* ===== RESULT ===== */
.result-screen { text-align: center; padding: 40px 20px; }
.result-screen .big-record { font-size: 4rem; font-weight: 800; letter-spacing: 4px; margin-bottom: 8px; }
.result-screen .big-record.perfect { color: #4caf50; animation: glow 2s ease-in-out infinite; }

.result-screen .big-record.normal { color: #e0e0e0; }

  background: #1a1a1a;

.standings-conf { flex: 1; min-width: 0; }

.standings-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }

.bracket-round { min-width: 120px; }
.bracket-round h3 { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-align: center; }
.bracket-matchup {
  background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 6px 10px; margin-bottom: 6px;

.bracket-matchup .bm-team { padding: 2px 0; }
.bracket-matchup .bm-team.active { color: #e0e0e0; font-weight: 700; }

.bracket-matchup .bm-team.loser { color: #555; }

.series-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; }
.series-badge.active { background: #1a3a1a; color: #4caf50; }
.series-badge.eliminated { background: #3a1a1a; color: #f44336; }

/* ===== LOADING ===== */
.loading { text-align: center; padding: 60px; color: #666; font-size: 0.9rem; }
.loading .lds-ring { position: relative; display: inline-block; width: 40px; height: 40px; margin-bottom: 16px; }
.loading .lds-ring div {
  box-sizing: border-box; display: block; position: absolute; width: 32px; height: 32px;
  margin: 4px; border: 3px solid #E80A4D; border-radius: 50%; animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  border-color: #E80A4D transparent transparent transparent;
}
@keyframes lds-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* ===== MISC ===== */
.hidden { display: none; }
.footer { margin-top: 24px; font-size: 0.75rem; color: #444; text-align: center; }

@media (max-width: 640px) {
  body { padding: 16px; }
  .page-title h1 { font-size: 1.8rem; letter-spacing: 3px; }
  .formation-grid { grid-template-columns: repeat(2, 1fr); }
  .pitch-slot { width: 70px; min-height: 65px; padding: 8px 4px; }
  .pitch-slot .ps-name { font-size: 0.6rem; }
  .game-grid { grid-template-columns: repeat(3, 1fr); }
  .modal-box { padding: 24px; }
  .splash h1 { font-size: 3rem; }
  .result-screen .big-record { font-size: 3rem; }
  .standings-wrap { flex-direction: column; }
  .standings-table { font-size: 0.7rem; }
  .standings-table td, .standings-table th { padding: 3px 4px; }
  .bracket { gap: 12px; }
}
</style>

function createSlots(f) {
  const arr = [];
  for (let i = 0; i < f.gk; i++) arr.push({ pos: 'G', player: null, teamEntry: null });
  for (let i = 0; i < f.def; i++) arr.push({ pos: 'D', player: null, teamEntry: null });
  for (let i = 0; i < f.mid; i++) arr.push({ pos: 'M', player: null, teamEntry: null });
  for (let i = 0; i < f.fwd; i++) arr.push({ pos: 'F', player: null, teamEntry: null });
  return arr;
}

function resetState() {
  state.difficulty = null;
  state.formation = null;
  state.slots = [];
  state.activeSlot = -1;
  state.teamPool = [];
  state.usedPool = new Set();
  state.teamRating = 0;
  state.games = [];
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.playerStats = {};
  state.teamBaseRatings = null;
  state.standings = null;
  state.userSeed = null;
  state.userConfSeed = null;
  state.playoffPhase = null;
  state.playoffRound = 0;
  state.playoffMatchupIdx = 0;
  state.seriesWins = { us: 0, them: 0 };
  state.seriesGames = [];
  state.currentPlayoffOpponent = null;
  state.playoffOppSeed = null;
  state.playoffRecord = { w: 0, l: 0 };
  state.wonPlayoffs = false;
  state.playoffLog = [];
}

// ========== API ==========
async function fetchRoster(teamId, season) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/${teamId}/roster?season=${season}`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (!data.athletes || data.athletes.length === 0) return null;
  return data.athletes;
}

// ========== PLAYER RATINGS ==========
function extractStat(athlete, name) {
  const stats = athlete.statistics;
  if (!stats) return 0;
  for (const sk in stats) {
    const splits = stats[sk];
    if (!splits || !splits.categories) continue;
    for (const cat of splits.categories) {
      if (!cat.stats) continue;
      for (const s of cat.stats) {
        if (s.name === name && s.value != null) return s.value;
      }
    }
  }
  return 0;
}

function computeRating(athlete, noiseRange, bonus) {
  const pos = (athlete.position && athlete.position.abbreviation) || 'M';
  const apps = extractStat(athlete, 'appearances');
  const goals = extractStat(athlete, 'totalGoals');
  const assists = extractStat(athlete, 'goalAssists');
  let base;
  if (pos === 'G') {
    base = 40 + apps * 0.4 + extractStat(athlete, 'saves') * 0.2;
  } else if (pos === 'D') {
    base = 48 + apps * 0.25 + goals * 1.5;
  } else if (pos === 'M') {
    base = 40 + apps * 0.3 + (goals + assists) * 1.2;
  } else {
    base = 35 + apps * 0.2 + goals * 1.6 + assists * 0.6;
  }
  const nr = noiseRange || 10;
  const noise = Math.random() * nr - nr / 2;
  return Math.round(Math.max(40, Math.min(99, base + noise + (bonus || 0))));
}

// ========== POOL PRE-FETCH ==========
async function preFetchPool(size, noiseRange, bonus) {
  const pool = [];
  const usedCombos = new Set();
  while (pool.length < size) {
    const team = allMlsTeams[Math.floor(Math.random() * allMlsTeams.length)];
    const year = MIN_SEASON + Math.floor(Math.random() * (MAX_SEASON - MIN_SEASON + 1));
    const key = `${team.id}-${year}`;
    if (usedCombos.has(key)) continue;
    usedCombos.add(key);
    const roster = await fetchRoster(team.id, year);
    if (!roster || roster.length === 0) continue;
    const enriched = roster.filter(a => extractStat(a, 'appearances') > 0).map(a => ({
      id: a.id,
      fullName: a.fullName,
      rating: computeRating(a, noiseRange, bonus),
      pos: (a.position && a.position.abbreviation) || 'M',
    }));
    enriched.sort((a, b) => (a.pos !== b.pos ? (a.pos < b.pos ? -1 : 1) : (b.rating || 0) - (a.rating || 0)));
    pool.push({ team: { id: team.id, name: team.name, abbr: team.abbr }, year, roster: enriched });
  }
  return pool;
}

// ========== DRAFT LOGIC ==========
function allSlotsFilled() {
  return state.slots.every(s => s.player !== null);
}

function filledCount() {
  return state.slots.filter(s => s.player !== null).length;
}

function findTeamForPosition(pos) {
  const available = [];
  for (let i = 0; i < state.teamPool.length; i++) {
    if (state.usedPool.has(i)) continue;
    if (state.teamPool[i].roster.some(p => p.pos === pos)) {
      available.push({ idx: i, entry: state.teamPool[i] });
    }
  }
  if (available.length === 0) return null;
  const pick = available[Math.floor(Math.random() * available.length)];
  state.usedPool.add(pick.idx);
  return pick.entry;
}

function getAvailablePlayers(entry, pos) {
  const draftedIds = new Set(state.slots.filter(s => s.player).map(s => s.player.id));
  const pool = entry.roster.filter(p => p.pos === pos && !draftedIds.has(p.id));
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 3);
}

function selectSlot(index) {
  const slot = state.slots[index];
  if (!slot) return;

  if (slot.player) {
    state.activeSlot = index;
    render();
    return;
  }

  let attempts = 0;
  let teamEntry;
  do {
    teamEntry = findTeamForPosition(slot.pos);
    if (!teamEntry) break;
    const avail = getAvailablePlayers(teamEntry, slot.pos);
    if (avail.length > 0) break;
    attempts++;
  } while (attempts < 20);

  if (teamEntry && getAvailablePlayers(teamEntry, slot.pos).length > 0) {
    slot.teamEntry = teamEntry;
    state.activeSlot = index;
    render();
  }
}

function cancelPick() {
  state.activeSlot = -1;
  render();
}

function fillSlot(player, slotIdx) {
  const slot = state.slots[slotIdx];
  if (!slot) return;
  slot.player = {
    fullName: player.fullName,
    pos: player.pos,
    rating: player.rating,
    id: player.id,
    teamName: slot.teamEntry ? slot.teamEntry.team.name : '',
    teamAbbr: slot.teamEntry ? slot.teamEntry.team.abbr : '',
    year: slot.teamEntry ? slot.teamEntry.year : '',
  };
  state.activeSlot = -1;
  if (allSlotsFilled()) {
    startSeason();
  } else {
    render();
  }
}

function startSeason() {
  const ratings = state.slots.map(s => s.player.rating);
  state.teamRating = Math.round(ratings.reduce((a, b) => a + b, 0) / ratings.length);
  const diff = DIFFICULTIES[state.difficulty];

  // Assign base ratings to all MLS teams
  state.teamBaseRatings = {};
  const otherTeams = allMlsTeams.filter(t => t.id !== USER_TEAM_ID);
  otherTeams.forEach(t => {
    state.teamBaseRatings[t.id] = Math.round(40 + Math.random() * 35);
  });
  state.teamBaseRatings[USER_TEAM_ID] = state.teamRating;

  state.games = [];
  for (let i = 0; i < TOTAL_GAMES; i++) {
    const team = otherTeams[Math.floor(Math.random() * otherTeams.length)];
    const rating = state.teamBaseRatings[team.id];
    state.games.push({ team, rating, result: null, score: null });
  }
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.playerStats = {};
  state.slots.forEach(s => {
    state.playerStats[s.player.id] = { goals: 0, assists: 0, cleanSheets: 0, motm: 0, pos: s.player.pos, name: s.player.fullName };
  });
  state.phase = 'season';
  render();
}

// ========== SEASON LOGIC ==========
function simulateGame(userRating, oppRating, drawRate) {
  const winProb = userRating / (userRating + oppRating);
  const adjWinProb = winProb * (1 - (drawRate || DRAW_RATE));
  const r = Math.random();
  if (r < adjWinProb) return 'W';
  if (r < adjWinProb + DRAW_RATE) return 'D';
  return 'L';
}

function generateScore(result, userRating, oppRating) {
  const diff = userRating - oppRating;
  const base = Math.max(0, Math.min(4, Math.round(1 + (diff / 30) + (Math.random() - 0.3))));
  if (result === 'W') {
    const ourGoals = Math.max(1, base + 1);
    const theirGoals = Math.max(0, Math.min(ourGoals - 1, Math.round(base * 0.4 + Math.random())));
    return { us: ourGoals, them: theirGoals };
  } else if (result === 'D') {
    const g = Math.round(Math.random() * 2);
    return { us: g, them: g };
  } else {
    const theirGoals = Math.max(1, base + 2);
    const ourGoals = Math.max(0, Math.min(theirGoals - 1, Math.round(base * 0.3 + Math.random() - 0.3)));
    return { us: ourGoals, them: theirGoals };
  }
}

function distributeStats(score) {
  const us = score.us;
  const cleanSheet = score.them === 0;
  const contrib = {};
  state.slots.forEach(s => contrib[s.player.id] = { g: 0, a: 0 });

  const goalPool = [];
  state.slots.forEach(s => {
    const w = { F: 65, M: 25, D: 8, G: 2 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) goalPool.push(s.player.id);
  });
  for (let i = 0; i < us; i++) {
    const id = goalPool[Math.floor(Math.random() * goalPool.length)];
    contrib[id].g++;
  }

  const assistPool = [];
  state.slots.forEach(s => {
    const w = { G: 2, D: 13, M: 50, F: 35 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) assistPool.push(s.player.id);
  });
  for (let i = 0; i < us; i++) {
    if (Math.random() < 0.6) {
      const id = assistPool[Math.floor(Math.random() * assistPool.length)];
      contrib[id].a++;
    }
  }

  let motmId = null, motmScore = -1;
  for (const s of state.slots) {
    const pid = s.player.id;
    const c = contrib[pid];
    state.playerStats[pid].goals += c.g;
    state.playerStats[pid].assists += c.a;
    const cs = cleanSheet && (s.player.pos === 'G' || s.player.pos === 'D') ? 1 : 0;
    state.playerStats[pid].cleanSheets += cs;
    const perf = c.g * 3 + c.a * 2 + cs * 2 + Math.random() * 3;
    if (perf > motmScore) { motmScore = perf; motmId = pid; }
  }
  if (motmId) state.playerStats[motmId].motm++;
  return motmId;
}

function advanceGame() {
  const idx = state.currentGame;
  if (idx >= TOTAL_GAMES) return null;
  const game = state.games[idx];
  const diff = DIFFICULTIES[state.difficulty];
  const outcome = simulateGame(state.teamRating, game.rating, diff.drawRate);
  const score = generateScore(outcome, state.teamRating, game.rating);
  game.result = outcome;
  game.score = score;
  const motmId = distributeStats(score);
  game.motm = motmId;
  state.record[outcome === 'W' ? 'w' : outcome === 'D' ? 'd' : 'l']++;
  state.currentGame++;
  return { outcome, score, game };
}

function isSeasonComplete() { return state.currentGame >= TOTAL_GAMES; }
function isPerfect() { return state.record.w === TOTAL_GAMES && state.record.d === 0 && state.record.l === 0; }

// ========== STANDINGS GENERATION ==========
function generateStandings() {
  if (state.standings) return;
  const diff = DIFFICULTIES[state.difficulty];
  const teams = allMlsTeams.map(t => {
    if (t.id === USER_TEAM_ID) {
      return {
        ...t,
        rating: state.teamRating,
        w: state.record.w,
        d: state.record.d,
        l: state.record.l,
        pts: state.record.w * 3 + state.record.d,
        userTeam: true,
      };
    }
    // Auto-sim other teams' 34-game seasons
    const rating = state.teamBaseRatings[t.id] || 50;
    let w = 0, d = 0, l = 0;
    const otherTeams = allMlsTeams.filter(x => x.id !== t.id);
    for (let i = 0; i < TOTAL_GAMES; i++) {
      const opp = otherTeams[Math.floor(Math.random() * otherTeams.length)];
      const oppR = state.teamBaseRatings[opp.id] || 50;
      const result = simulateGame(rating, oppR, diff.drawRate);
      if (result === 'W') w++;
      else if (result === 'D') d++;
      else l++;
    }
    return {
      ...t,
      rating,
      w, d, l,
      pts: w * 3 + d,
      userTeam: false,
    };
  });

  const east = teams.filter(t => t.conf === 'east').sort((a, b) => b.pts - a.pts || b.w - a.w);
  const west = teams.filter(t => t.conf === 'west').sort((a, b) => b.pts - a.pts || b.w - a.w);
  state.standings = { east, west };

  // Find user seed
  const userConf = teams.filter(t => t.conf === USER_CONF).sort((a, b) => b.pts - a.pts || b.w - a.w);
  for (let i = 0; i < userConf.length; i++) {
    if (userConf[i].userTeam) {
      state.userConfSeed = i + 1;
      state.userSeed = userConf[i];
      break;
    }
  }
}

// ========== PLAYOFF SIMULATION ==========
function simulatePlayoffGame(userRating, oppRating) {
  const winProb = userRating / (userRating + oppRating);
  const r = Math.random();
  if (r < winProb) return 'W';
  return 'L';
}

function generatePlayoffScore(result, userRating, oppRating) {
  const diff = userRating - oppRating;
  const base = Math.max(1, Math.min(5, Math.round(1.5 + (diff / 25) + (Math.random() - 0.3))));
  if (result === 'W') {
    const ourGoals = Math.max(1, base + 1);
    const theirGoals = Math.max(0, Math.min(ourGoals - 1, Math.round(base * 0.3 + Math.random() * 0.5)));
    return { us: ourGoals, them: theirGoals };
  } else {
    const theirGoals = Math.max(1, base + 2);
    const ourGoals = Math.max(0, Math.min(theirGoals - 1, Math.round(base * 0.2 + Math.random() * 0.5)));
    return { us: ourGoals, them: theirGoals };
  }
}

function simPlayoffSeries(teamRating, oppRating, gamesToWin) {
  let ourWins = 0, theirWins = 0;
  while (ourWins < gamesToWin && theirWins < gamesToWin) {
    const result = simulatePlayoffGame(teamRating, oppRating);
    if (result === 'W') ourWins++;
    else theirWins++;
  }
  return { ourWins, theirWins, won: ourWins > theirWins };
}

function simSinglePlayoffGame(teamRating, oppRating) {
  const result = simulatePlayoffGame(teamRating, oppRating);
  const score = generatePlayoffScore(result, teamRating, oppRating);
  return { result, score, won: result === 'W' };
}

function autoSimTeamSeason(teamId) {
  const rating = state.teamBaseRatings[teamId] || 50;
  const diff = DIFFICULTIES[state.difficulty];
  let w = 0, d = 0, l = 0;
  const others = allMlsTeams.filter(t => t.id !== teamId);
  for (let i = 0; i < TOTAL_GAMES; i++) {
    const opp = others[Math.floor(Math.random() * others.length)];
    const oppR = state.teamBaseRatings[opp.id] || 50;
    const result = simulateGame(rating, oppR, diff.drawRate);
    if (result === 'W') w++;
    else if (result === 'D') d++;
    else l++;
  }
  return { w, d, l, pts: w * 3 + d, rating };
}

function getPlayoffOppInfo(confStandings, seed) {
  const entry = confStandings.find(t => !t.userTeam && confStandings.indexOf(t) + 1 === seed);
  return entry || confStandings[seed - 1];
}

function findUserMatchupOpponent(confStandings, userSeed) {
  // Wild card: user is 8 or 9
  if (userSeed === 8) return { opponent: confStandings[8], oppSeed: 9, round: 'Wild Card', bo3: false };
  if (userSeed === 9) return { opponent: confStandings[7], oppSeed: 8, round: 'Wild Card', bo3: false };
  // Round 1 (Bo3): standard seeding
  const pairings = [
    { seed: 1, oppSeed: 8 }, // wild card winner → seed 1 opponent is the WC winner (8 or 9)
    { seed: 2, oppSeed: 7 },
    { seed: 3, oppSeed: 6 },
    { seed: 4, oppSeed: 5 },
    { seed: 5, oppSeed: 4 },
    { seed: 6, oppSeed: 3 },
    { seed: 7, oppSeed: 2 },
  ];
  for (const p of pairings) {
    if (p.seed === userSeed) {
      const opp = confStandings[p.oppSeed - 1];
      return { opponent: opp, oppSeed: p.oppSeed, round: 'Round 1', bo3: true };
    }
  }
  return null;
}

function determinePlayoffPath() {
  generateStandings();
  const conf = state.standings[USER_CONF];
  const seed = state.userConfSeed;
  if (!seed || seed > PLAYOFF_TEAMS) return null;

  const path = [];
  const wcTeams = [];

  // Pre-compute wild card if user isn't 1-7 (auto sim)
  if (seed >= 8) {
    // User plays wild card
    const opp = seed === 8 ? conf[8] : conf[7];
    path.push({ round: 'Wild Card', opponent: opp, oppSeed: opp.userTeam ? null : (seed === 8 ? 9 : 8), bo3: false });
  } else {
    // Auto-sim wild card between 8 and 9
    const wcResult = simSinglePlayoffGame(
      conf[7].rating,
      conf[8].rating
    );
    const wcWinner = wcResult.won ? conf[7] : conf[8];
    const wcWinnerSeed = wcResult.won ? 8 : 9;
    // User (seed 1-7) faces appropriate opponent
    const userMatchup = findUserMatchupOpponent(conf, seed);
    if (userMatchup) {
      let opp;
      if (seed === 1) {
        opp = wcWinner;
      } else {
        opp = userMatchup.opponent;
      }
      path.push({
        round: userMatchup.round,
        opponent: opp,
        oppSeed: userMatchup.oppSeed,
        bo3: userMatchup.bo3,
      });
    }
  }

  // Semifinal
  // Determine possible opponents based on bracket path
  path.push({ round: 'Conference Semifinal', opponent: null, oppSeed: null, bo3: false });
  path.push({ round: 'Conference Final', opponent: null, oppSeed: null, bo3: false });
  path.push({ round: 'MLS Cup', opponent: null, oppSeed: null, bo3: false });

  return path;
}

function autoSimEastBracket() {
  const conf = state.standings.east;
  if (!conf || conf.length < 9) return null;

  // Wild card
  const wc = simSinglePlayoffGame(conf[7].rating, conf[8].rating);
  const wcWinner = wc.won ? conf[7] : conf[8];

  // Round 1 (Bo3)
  const r1 = [
    { a: conf[0], b: wcWinner, bo3: true },
    { a: conf[1], b: conf[6], bo3: true },
    { a: conf[2], b: conf[5], bo3: true },
    { a: conf[3], b: conf[4], bo3: true },
  ];
  const r1Winners = r1.map(m => {
    const res = simPlayoffSeries(m.a.rating, m.b.rating, 2);
    return res.won ? m.a : m.b;
  });

  // Semifinals
  const semi1 = simSinglePlayoffGame(r1Winners[0].rating, r1Winners[3].rating);
  const semi2 = simSinglePlayoffGame(r1Winners[1].rating, r1Winners[2].rating);
  const semiWinners = [semi1.won ? r1Winners[0] : r1Winners[3], semi2.won ? r1Winners[1] : r1Winners[2]];

  // Conference final
  const confFinal = simSinglePlayoffGame(semiWinners[0].rating, semiWinners[1].rating);
  return confFinal.won ? semiWinners[0] : semiWinners[1];
}

function enterPlayoffs() {
  generateStandings();
  const conf = state.standings[USER_CONF];
  const seed = state.userConfSeed;
  if (!seed || seed > PLAYOFF_TEAMS) return;
  state.playoffRecord = { w: 0, l: 0 };
  state.playoffLog = [];

  if (seed >= 8) {
    // Wild Card
    const opp = seed === 8 ? conf[8] : conf[7];
    state.currentPlayoffOpponent = { team: opp, seed: seed === 8 ? 9 : 8 };
    state.playoffRound = -1;
  } else {
    // Auto-sim wild card between 8 and 9
    const wc = simSinglePlayoffGame(conf[7].rating, conf[8].rating);
    const wcWinner = wc.won ? conf[7] : conf[8];
    const wcWinnerSeed = wc.won ? 8 : 9;
    const pairings = { 1: null, 2: 7, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2 };
    let oppTeam, oppSeed;
    if (seed === 1) {
      oppTeam = wcWinner;
      oppSeed = wcWinnerSeed;
    } else {
      oppSeed = pairings[seed];
      oppTeam = conf[oppSeed - 1];
    }
    state.currentPlayoffOpponent = { team: oppTeam, seed: oppSeed };
    state.playoffRound = 0;
  }
  state.playoffPhase = 'pregame';
  state.seriesWins = { us: 0, them: 0 };
  state.seriesGames = [];
  state.phase = 'playoff';
  render();
}

function advancePlayoff() {
  const opp = state.currentPlayoffOpponent;
  if (!opp) return null;

  const isBo3 = state.playoffRound === 0;
  const userRating = state.teamRating;
  const oppRating = opp.team.rating;

  if (isBo3) {
    const result = simulatePlayoffGame(userRating, oppRating);
    const score = generatePlayoffScore(result, userRating, oppRating);
    state.seriesGames.push({ result, score });
    if (result === 'W') state.seriesWins.us++;
    else state.seriesWins.them++;

    if (state.seriesWins.us >= 2 || state.seriesWins.them >= 2) {
      // Series over
      const won = state.seriesWins.us >= 2;
      if (won) state.playoffRecord.w++;
      else state.playoffRecord.l++;
      state.playoffLog.push({ round: 'Round 1', opponent: opp.team.name, won, seriesWins: { ...state.seriesWins } });
      return { result, score, seriesOver: true, won, isBo3: true, seriesWins: { ...state.seriesWins }, gameNum: state.seriesGames.length };
    }
    return { result, score, seriesOver: false, won: result === 'W', isBo3: true, seriesWins: { ...state.seriesWins }, gameNum: state.seriesGames.length };
  } else {
    // Single game
    const result = simulatePlayoffGame(userRating, oppRating);
    const score = generatePlayoffScore(result, userRating, oppRating);
    const won = result === 'W';
    if (won) state.playoffRecord.w++;
    else state.playoffRecord.l++;
    return { result, score, seriesOver: true, won, isBo3: false, seriesWins: { us: won ? 1 : 0, them: won ? 0 : 1 }, gameNum: 1 };
  }
}

// ========== PLAYOFF RENDER ==========
function renderPlayoff(app) {
  const opp = state.currentPlayoffOpponent;
  if (!opp || !opp.team) { state.phase = 'result'; render(); return; }

  const seed = state.userConfSeed;
  const roundLabels = { '-1': 'Wild Card', '0': 'Round 1', '1': 'Conference Semifinal', '2': 'Conference Final', '3': 'MLS Cup' };
  const roundLabel = roundLabels[String(state.playoffRound)] || 'Playoff';
  const isBo3 = state.playoffRound === 0;
  const seriesGames = state.seriesGames.length;
  const seriesTotal = isBo3 ? ` (Game ${seriesGames + 1} of up to 3)` : '';

  const oppRating = opp.team.rating || 50;
  const winProb = state.teamRating / (state.teamRating + oppRating);
  const seedDisplay = opp.seed !== null && opp.seed !== undefined ? `#${opp.seed}` : '';

  let seriesScoreHtml = '';
  if (isBo3) {
    const svg = `<span class="series-badge ${state.seriesWins.us > 0 ? 'active' : ''}">${state.seriesWins.us}</span>`;
    const ovg = `<span class="series-badge ${state.seriesWins.them > 0 ? (state.seriesWins.them >= 2 ? 'eliminated' : 'active') : ''}">${state.seriesWins.them}</span>`;
    seriesScoreHtml = `<div style="text-align:center;font-size:1rem;margin-bottom:12px;">Series: ${svg} – ${ovg}</div>`;
  }

    <p class="subtitle">${DIFFICULTIES[state.difficulty].label} &middot; ${roundLabel}</p>

    <div class="game-preview">
      <div class="gp-num">${roundLabel}${seriesTotal}</div>
      <div class="gp-matchup">#${seed} ${state.teamRating} vs ${seedDisplay} ${opp.team.abbr} (${oppRating})</div>
      <div class="gp-detail">${opp.team.name} &middot; Your rating: ${state.teamRating} &middot; Opponent rating: ${oppRating}</div>
      <div class="gp-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>
    </div>

    <div style="text-align:center;margin-top:8px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="playPlayoffGame()">Play Game</button>
      <button class="btn btn-secondary" onclick="simAllPlayoffs()">Sim All Playoffs</button>
    </div>

    <div style="margin-top:16px;">
      <div class="stats-bar">
        <span>Playoff Record: <strong>${state.playoffRecord.w}W – ${state.playoffRecord.l}L</strong></span>
        <span>Round: <strong>${roundLabel}</strong></span>
      </div>
    </div>

    <div class="result-team" style="margin-top:12px;">
      ${state.slots.map(s =>

}

function playPlayoffGame() {
  const result = advancePlayoff();
  if (!result) return;
  showPlayoffGameResult(result);
  setTimeout(() => {
    closeModal();
    if (result.seriesOver) {
      handlePlayoffAdvancement(result.won);
    } else {
      state.playoffPhase = 'pregame';
      render();
    }
  }, 2200);
}

function showPlayoffGameResult(result) {
  const modal = document.getElementById('modal');
  const color = result.won ? 'win' : 'loss';
  const label = result.won ? 'WIN' : 'LOSS';
  const opp = state.currentPlayoffOpponent;
  const isBo3 = result.isBo3;
  let seriesDetail = '';
  if (isBo3) {
    seriesDetail = `<div style="color:#888;font-size:0.75rem;margin-top:4px;">Series: ${result.seriesWins.us} – ${result.seriesWins.them}</div>`;
  }
  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${color}">${label}</div>
      <div class="m-score">${result.score.us} - ${result.score.them}</div>
      <div class="m-sub">vs ${opp.team.name} #${opp.seed}</div>
      ${seriesDetail}
      ${result.isBo3 && !result.seriesOver ? `<div style="color:#ff9800;font-size:0.8rem;margin-top:8px;">Next game in series...</div>` : ''}
      ${result.seriesOver ? `<div style="color:#4caf50;font-size:0.85rem;font-weight:700;margin-top:8px;">${result.won ? 'Series won!' : 'Eliminated'}</div>` : ''}
    </div>
  `;
  modal.classList.add('active');
}

function simAllPlayoffs() {
  while (true) {
    const result = advancePlayoff();
    if (!result) break;
    if (!result.seriesOver) continue;
    const keepGoing = handlePlayoffAdvancement(result.won, true);
    if (!keepGoing) break;
  }
  render();
}

function handlePlayoffAdvancement(won, silent) {
  const seed = state.userConfSeed;
  const conf = state.standings[USER_CONF];

  if (!won) {
    state.phase = 'champion';
    state.wonPlayoffs = false;
    state.playoffLog.push({ round: 'Eliminated', won: false });
    if (!silent) render();
    return false;
  }

  // Wild Card won → advance to Round 1 vs seed 1
  if (state.playoffRound === -1) {
    state.currentPlayoffOpponent = { team: conf[0], seed: 1 };
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    state.playoffRound = 0;
    state.playoffLog.push({ round: 'Wild Card', opponent: conf[0].name, won: true });
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  // Round 1 (Bo3) won → advance to Conference Semifinal
  if (state.playoffRound === 0) {
    // Determine which bracket half the user is in
    const topHalfSeeds = [[1, 8], [4, 5]];
    const bottomHalfSeeds = [[2, 7], [3, 6]];

    let userHalf, otherHalf;
    if (seed <= 1 || seed === 8 || seed === 9 || seed === 4 || seed === 5) {
      userHalf = topHalfSeeds;
      otherHalf = bottomHalfSeeds;
    } else {
      userHalf = bottomHalfSeeds;
      otherHalf = topHalfSeeds;
    }

    // Auto-sim the other matchup in user's half to find opponent
    const otherMatchup = userHalf.find(pair => !pair.includes(seed) && !(seed >= 8 && pair.includes(8)));
    let oppTeam;
    if (otherMatchup) {
      const a = conf[otherMatchup[0] - 1];
      const b = otherMatchup[1] <= conf.length ? conf[otherMatchup[1] - 1] : null;
      if (a && b) {
        const res = simPlayoffSeries(a.rating, b.rating, 2);
        oppTeam = res.won ? a : b;
      } else if (a) {
        oppTeam = a;
      }
    }

    state.currentPlayoffOpponent = { team: oppTeam, seed: null };
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    state.playoffRound = 1;
    state.playoffLog.push({ round: 'Round 1', won: true });
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  // Conference Semifinal won → advance to Conference Final
  if (state.playoffRound === 1) {
    state.playoffLog.push({ round: 'Conference Semifinal', won: true });
    // Auto-sim the other semifinal: (2/7) vs (3/6) or (1/4/5/8/9) opposite
    const topHalfSeeds = [[1, 8], [4, 5]];
    const bottomHalfSeeds = [[2, 7], [3, 6]];
    let userHalf, otherHalf;
    if (seed <= 1 || seed === 8 || seed === 9 || seed === 4 || seed === 5) {
      userHalf = topHalfSeeds;
      otherHalf = bottomHalfSeeds;
    } else {
      userHalf = bottomHalfSeeds;
      otherHalf = topHalfSeeds;
    }
    // Auto-sim the two other-half matchups to find the conference final opponent
    const otherRes1 = otherHalf[0] ? simPlayoffSeries(conf[(otherHalf[0][0] || 2) - 1].rating, conf[Math.min(otherHalf[0][1] || 7, conf.length) - 1].rating, 2) : null;
    const otherRes2 = otherHalf[1] ? simPlayoffSeries(conf[(otherHalf[1][0] || 3) - 1].rating, conf[Math.min(otherHalf[1][1] || 6, conf.length) - 1].rating, 2) : null;
    const otherSemiA = otherRes1 ? (otherRes1.won ? conf[(otherHalf[0][0] || 2) - 1] : conf[Math.min(otherHalf[0][1] || 7, conf.length) - 1]) : null;
    const otherSemiB = otherRes2 ? (otherRes2.won ? conf[(otherHalf[1][0] || 3) - 1] : conf[Math.min(otherHalf[1][1] || 6, conf.length) - 1]) : null;
    const confFinal = otherSemiA && otherSemiB ? simSinglePlayoffGame(otherSemiA.rating, otherSemiB.rating) : null;
    const oppTeam = confFinal ? (confFinal.won ? otherSemiA : otherSemiB) : (otherSemiA || otherSemiB);
    state.currentPlayoffOpponent = { team: oppTeam, seed: null };
    state.playoffRound = 2;
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  // Conference Final won → advance to MLS Cup
  if (state.playoffRound === 2) {
    state.playoffLog.push({ round: 'Conference Final', won: true });
    const eastChamp = autoSimEastBracket();
    state.currentPlayoffOpponent = { team: eastChamp, seed: 'E' };
    state.playoffRound = 3;
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  // MLS Cup won → CHAMPION
  if (state.playoffRound === 3) {
    state.playoffLog.push({ round: 'MLS Cup', won: true });
    state.wonPlayoffs = true;
    state.phase = 'champion';
    if (!silent) render();
    return false;
  }

  state.phase = 'champion';
  if (!silent) render();
  return false;
}

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  switch (state.phase) {
    case 'splash': renderSplash(app); break;
    case 'formation': renderFormation(app); break;
    case 'draft': renderDraft(app); break;
    case 'season': renderSeason(app); break;
    case 'result': renderResult(app); break;
    case 'standings': renderStandings(app); break;
    case 'playoff': renderPlayoff(app); break;
    case 'champion': renderChampion(app); break;
  }
}

function renderSplash(app) {
  const diffCards = Object.entries(DIFFICULTIES).map(([key, d]) => `
    <div class="formation-card" onclick="selectDifficulty('${key}')">
      <div class="f-name">${d.label}</div>
      <div class="f-detail">${d.desc}</div>
    </div>
  `).join('');
  app.innerHTML = `
    <div class="splash">
      <h1>34-0</h1>
      <p class="tagline">Draft. Simulate. Conquer.</p>
      <p class="goal">Draft a team of MLS players from across history and try to go a perfect 34-0-0. Pick your difficulty, choose a formation, then fill each position from randomly rolled teams. Can you finish flawless?</p>
      <div style="max-width:500px;margin:0 auto;">
        <div class="formation-grid">${diffCards}</div>
      </div>
    </div>
  `;
}

function selectDifficulty(key) {
  state.difficulty = key;
  state.phase = 'formation';
  render();
}

function renderFormation(app) {
  const diff = DIFFICULTIES[state.difficulty];
  const cards = Object.entries(FORMATIONS).map(([key, f]) => `
    <div class="formation-card" onclick="selectFormation('${key}')">
      <div class="f-name">${f.label}</div>
      <div class="f-detail">${f.desc}</div>
    </div>
  `).join('');
  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle"><span style="color:#E80A4D;">${diff.label}</span> &middot; Choose your formation</p>
    <div class="formation-grid">${cards}</div>
  `;
}

async function selectFormation(key) {
  state.formation = FORMATIONS[key];
  state.slots = createSlots(state.formation);
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="lds-ring"><div></div></div>Fetching historic rosters...</div>`;
  const diff = DIFFICULTIES[state.difficulty];
  state.teamPool = await preFetchPool(diff.poolSize, diff.noiseRange, diff.ratingBonus);
  if (state.teamPool.length < state.slots.length) {
    app.innerHTML = `<div style="text-align:center;padding:60px;color:#f44336;">Couldn't build a valid draft pool. <button class="btn btn-primary" onclick="selectFormation('${key}')">Retry</button></div>`;
    return;
  }
  state.activeSlot = -1;
  state.phase = 'draft';
  render();
}

function renderDraft(app) {
  if (state.activeSlot >= 0 && state.activeSlot < state.slots.length) {
    renderPickView(app);
  } else {
    renderSlotGrid(app);
  }
}

function renderSlotGrid(app) {
  const filled = filledCount();
  const total = state.slots.length;
  const remaining = state.teamPool.length - state.usedPool.size;

  const formationRows = buildFormationRows();

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${state.formation.label} — tap an empty slot to draft</p>

    <div class="pitch-header">
      <div class="ph-info">Filled: <strong>${filled}/${total}</strong></div>
      <div class="ph-info">Pool: <strong>${remaining}</strong> teams remaining</div>
    </div>

    <div class="pitch">
      ${formationRows}
    </div>

    ${allSlotsFilled()
      ? `<div style="text-align:center;"><button class="btn btn-primary" onclick="startSeason()">Start Season</button></div>`
      : remaining === 0
        ? `<div style="text-align:center;color:#f44336;font-size:0.85rem;">Pool exhausted — <button class="btn btn-secondary" onclick="selectFormation('${state.formation.label}')">Re-roll Pool</button></div>`
        : ''}
  `;
}

function buildFormationRows() {
  const slotHtml = (idx) => {
    const s = state.slots[idx];
    const color = POS_COLORS[s.pos];
    const label = POS_LABELS[s.pos];
    const filled = s.player !== null;
    return `<div class="pitch-slot ${filled ? 'filled' : 'empty'}" style="border-color:${color}" onclick="selectSlot(${idx})">
      <div class="ps-pos" style="color:${color}">${label}</div>
      ${filled
        ? `<div class="ps-name">${s.player.fullName}</div><div class="ps-rating">${s.player.rating}</div>`
        : `<div class="ps-empty">empty</div>`}
    </div>`;
  };

  const rows = [];
  const gkSlots = state.slots.filter(s => s.pos === 'G');
  const dSlots = state.slots.filter(s => s.pos === 'D');
  const mSlots = state.slots.filter(s => s.pos === 'M');
  const fSlots = state.slots.filter(s => s.pos === 'F');

  let idx = 0;
  if (gkSlots.length > 0) {
    let html = '<div class="pitch-row gk-row">';
    for (let i = 0; i < gkSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (dSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < dSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (mSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < mSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (fSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < fSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  return rows.join('');
}

function renderPickView(app) {
  const slot = state.slots[state.activeSlot];
  if (!slot) { state.activeSlot = -1; render(); return; }

  const entry = slot.teamEntry;
  if (!entry) { state.activeSlot = -1; render(); return; }

  const pick3 = getAvailablePlayers(entry, slot.pos);
  const available = pick3;

  const color = POS_COLORS[slot.pos];
  const label = POS_LABELS[slot.pos];
  const rePick = slot.player !== null;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${rePick ? 'Re-pick' : 'Draft'} — ${label}</p>

    <div class="pick-header">
      <div class="pick-team-info">
        <div class="pti-badge">${entry.team.abbr}</div>
        <div>
          <div class="pti-name">${entry.team.name}</div>
          <div class="pti-year">${entry.year} Season</div>
        </div>
      </div>
      <div style="font-size:0.8rem;color:#888;">
        Slot ${state.activeSlot + 1} of ${state.slots.length}
      </div>
    </div>

    <div class="player-grid">
      ${available.length === 0
        ? '<div style="text-align:center;padding:20px;color:#666;">No players available for this position from this team.</div>'
        : available.map(p => `
          <div class="player-card" onclick="fillSlotFromPool('${p.id}')">
            <div>
              <span class="pc-name">${p.fullName}</span>
              <span class="pc-pos">${p.pos}</span>
            </div>
            <div class="pc-rating">${p.rating}</div>
          </div>
        `).join('')}
    </div>

    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-secondary" onclick="cancelPick()">Cancel</button>
    </div>
  `;
}

function fillSlotFromPool(playerId) {
  const slot = state.slots[state.activeSlot];
  if (!slot || !slot.teamEntry) return;
  const player = slot.teamEntry.roster.find(p => p.id === playerId && p.pos === slot.pos);
  if (!player) return;
  fillSlot(player, state.activeSlot);
}

// ========== SEASON RENDER ==========
function renderSeason(app) {
  const posLabels = POS_LABELS;
  let gamePreview = '';
  let playBtn = '';

  if (!isSeasonComplete()) {
    const game = state.games[state.currentGame];
    const winProb = state.teamRating / (state.teamRating + game.rating);
    gamePreview = `
      <div class="game-preview">
        <div class="gp-num">Game ${state.currentGame + 1} of ${TOTAL_GAMES}</div>
        <div class="gp-matchup">${state.teamRating} vs ${game.team.abbr} (${game.rating})</div>
        <div class="gp-detail">Your team rating: ${state.teamRating} · Opponent rating: ${game.rating}</div>
        <div class="gp-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>
      </div>
    `;
    playBtn = `<div style="text-align:center;margin-top:8px;display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" onclick="playGame()">Play Next Game</button>
      <button class="btn btn-secondary" onclick="simAll()">Sim All</button>
    </div>`;
  } else {
    gamePreview = `<div class="game-preview"><div class="gp-num">Season Complete!</div></div>`;
    playBtn = `<div style="text-align:center;margin-top:8px;"><button class="btn btn-primary" onclick="showResult()">View Results</button></div>`;
  }

  const gameCells = state.games.map((g, i) => {
    let cls = 'game-cell';
    if (g.result) {
      const rcls = g.result === 'W' ? 'win' : g.result === 'D' ? 'draw' : 'loss';
      cls += ` ${rcls}`;
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result ${rcls}">${g.result} ${g.score.us}-${g.score.them}</div></div>`;
    } else if (i === state.currentGame) {
      cls += ' current';
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result" style="color:#888;">?</div></div>`;
    } else {
      cls += ' upcoming';
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">?</div></div>`;
    }
  }).join('');

  const teamHtml = state.slots.map(s =>
    `<span class="rt-player">${posLabels[s.pos]} ${s.player.fullName} (${s.player.rating})</span>`
  ).join('');

  const diffLabel = DIFFICULTIES[state.difficulty].label;

  // Stats leaderboard
  const ps = state.playerStats;
  const topScorer = Object.values(ps).sort((a, b) => b.goals - a.goals)[0];
  const topAssist = Object.values(ps).sort((a, b) => b.assists - a.assists)[0];
  const topCS = Object.values(ps).sort((a, b) => b.cleanSheets - a.cleanSheets)[0];
  const topMotm = Object.values(ps).sort((a, b) => b.motm - a.motm)[0];
  const statsBar = `
    <div class="stats-bar">
      <span>⚽ Goals: <strong>${topScorer ? topScorer.name + ' (' + topScorer.goals + ')' : '0'}</strong></span>
      <span>🎯 Assists: <strong>${topAssist ? topAssist.name + ' (' + topAssist.assists + ')' : '0'}</strong></span>
      <span>🧤 Clean Sheets: <strong>${topCS ? topCS.name + ' (' + topCS.cleanSheets + ')' : '0'}</strong></span>
      <span>⭐ MOTM: <strong>${topMotm ? topMotm.name + ' (' + topMotm.motm + ')' : '0'}</strong></span>
    </div>
  `;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${diffLabel} &middot; ${state.formation.label} &middot; ${state.teamRating} avg rating</p>

    <div class="season-header">
      <div class="record-display">
        <div class="r-item r-win"><div class="r-num">${state.record.w}</div><div class="r-label">Wins</div></div>
        <div class="r-item r-draw"><div class="r-num">${state.record.d}</div><div class="r-label">Draws</div></div>
        <div class="r-item r-loss"><div class="r-num">${state.record.l}</div><div class="r-label">Losses</div></div>
      </div>
      <div class="rating-bar">
        <span>Team: <strong>${state.teamRating}</strong></span>
        <span>Games: <strong>${state.currentGame}/${TOTAL_GAMES}</strong></span>
      </div>
    </div>

    ${statsBar}

    ${gamePreview}
    ${playBtn}

    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px;background:#1a1a1a;border-radius:10px;border:1px solid #2a2a2a;">
      ${teamHtml}
    </div>

    <div class="game-grid">${gameCells}</div>
  `;
}

function playGame() {
  const result = advanceGame();
  if (!result) return;
  showGameResult(result);
  setTimeout(() => {
    closeModal();
    if (isSeasonComplete()) { generateStandings(); state.phase = 'result'; render(); }
    else { render(); }
  }, 2000);
}

function showGameResult(result) {
  const modal = document.getElementById('modal');
  const labels = { W: 'WIN', D: 'DRAW', L: 'LOSS' };
  const colors = { W: 'win', D: 'draw', L: 'loss' };
  const game = state.games[state.currentGame - 1];
  const motmName = game.motm ? state.playerStats[game.motm]?.name || '' : '';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${colors[result.outcome]}">${labels[result.outcome]}</div>
      <div class="m-score">${result.score.us} - ${result.score.them}</div>
      <div class="m-sub">vs ${game.team.name} · Record: ${state.record.w}W-${state.record.d}D-${state.record.l}L</div>
      ${motmName ? `<div style="color:#ff9800;font-size:0.8rem;margin-top:8px;">⭐ ${motmName}</div>` : ''}
      <div style="color:#555;font-size:0.7rem;margin-top:4px;">Game ${state.currentGame} of ${TOTAL_GAMES}</div>
    </div>
  `;
  modal.classList.add('active');
}

function simAll() {
  while (!isSeasonComplete()) {
    advanceGame();
  }
  generateStandings();
  state.phase = 'result';
  render();
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
function showResult() { generateStandings(); state.phase = 'result'; render(); }

function renderResult(app) {
  const perfect = isPerfect();
  const recordStr = `${state.record.w}W-${state.record.d}D-${state.record.l}L`;
  const teamHtml = state.slots.map(s =>
    `<span class="rt-player">${POS_LABELS[s.pos]} ${s.player.fullName} (${s.player.rating}) &middot; ${s.player.teamAbbr} ${s.player.year}</span>`
  ).join('');

  const seed = state.userConfSeed;
  const qualified = seed && seed <= PLAYOFF_TEAMS;
  const playoffBtn = qualified
    ? `<button class="btn btn-primary" onclick="showStandings()">Playoff Standings</button>`
    : `<div style="color:#f44336;font-size:0.85rem;margin-bottom:8px;">Missed playoffs — finished #${seed} in conference</div>`;

  app.innerHTML = `
    <div class="result-screen">
      <div class="big-record ${perfect ? 'perfect' : 'normal'}">${recordStr}</div>
      <div class="result-title">${perfect ? 'PERFECT SEASON! 34-0-0!' : 'Season Complete'}</div>
      <div class="result-detail">
        ${perfect
          ? 'You did it. A flawless season. Every game. Every opponent. Undefeated.'
          : `Your ${state.formation.label} squad finished ${recordStr}. ${state.record.w >= 20 ? 'A strong season!' : state.record.w >= 10 ? 'A respectable campaign.' : 'Tough season — better luck next time.'}`}
        ${qualified ? `<br><br><span style="color:#4caf50;">Qualified for playoffs as #${seed} seed in the West!</span>` : ''}
        <br><br>
        <span style="color:#555;">${DIFFICULTIES[state.difficulty].label} · ${state.formation.label} · Team rating: ${state.teamRating}</span>
      </div>

      <div class="result-team">${teamHtml}</div>
      <div class="result-actions">
        ${playoffBtn}
        <button class="btn btn-secondary" onclick="restart()">Try Again</button>
        <button class="btn btn-secondary" onclick="downloadShareImage()">Share Result</button>
      </div>
    </div>
  `;
}

function showStandings() {
  generateStandings();
  state.phase = 'standings';
  render();
}

function renderStandings(app) {
  generateStandings();
  const { east, west } = state.standings;
  const seed = state.userConfSeed;
  const qualified = seed && seed <= PLAYOFF_TEAMS;

  function tableHtml(conf, label) {
    const rows = conf.map((t, i) => {
      const s = i + 1;
      const isUser = t.userTeam;
      const isCutoff = s === PLAYOFF_TEAMS;
      return `<tr class="${isUser ? 'user-row' : ''}">
        <td class="s-seed">${s}</td>
        <td class="s-team">${t.abbr}</td>
        <td>${t.w}–${t.d}–${t.l}</td>
        <td class="s-pts">${t.pts}</td>
        <td class="s-rating">${t.rating}</td>
      </tr>${isCutoff ? '<tr class="playoff-line"><td colspan="5"></td></tr>' : ''}`;
    }).join('');
    return `<div class="standings-conf">
      <h2>${label}</h2>
      <table class="standings-table">
        <tr><th>#</th><th class="s-team">Team</th><th>W-D-L</th><th>Pts</th><th>Rtg</th></tr>
        ${rows}
      </table>
    </div>`;
  }

  const userInfo = qualified
    ? `<div style="text-align:center;margin-bottom:16px;color:#4caf50;font-size:0.9rem;">
        You finished #${seed} in the West — qualified for playoffs!
       </div>`
    : `<div style="text-align:center;margin-bottom:16px;color:#f44336;font-size:0.9rem;">
        You finished #${seed} in the West — missed the playoffs.
       </div>`;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">Final Standings</p>
    ${userInfo}
    <div class="standings-wrap">
      ${tableHtml(west, 'Western Conference')}
      ${tableHtml(east, 'Eastern Conference')}
    </div>
    <div style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      ${qualified ? `<button class="btn btn-primary" onclick="enterPlayoffs()">Enter Playoffs</button>` : ''}
      <button class="btn btn-secondary" onclick="restart()">Try Again</button>
    </div>
  `;
}

function renderChampion(app) {
  const won = state.wonPlayoffs;
  const recordStr = `${state.record.w}W-${state.record.d}D-${state.record.l}L`;
  const playoffStr = `${state.playoffRecord.w}W – ${state.playoffRecord.l}L`;
  const teamHtml = state.slots.map(s =>
    `<span class="rt-player">${POS_LABELS[s.pos]} ${s.player.fullName} (${s.player.rating}) &middot; ${s.player.teamAbbr} ${s.player.year}</span>`
  ).join('');

  let title, detail, bigClass;
  if (won) {
    title = 'MLS CUP CHAMPIONS!';
    detail = 'You did it. From the draft to the final — champions.';
    bigClass = 'champion';
  } else {
    const lastRound = state.playoffLog.filter(r => r.round !== 'Eliminated').pop();
    const round = lastRound ? lastRound.round : 'Playoffs';
    title = `Eliminated — ${round}`;
    detail = `Your run ended in the ${round}. Playoff record: ${playoffStr}`;
    bigClass = 'normal';
  }

  app.innerHTML = `
    <div class="result-screen">
      <div class="big-record ${bigClass}">${won ? 'CHAMPIONS' : recordStr}</div>
      <div class="result-title">${title}</div>
      <div class="result-detail">
        ${detail}
        <br><br>
        <span style="color:#555;">Season: ${recordStr} · Playoffs: ${playoffStr} · ${DIFFICULTIES[state.difficulty].label} · ${state.formation.label}</span>
      </div>

      <div class="result-team">${teamHtml}</div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="restart()">Try Again</button>
        <button class="btn btn-secondary" onclick="downloadShareImage()">Share Result</button>
      </div>
    </div>
  `;
}

function restart() {
  resetState();
  state.phase = 'splash';
  render();
}

// ========== SHARE IMAGE ==========
function downloadShareImage() {
  const W = 600, H = 850;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawPitch(px, py, pw, ph) {
    ctx.fillStyle = '#2d7d3a';
    roundRect(px, py, pw, ph, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    roundRect(px, py, pw, ph, 4); ctx.stroke();

    const cx = px + pw / 2, cy = py + ph / 2;
    ctx.beginPath(); ctx.moveTo(px, cy); ctx.lineTo(px + pw, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();

    const paW = pw * 0.6, paH = ph * 0.2;
    roundRect(px + (pw - paW) / 2, py, paW, paH, 2); ctx.stroke();
    roundRect(px + (pw - paW) / 2, py + ph - paH, paW, paH, 2); ctx.stroke();

    const gW = pw * 0.18, gH = 8;
    roundRect(px + (pw - gW) / 2, py - gH, gW, gH, 2); ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill(); ctx.stroke();
    roundRect(px + (pw - gW) / 2, py + ph, gW, gH, 2); ctx.fill(); ctx.stroke();
  }

  function drawCard(cx, cy, cw, ch, slot, st) {
    const x = cx - cw / 2, y = cy - ch / 2;
    const pos = slot.pos;
    const colors = { G: '#FFD700', D: '#4CAF50', M: '#2196F3', F: '#F44336' };
    const col = colors[pos] || '#888';
    const name = (slot.player.fullName || '').split(' ').pop().substring(0, 12);
    const rat = slot.player.rating;

    roundRect(x, y, cw, ch, 6);
    ctx.fillStyle = '#232323'; ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5;
    roundRect(x, y, cw, ch, 6); ctx.stroke();

    roundRect(x + 2, y + 5, 3, ch - 10, 1.5);
    ctx.fillStyle = col; ctx.fill();

    ctx.fillStyle = col;
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(POS_LABELS[pos], x + 10, y + 6);

    const rcX = x + cw - 16, rcY = y + 10, rcR = 11;
    ctx.beginPath(); ctx.arc(rcX, rcY, rcR, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.fillStyle = '#111';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(rat, rcX, rcY);

    ctx.fillStyle = '#e0e0e0';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(name, cx, y + 23);

    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    if (pos === 'G') {
      ctx.fillStyle = '#64b5f6';
      ctx.fillText('CS:' + st.cleanSheets + '  M:' + st.motm, cx, y + 48);
    } else {
      ctx.fillStyle = '#8bc34a';
      ctx.fillText('G:' + st.goals + '  A:' + st.assists, cx, y + 48);
    }
  }

  // Background
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = '#E80A4D';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('34-0', 30, 16);

  const recordStr = state.record.w + 'W-' + state.record.d + 'D-' + state.record.l + 'L';
  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(recordStr, W - 30, 20);

  const perfect = isPerfect();
  const champion = state.wonPlayoffs;
  let verdict;
  if (champion && perfect) verdict = 'PERFECT SEASON & MLS CUP CHAMPIONS!';
  else if (champion) verdict = 'MLS CUP CHAMPIONS!';
  else if (perfect) verdict = 'PERFECT SEASON! 34-0-0!';
  else verdict = state.record.w >= 20 ? 'A strong season!' : state.record.w >= 10 ? 'A respectable campaign.' : 'Tough season.';
  ctx.fillStyle = (perfect || champion) ? '#FFD700' : '#888';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(verdict, W / 2, 52);

  const infoLine = DIFFICULTIES[state.difficulty].label + ' \u00b7 ' + state.formation.label + ' \u00b7 ' + state.teamRating + ' avg';
  ctx.fillStyle = '#666';
  ctx.font = '11px sans-serif';
  ctx.fillText(infoLine, W / 2, 68);

  // Pitch
  const pX = 50, pY = 96, pW = 500, pH = 460;
  drawPitch(pX, pY, pW, pH);

  // Player cards
  const rows = [
    { pos: 'F', pct: 0.14 },
    { pos: 'M', pct: 0.36 },
    { pos: 'D', pct: 0.60 },
    { pos: 'G', pct: 0.84 },
  ];
  for (const r of rows) {
    const slots = state.slots.filter(s => s.pos === r.pos);
    if (!slots.length) continue;
    const cW = Math.min(155, Math.floor((pW - 16) / slots.length - 6));
    const cH = 74;
    const totalW = slots.length * cW + (slots.length - 1) * 6;
    const startX = pX + (pW - totalW) / 2 + cW / 2;
    const cY = pY + pH * r.pct;
    for (let i = 0; i < slots.length; i++) {
      const st = state.playerStats[slots[i].player.id] || { goals: 0, assists: 0, cleanSheets: 0, motm: 0 };
      drawCard(startX + i * (cW + 6), cY, cW, cH, slots[i], st);
    }
  }

  // Leaders
  const ps = state.playerStats;
  const topScorer = Object.values(ps).sort(function(a,b){return b.goals-a.goals})[0];
  const topAssist = Object.values(ps).sort(function(a,b){return b.assists-a.assists})[0];
  const topCS = Object.values(ps).sort(function(a,b){return b.cleanSheets-a.cleanSheets})[0];
  const topMotm = Object.values(ps).sort(function(a,b){return b.motm-a.motm})[0];

  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(30, 590, W - 60, 1);
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  var leaders = [];
  if (topScorer) leaders.push('Goals: ' + topScorer.name + ' (' + topScorer.goals + ')');
  if (topAssist) leaders.push('Assists: ' + topAssist.name + ' (' + topAssist.assists + ')');
  if (topCS) leaders.push('CS: ' + topCS.name + ' (' + topCS.cleanSheets + ')');
  if (topMotm) leaders.push('MOTM: ' + topMotm.name + ' (' + topMotm.motm + ')');
  ctx.fillStyle = '#888';
  ctx.fillText(leaders.join('  \u00b7  '), W / 2, 600);

  // Playoff result
  if (state.wonPlayoffs) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MLS CUP CHAMPIONS', W / 2, 635);
  } else if (state.playoffRecord.w > 0 || state.playoffRecord.l > 0) {
    const playoffRec = state.playoffRecord.w + 'W-' + state.playoffRecord.l + 'L';
    const lastRound = state.playoffLog.filter(r => r.round !== 'Eliminated').pop();
    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Playoffs: ' + playoffRec + '  |  ' + (lastRound ? lastRound.round : ''), W / 2, 635);
  }

  // Footer
  ctx.fillStyle = '#555';
  ctx.font = '10px sans-serif';
  ctx.fillText('stljakeh.github.io/Sports/34-0.html', W / 2, 830);

  // Show in modal
  var dataUrl = canvas.toDataURL('image/png');
  var modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-box" style="max-width:660px;padding:20px;">
      <img src="` + dataUrl + `" style="width:100%;border-radius:8px;display:block;" alt="34-0 Result">
      <div style="text-align:center;margin-top:12px;color:#888;font-size:0.75rem;">
        Press and hold on iOS to save · <a download="34-0-result.png" href="` + dataUrl + `" style="color:#E80A4D;text-decoration:none;font-weight:600;">Download</a>
      </div>
    </div>
  `;
  modal.classList.add('active');
}

// ========== INIT ==========
render();
</script>
