<style>

/* ===== LOADING ===== */
.loading { text-align: center; padding: 60px; color: #666; font-size: 0.9rem; }
.loading .lds-ring { position: relative; display: inline-block; width: 40px; height: 40px; margin-bottom: 16px; }
.loading .lds-ring div {

  margin: 4px; border: 3px solid #E80A4D; border-radius: 50%; animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  border-color: #E80A4D transparent transparent transparent;
}
@keyframes lds-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* ===== MISC ===== */
.hidden { display: none; }

@media (max-width: 640px) {
  body { padding: 16px; }

  .pitch-slot .ps-name { font-size: 0.6rem; }
  .game-grid { grid-template-columns: repeat(3, 1fr); }
  .modal-box { padding: 24px; }
  .splash h1 { font-size: 3rem; }
  .result-screen .big-record { font-size: 3rem; }
}
</style>

<script>
// ========== CONFIGURATION ==========
const FORMATIONS = {
  '4-3-3': { gk: 1, def: 4, mid: 3, fwd: 3, label: '4-3-3', desc: '1 GK · 4 DEF · 3 MID · 3 FWD' },
  '4-4-2': { gk: 1, def: 4, mid: 4, fwd: 2, label: '4-4-2', desc: '1 GK · 4 DEF · 4 MID · 2 FWD' },
  '3-5-2': { gk: 1, def: 3, mid: 5, fwd: 2, label: '3-5-2', desc: '1 GK · 3 DEF · 5 MID · 2 FWD' },
  '3-4-3': { gk: 1, def: 3, mid: 4, fwd: 3, label: '3-4-3', desc: '1 GK · 3 DEF · 4 MID · 3 FWD' },
  '5-3-2': { gk: 1, def: 5, mid: 3, fwd: 2, label: '5-3-2', desc: '1 GK · 5 DEF · 3 MID · 2 FWD' },
};
const POS_COLORS = { G: '#C41E3A', D: '#003087', M: '#E80A4D', F: '#00529B' };
const POS_LABELS = { G: 'GK', D: 'DEF', M: 'MID', F: 'FWD' };
const MIN_SEASON = 1996;
const MAX_SEASON = 2026;
const POOL_SIZE = 20;
const TOTAL_GAMES = 34;
const DRAW_RATE = 0.18;
const DIFFICULTIES = {
  easy: { label: 'Easy', poolSize: 30, ratingBonus: 5, drawRate: 0.10, oppMin: 35, oppRange: 30, noiseRange: 8, desc: 'More teams, higher ratings, weaker opponents' },
  normal: { label: 'Normal', poolSize: 20, ratingBonus: 0, drawRate: 0.18, oppMin: 45, oppRange: 40, noiseRange: 10, desc: 'Balanced challenge' },
  hard: { label: 'Hard', poolSize: 10, ratingBonus: -5, drawRate: 0.25, oppMin: 50, oppRange: 45, noiseRange: 14, desc: 'Fewer teams, lower ratings, stronger opponents' },
};

// ========== MLS TEAMS ==========
const allMlsTeams = [
  { id: '18418', name: 'Atlanta United FC', abbr: 'ATL' },
  { id: '20906', name: 'Austin FC', abbr: 'ATX' },
  { id: '9720',  name: 'CF Montréal', abbr: 'MTL' },
  { id: '21300', name: 'Charlotte FC', abbr: 'CLT' },
  { id: '182',   name: 'Chicago Fire FC', abbr: 'CHI' },
  { id: '184',   name: 'Colorado Rapids', abbr: 'COL' },
  { id: '183',   name: 'Columbus Crew', abbr: 'CLB' },
  { id: '193',   name: 'D.C. United', abbr: 'DC' },
  { id: '18267', name: 'FC Cincinnati', abbr: 'CIN' },
  { id: '185',   name: 'FC Dallas', abbr: 'DAL' },
  { id: '6077',  name: 'Houston Dynamo FC', abbr: 'HOU' },
  { id: '20232', name: 'Inter Miami CF', abbr: 'MIA' },
  { id: '187',   name: 'LA Galaxy', abbr: 'LA' },
  { id: '18966', name: 'LAFC', abbr: 'LAFC' },
  { id: '17362', name: 'Minnesota United FC', abbr: 'MIN' },
  { id: '18986', name: 'Nashville SC', abbr: 'NSH' },
  { id: '189',   name: 'New England Revolution', abbr: 'NE' },
  { id: '17606', name: 'New York City FC', abbr: 'NYC' },
  { id: '12011', name: 'Orlando City SC', abbr: 'ORL' },
  { id: '10739', name: 'Philadelphia Union', abbr: 'PHI' },
  { id: '9723',  name: 'Portland Timbers', abbr: 'POR' },
  { id: '4771',  name: 'Real Salt Lake', abbr: 'RSL' },
  { id: '190',   name: 'Red Bull New York', abbr: 'RBNY' },
  { id: '22529', name: 'San Diego FC', abbr: 'SD' },
  { id: '191',   name: 'San Jose Earthquakes', abbr: 'SJ' },
  { id: '9726',  name: 'Seattle Sounders FC', abbr: 'SEA' },
  { id: '186',   name: 'Sporting Kansas City', abbr: 'SKC' },
  { id: '21812', name: 'St. Louis CITY SC', abbr: 'STL' },
  { id: '7318',  name: 'Toronto FC', abbr: 'TOR' },
  { id: '9727',  name: 'Vancouver Whitecaps', abbr: 'VAN' },
];

// ========== STATE ==========
const state = {
  phase: 'splash',
  difficulty: null,
  formation: null,
  slots: [],
  activeSlot: -1,
  teamPool: [],
  usedPool: new Set(),
  teamRating: 0,
  games: [],
  currentGame: 0,
  record: { w: 0, d: 0, l: 0 },
  playerStats: {},
};

function createSlots(f) {
  const arr = [];
  for (let i = 0; i < f.gk; i++) arr.push({ pos: 'G', player: null, teamEntry: null });
  for (let i = 0; i < f.def; i++) arr.push({ pos: 'D', player: null, teamEntry: null });
  for (let i = 0; i < f.mid; i++) arr.push({ pos: 'M', player: null, teamEntry: null });
  for (let i = 0; i < f.fwd; i++) arr.push({ pos: 'F', player: null, teamEntry: null });
  return arr;
}

function resetState() {
  state.difficulty = null;
  state.formation = null;
  state.slots = [];
  state.activeSlot = -1;
  state.teamPool = [];
  state.usedPool = new Set();
  state.teamRating = 0;
  state.games = [];
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.playerStats = {};
}

// ========== API ==========
async function fetchRoster(teamId, season) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/${teamId}/roster?season=${season}`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (!data.athletes || data.athletes.length === 0) return null;
  return data.athletes;
}

// ========== PLAYER RATINGS ==========
function extractStat(athlete, name) {
  const stats = athlete.statistics;
  if (!stats) return 0;
  for (const sk in stats) {
    const splits = stats[sk];
    if (!splits || !splits.categories) continue;
    for (const cat of splits.categories) {
      if (!cat.stats) continue;
      for (const s of cat.stats) {
        if (s.name === name && s.value != null) return s.value;
      }
    }
  }
  return 0;
}

function computeRating(athlete, noiseRange, bonus) {
  const pos = (athlete.position && athlete.position.abbreviation) || 'M';
  const apps = extractStat(athlete, 'appearances');
  const goals = extractStat(athlete, 'totalGoals');
  const assists = extractStat(athlete, 'goalAssists');
  let base;
  if (pos === 'G') {
    base = 40 + apps * 0.4 + extractStat(athlete, 'saves') * 0.2;
  } else if (pos === 'D') {
    base = 48 + apps * 0.25 + goals * 1.5;
  } else if (pos === 'M') {
    base = 40 + apps * 0.3 + (goals + assists) * 1.2;
  } else {
    base = 35 + apps * 0.2 + goals * 1.6 + assists * 0.6;
  }
  const nr = noiseRange || 10;
  const noise = Math.random() * nr - nr / 2;
  return Math.round(Math.max(40, Math.min(99, base + noise + (bonus || 0))));
}

// ========== POOL PRE-FETCH ==========
async function preFetchPool(size, noiseRange, bonus) {
  const pool = [];
  const usedCombos = new Set();
  while (pool.length < size) {
    const team = allMlsTeams[Math.floor(Math.random() * allMlsTeams.length)];
    const year = MIN_SEASON + Math.floor(Math.random() * (MAX_SEASON - MIN_SEASON + 1));
    const key = `${team.id}-${year}`;
    if (usedCombos.has(key)) continue;
    usedCombos.add(key);
    const roster = await fetchRoster(team.id, year);
    if (!roster || roster.length === 0) continue;
    const enriched = roster.filter(a => extractStat(a, 'appearances') > 0).map(a => ({
      id: a.id,
      fullName: a.fullName,
      rating: computeRating(a, noiseRange, bonus),
      pos: (a.position && a.position.abbreviation) || 'M',
    }));
    enriched.sort((a, b) => (a.pos !== b.pos ? (a.pos < b.pos ? -1 : 1) : (b.rating || 0) - (a.rating || 0)));
    pool.push({ team: { id: team.id, name: team.name, abbr: team.abbr }, year, roster: enriched });
  }
  return pool;
}

// ========== DRAFT LOGIC ==========
function allSlotsFilled() {
  return state.slots.every(s => s.player !== null);
}

function filledCount() {
  return state.slots.filter(s => s.player !== null).length;
}

function findTeamForPosition(pos) {
  const available = [];
  for (let i = 0; i < state.teamPool.length; i++) {
    if (state.usedPool.has(i)) continue;
    if (state.teamPool[i].roster.some(p => p.pos === pos)) {
      available.push({ idx: i, entry: state.teamPool[i] });
    }
  }
  if (available.length === 0) return null;
  const pick = available[Math.floor(Math.random() * available.length)];
  state.usedPool.add(pick.idx);
  return pick.entry;
}

function getAvailablePlayers(entry, pos) {
  const draftedIds = new Set(state.slots.filter(s => s.player).map(s => s.player.id));
  const pool = entry.roster.filter(p => p.pos === pos && !draftedIds.has(p.id));
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 3);
}

function selectSlot(index) {
  const slot = state.slots[index];
  if (!slot) return;

  if (slot.player) {
    state.activeSlot = index;
    render();
    return;
  }

  let attempts = 0;
  let teamEntry;
  do {
    teamEntry = findTeamForPosition(slot.pos);
    if (!teamEntry) break;
    const avail = getAvailablePlayers(teamEntry, slot.pos);
    if (avail.length > 0) break;
    attempts++;
  } while (attempts < 20);

  if (teamEntry && getAvailablePlayers(teamEntry, slot.pos).length > 0) {
    slot.teamEntry = teamEntry;
    state.activeSlot = index;
    render();
  }
}

function cancelPick() {
  state.activeSlot = -1;
  render();
}

function fillSlot(player, slotIdx) {
  const slot = state.slots[slotIdx];
  if (!slot) return;
  slot.player = {
    fullName: player.fullName,
    pos: player.pos,
    rating: player.rating,
    id: player.id,
    teamName: slot.teamEntry ? slot.teamEntry.team.name : '',
    teamAbbr: slot.teamEntry ? slot.teamEntry.team.abbr : '',
    year: slot.teamEntry ? slot.teamEntry.year : '',
  };
  state.activeSlot = -1;
  if (allSlotsFilled()) {
    startSeason();
  } else {
    render();
  }
}

function startSeason() {
  const ratings = state.slots.map(s => s.player.rating);
  state.teamRating = Math.round(ratings.reduce((a, b) => a + b, 0) / ratings.length);
  const diff = DIFFICULTIES[state.difficulty];
  state.games = [];
  for (let i = 0; i < TOTAL_GAMES; i++) {
    const team = allMlsTeams[Math.floor(Math.random() * allMlsTeams.length)];
    const rating = Math.round(diff.oppMin + Math.random() * diff.oppRange);
    state.games.push({ team, rating, result: null, score: null });
  }
  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.playerStats = {};
  state.slots.forEach(s => {
    state.playerStats[s.player.id] = { goals: 0, assists: 0, cleanSheets: 0, motm: 0, pos: s.player.pos, name: s.player.fullName };
  });
  state.phase = 'season';
  render();
}

// ========== SEASON LOGIC ==========
function simulateGame(userRating, oppRating, drawRate) {
  const winProb = userRating / (userRating + oppRating);
  const adjWinProb = winProb * (1 - (drawRate || DRAW_RATE));
  const r = Math.random();
  if (r < adjWinProb) return 'W';
  if (r < adjWinProb + DRAW_RATE) return 'D';
  return 'L';
}

function generateScore(result, userRating, oppRating) {
  const diff = userRating - oppRating;
  const base = Math.max(0, Math.min(4, Math.round(1 + (diff / 30) + (Math.random() - 0.3))));
  if (result === 'W') {
    const ourGoals = Math.max(1, base + 1);
    const theirGoals = Math.max(0, Math.min(ourGoals - 1, Math.round(base * 0.4 + Math.random())));
    return { us: ourGoals, them: theirGoals };
  } else if (result === 'D') {
    const g = Math.round(Math.random() * 2);
    return { us: g, them: g };
  } else {
    const theirGoals = Math.max(1, base + 2);
    const ourGoals = Math.max(0, Math.min(theirGoals - 1, Math.round(base * 0.3 + Math.random() - 0.3)));
    return { us: ourGoals, them: theirGoals };
  }
}

function distributeStats(score) {
  const us = score.us;
  const cleanSheet = score.them === 0;
  const contrib = {};
  state.slots.forEach(s => contrib[s.player.id] = { g: 0, a: 0 });

  const goalPool = [];
  state.slots.forEach(s => {
    const w = { F: 65, M: 25, D: 8, G: 2 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) goalPool.push(s.player.id);
  });
  for (let i = 0; i < us; i++) {
    const id = goalPool[Math.floor(Math.random() * goalPool.length)];
    contrib[id].g++;
  }

  const assistPool = [];
  state.slots.forEach(s => {
    const w = { G: 2, D: 13, M: 50, F: 35 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) assistPool.push(s.player.id);
  });
  for (let i = 0; i < us; i++) {
    if (Math.random() < 0.6) {
      const id = assistPool[Math.floor(Math.random() * assistPool.length)];
      contrib[id].a++;
    }
  }

  let motmId = null, motmScore = -1;
  for (const s of state.slots) {
    const pid = s.player.id;
    const c = contrib[pid];
    state.playerStats[pid].goals += c.g;
    state.playerStats[pid].assists += c.a;
    const cs = cleanSheet && (s.player.pos === 'G' || s.player.pos === 'D') ? 1 : 0;
    state.playerStats[pid].cleanSheets += cs;
    const perf = c.g * 3 + c.a * 2 + cs * 2 + Math.random() * 3;
    if (perf > motmScore) { motmScore = perf; motmId = pid; }
  }
  if (motmId) state.playerStats[motmId].motm++;
  return motmId;
}

function advanceGame() {
  const idx = state.currentGame;
  if (idx >= TOTAL_GAMES) return null;
  const game = state.games[idx];
  const diff = DIFFICULTIES[state.difficulty];
  const outcome = simulateGame(state.teamRating, game.rating, diff.drawRate);
  const score = generateScore(outcome, state.teamRating, game.rating);
  game.result = outcome;
  game.score = score;
  const motmId = distributeStats(score);
  game.motm = motmId;
  state.record[outcome === 'W' ? 'w' : outcome === 'D' ? 'd' : 'l']++;
  state.currentGame++;
  return { outcome, score, game };
}

function isSeasonComplete() { return state.currentGame >= TOTAL_GAMES; }
function isPerfect() { return state.record.w === TOTAL_GAMES && state.record.d === 0 && state.record.l === 0; }

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  switch (state.phase) {
    case 'splash': renderSplash(app); break;
    case 'formation': renderFormation(app); break;
    case 'draft': renderDraft(app); break;
    case 'season': renderSeason(app); break;
    case 'result': renderResult(app); break;
  }
}

function renderSplash(app) {
  const diffCards = Object.entries(DIFFICULTIES).map(([key, d]) => `
    <div class="formation-card" onclick="selectDifficulty('${key}')">
      <div class="f-name">${d.label}</div>
      <div class="f-detail">${d.desc}</div>
    </div>
  `).join('');
  app.innerHTML = `
    <div class="splash">
      <h1>34-0</h1>
      <p class="tagline">Draft. Simulate. Conquer.</p>
      <p class="goal">Draft a team of MLS players from across history and try to go a perfect 34-0-0. Pick your difficulty, choose a formation, then fill each position from randomly rolled teams. Can you finish flawless?</p>
      <div style="max-width:500px;margin:0 auto;">
        <div class="formation-grid">${diffCards}</div>
      </div>
    </div>
  `;
}

function selectDifficulty(key) {
  state.difficulty = key;
  state.phase = 'formation';
  render();
}

function renderFormation(app) {
  const diff = DIFFICULTIES[state.difficulty];
  const cards = Object.entries(FORMATIONS).map(([key, f]) => `
    <div class="formation-card" onclick="selectFormation('${key}')">
      <div class="f-name">${f.label}</div>
      <div class="f-detail">${f.desc}</div>
    </div>
  `).join('');
  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle"><span style="color:#E80A4D;">${diff.label}</span> &middot; Choose your formation</p>
    <div class="formation-grid">${cards}</div>
  `;
}

async function selectFormation(key) {
  state.formation = FORMATIONS[key];
  state.slots = createSlots(state.formation);
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="lds-ring"><div></div></div>Fetching historic rosters...</div>`;
  const diff = DIFFICULTIES[state.difficulty];
  state.teamPool = await preFetchPool(diff.poolSize, diff.noiseRange, diff.ratingBonus);
  if (state.teamPool.length < 11) {
    app.innerHTML = `<div style="text-align:center;padding:60px;color:#f44336;">Couldn't build a valid draft pool. <button class="btn btn-primary" onclick="selectFormation('${key}')">Retry</button></div>`;
    return;
  }
  state.activeSlot = -1;
  state.phase = 'draft';
  render();
}

function renderDraft(app) {
  if (state.activeSlot >= 0 && state.activeSlot < state.slots.length) {
    renderPickView(app);
  } else {
    renderSlotGrid(app);
  }
}

function renderSlotGrid(app) {
  const filled = filledCount();
  const total = state.slots.length;
  const remaining = state.teamPool.length - state.usedPool.size;

  const formationRows = buildFormationRows();

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${state.formation.label} — tap an empty slot to draft</p>

    <div class="pitch-header">
      <div class="ph-info">Filled: <strong>${filled}/${total}</strong></div>
      <div class="ph-info">Pool: <strong>${remaining}</strong> teams remaining</div>
    </div>

    <div class="pitch">
      ${formationRows}
    </div>

    ${allSlotsFilled()
      ? `<div style="text-align:center;"><button class="btn btn-primary" onclick="startSeason()">Start Season</button></div>`
      : remaining === 0
        ? `<div style="text-align:center;color:#f44336;font-size:0.85rem;">Pool exhausted — <button class="btn btn-secondary" onclick="selectFormation('${state.formation.label}')">Re-roll Pool</button></div>`
        : ''}
  `;
}

function buildFormationRows() {
  const slotHtml = (idx) => {
    const s = state.slots[idx];
    const color = POS_COLORS[s.pos];
    const label = POS_LABELS[s.pos];
    const filled = s.player !== null;
    return `<div class="pitch-slot ${filled ? 'filled' : 'empty'}" style="border-color:${color}" onclick="selectSlot(${idx})">
      <div class="ps-pos" style="color:${color}">${label}</div>
      ${filled
        ? `<div class="ps-name">${s.player.fullName}</div><div class="ps-rating">${s.player.rating}</div>`
        : `<div class="ps-empty">empty</div>`}
    </div>`;
  };

  const rows = [];
  const gkSlots = state.slots.filter(s => s.pos === 'G');
  const dSlots = state.slots.filter(s => s.pos === 'D');
  const mSlots = state.slots.filter(s => s.pos === 'M');
  const fSlots = state.slots.filter(s => s.pos === 'F');

  let idx = 0;
  if (gkSlots.length > 0) {
    let html = '<div class="pitch-row gk-row">';
    for (let i = 0; i < gkSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (dSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < dSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (mSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < mSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (fSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < fSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  return rows.join('');
}

function renderPickView(app) {
  const slot = state.slots[state.activeSlot];
  if (!slot) { state.activeSlot = -1; render(); return; }

  const entry = slot.teamEntry;
  if (!entry) { state.activeSlot = -1; render(); return; }

  const pick3 = getAvailablePlayers(entry, slot.pos);
  const available = pick3;

  const color = POS_COLORS[slot.pos];
  const label = POS_LABELS[slot.pos];
  const rePick = slot.player !== null;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${rePick ? 'Re-pick' : 'Draft'} — ${label}</p>

    <div class="pick-header">
      <div class="pick-team-info">
        <div class="pti-badge">${entry.team.abbr}</div>
        <div>
          <div class="pti-name">${entry.team.name}</div>
          <div class="pti-year">${entry.year} Season</div>
        </div>
      </div>
      <div style="font-size:0.8rem;color:#888;">
        Slot ${state.activeSlot + 1} of ${state.slots.length}
      </div>
    </div>

    <div class="player-grid">
      ${available.length === 0
        ? '<div style="text-align:center;padding:20px;color:#666;">No players available for this position from this team.</div>'
        : available.map(p => `
          <div class="player-card" onclick="fillSlotFromPool('${p.id}')">
            <div>
              <span class="pc-name">${p.fullName}</span>
              <span class="pc-pos">${p.pos}</span>
            </div>
            <div class="pc-rating">${p.rating}</div>
          </div>
        `).join('')}
    </div>

    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-secondary" onclick="cancelPick()">Cancel</button>
    </div>
  `;
}

function fillSlotFromPool(playerId) {
  const slot = state.slots[state.activeSlot];
  if (!slot || !slot.teamEntry) return;
  const player = slot.teamEntry.roster.find(p => p.id === playerId && p.pos === slot.pos);
  if (!player) return;
  fillSlot(player, state.activeSlot);
}

// ========== SEASON RENDER ==========
function renderSeason(app) {
  const posLabels = POS_LABELS;
  let gamePreview = '';
  let playBtn = '';

  if (!isSeasonComplete()) {
    const game = state.games[state.currentGame];
    const winProb = state.teamRating / (state.teamRating + game.rating);
    gamePreview = `
      <div class="game-preview">
        <div class="gp-num">Game ${state.currentGame + 1} of ${TOTAL_GAMES}</div>
        <div class="gp-matchup">${state.teamRating} vs ${game.team.abbr} (${game.rating})</div>
        <div class="gp-detail">Your team rating: ${state.teamRating} · Opponent rating: ${game.rating}</div>
        <div class="gp-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>
      </div>
    `;
    playBtn = `<div style="text-align:center;margin-top:8px;display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" onclick="playGame()">Play Next Game</button>
      <button class="btn btn-secondary" onclick="simAll()">Sim All</button>
    </div>`;
  } else {
    gamePreview = `<div class="game-preview"><div class="gp-num">Season Complete!</div></div>`;
    playBtn = `<div style="text-align:center;margin-top:8px;"><button class="btn btn-primary" onclick="showResult()">View Results</button></div>`;
  }

  const gameCells = state.games.map((g, i) => {
    let cls = 'game-cell';
    if (g.result) {
      const rcls = g.result === 'W' ? 'win' : g.result === 'D' ? 'draw' : 'loss';
      cls += ` ${rcls}`;
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result ${rcls}">${g.result} ${g.score.us}-${g.score.them}</div></div>`;
    } else if (i === state.currentGame) {
      cls += ' current';
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">${g.team.abbr}</div><div class="gc-result" style="color:#888;">?</div></div>`;
    } else {
      cls += ' upcoming';
      return `<div class="${cls}"><div class="gc-num">Game ${i + 1}</div><div class="gc-opp">?</div></div>`;
    }
  }).join('');

  const teamHtml = state.slots.map(s =>
    `<span class="rt-player">${posLabels[s.pos]} ${s.player.fullName} (${s.player.rating})</span>`
  ).join('');

  const diffLabel = DIFFICULTIES[state.difficulty].label;

  // Stats leaderboard
  const ps = state.playerStats;
  const topScorer = Object.values(ps).sort((a, b) => b.goals - a.goals)[0];
  const topAssist = Object.values(ps).sort((a, b) => b.assists - a.assists)[0];
  const topCS = Object.values(ps).sort((a, b) => b.cleanSheets - a.cleanSheets)[0];
  const topMotm = Object.values(ps).sort((a, b) => b.motm - a.motm)[0];
  const statsBar = `
    <div class="stats-bar">
      <span>⚽ Goals: <strong>${topScorer ? topScorer.name + ' (' + topScorer.goals + ')' : '0'}</strong></span>
      <span>🎯 Assists: <strong>${topAssist ? topAssist.name + ' (' + topAssist.assists + ')' : '0'}</strong></span>
      <span>🧤 Clean Sheets: <strong>${topCS ? topCS.name + ' (' + topCS.cleanSheets + ')' : '0'}</strong></span>
      <span>⭐ MOTM: <strong>${topMotm ? topMotm.name + ' (' + topMotm.motm + ')' : '0'}</strong></span>
    </div>
  `;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${diffLabel} &middot; ${state.formation.label} &middot; ${state.teamRating} avg rating</p>

    <div class="season-header">
      <div class="record-display">
        <div class="r-item r-win"><div class="r-num">${state.record.w}</div><div class="r-label">Wins</div></div>
        <div class="r-item r-draw"><div class="r-num">${state.record.d}</div><div class="r-label">Draws</div></div>
        <div class="r-item r-loss"><div class="r-num">${state.record.l}</div><div class="r-label">Losses</div></div>
      </div>
      <div class="rating-bar">
        <span>Team: <strong>${state.teamRating}</strong></span>
        <span>Games: <strong>${state.currentGame}/${TOTAL_GAMES}</strong></span>
      </div>
    </div>

    ${statsBar}

    ${gamePreview}
    ${playBtn}

    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px;background:#1a1a1a;border-radius:10px;border:1px solid #2a2a2a;">
      ${teamHtml}
    </div>

    <div class="game-grid">${gameCells}</div>
  `;
}

function playGame() {
  const result = advanceGame();
  if (!result) return;
  showGameResult(result);
  setTimeout(() => {
    closeModal();
    if (isSeasonComplete()) { state.phase = 'result'; render(); }
    else { render(); }
  }, 2000);
}

function showGameResult(result) {
  const modal = document.getElementById('modal');
  const labels = { W: 'WIN', D: 'DRAW', L: 'LOSS' };
  const colors = { W: 'win', D: 'draw', L: 'loss' };
  const game = state.games[state.currentGame - 1];
  const motmName = game.motm ? state.playerStats[game.motm]?.name || '' : '';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${colors[result.outcome]}">${labels[result.outcome]}</div>
      <div class="m-score">${result.score.us} - ${result.score.them}</div>
      <div class="m-sub">vs ${game.team.name} · Record: ${state.record.w}W-${state.record.d}D-${state.record.l}L</div>
      ${motmName ? `<div style="color:#ff9800;font-size:0.8rem;margin-top:8px;">⭐ ${motmName}</div>` : ''}
      <div style="color:#555;font-size:0.7rem;margin-top:4px;">Game ${state.currentGame} of ${TOTAL_GAMES}</div>
    </div>
  `;
  modal.classList.add('active');
}

function simAll() {
  while (!isSeasonComplete()) {
    advanceGame();
  }
  state.phase = 'result';
  render();
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
function showResult() { state.phase = 'result'; render(); }

function renderResult(app) {
  const perfect = isPerfect();
  const recordStr = `${state.record.w}W-${state.record.d}D-${state.record.l}L`;
  const teamHtml = state.slots.map(s =>
    `<span class="rt-player">${POS_LABELS[s.pos]} ${s.player.fullName} (${s.player.rating}) &middot; ${s.player.teamAbbr} ${s.player.year}</span>`
  ).join('');

  app.innerHTML = `
    <div class="result-screen">
      <div class="big-record ${perfect ? 'perfect' : 'normal'}">${recordStr}</div>
      <div class="result-title">${perfect ? 'PERFECT SEASON! 34-0-0!' : 'Season Complete'}</div>
      <div class="result-detail">
        ${perfect
          ? 'You did it. A flawless season. Every game. Every opponent. Undefeated.'
          : `Your ${state.formation.label} squad finished ${recordStr}. ${state.record.w >= 20 ? 'A strong season!' : state.record.w >= 10 ? 'A respectable campaign.' : 'Tough season — better luck next time.'}`}
        <br><br>
        <span style="color:#555;">${DIFFICULTIES[state.difficulty].label} · ${state.formation.label} · Team rating: ${state.teamRating}</span>
      </div>

      <table class="stats-table">
        <tr><th>Pos</th><th>Player</th><th class="num">G</th><th class="num">A</th><th class="num">CS</th><th class="num">MOTM</th></tr>
        ${state.slots.map(s => {
          const ps = state.playerStats[s.player.id] || { goals: 0, assists: 0, cleanSheets: 0, motm: 0 };
          return `<tr><td>${POS_LABELS[s.pos]}</td><td>${s.player.fullName}</td><td class="num">${ps.goals}</td><td class="num">${ps.assists}</td><td class="num">${ps.cleanSheets}</td><td class="num">${ps.motm}</td></tr>`;
        }).join('')}
      </table>

      <div class="result-team">${teamHtml}</div>

  `;
}

function restart() {
  resetState();
  state.phase = 'splash';
  render();
}

// ========== INIT ==========
render();
</script>
