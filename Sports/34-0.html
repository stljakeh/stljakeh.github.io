<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>34-0 - St. Louis Sports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #080e1a;
  --bg-1: #0e1a30;
  --navy: #1C3570;
  --mls-red: #E2231A;
  --gold: #f6c945;
  --gold-soft: #fde9a8;
  --silver: #c0c0c0;
  --card-bg: rgba(28, 53, 112, 0.15);
  --card-border: rgba(28, 53, 112, 0.4);
  --text-primary: #ecfdf5;
  --text-secondary: rgba(236, 253, 245, 0.6);
  --text-muted: rgba(236, 253, 245, 0.35);
  --pos-gk: #E2231A;
  --pos-def: #1C3570;
  --pos-mid: #c0c0c0;
  --pos-fwd: #E2231A;
  --tier-elite: #f6c945;
  --tier-playoff: #4ade80;
  --tier-mid: #94a3b8;
  --tier-rebuild: #fb7185;
}
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-0);
  background-image: radial-gradient(1200px 700px at 50% -10%, #1a3068 0%, transparent 60%), radial-gradient(900px 600px at 100% 100%, #0e1a30 0%, transparent 55%), linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
nav {
  width: 100%;
  max-width: 960px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--card-border);
  backdrop-filter: blur(8px);
}
nav .nav-links { display: flex; gap: 20px; align-items: center; }
nav a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  transition: color 0.2s;
  text-transform: uppercase;
}
nav a:hover { color: var(--text-primary); }
nav .current {
  color: var(--text-primary);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}
nav .site-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}
#app { width: 100%; max-width: 960px; }
.page-title { text-align: center; margin-bottom: 8px; }
.page-title h1 {
  font-family: "Anton", Impact, sans-serif;
  font-size: 3rem;
  font-weight: 400;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold), var(--mls-red));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1.1;
}
.subtitle { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }

/* ===== SPLASH ===== */
.splash { text-align: center; padding: 60px 20px; }
.splash h1 {
  font-family: "Anton", Impact, sans-serif;
  font-size: 6rem;
  font-weight: 400;
  letter-spacing: 8px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold), var(--mls-red));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
  margin-bottom: 8px;
}
.splash .tagline { color: var(--text-secondary); font-size: 1rem; margin-bottom: 40px; }
.splash .goal { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; max-width: 500px; margin: 0 auto 32px; }

/* ===== FORMATION SELECTOR ===== */
.formation-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  max-width: 700px;
  margin: 32px auto;
}
.formation-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.formation-card:hover { border-color: var(--mls-red); background: rgba(226, 35, 26, 0.1); }
.formation-card .f-name {
  font-family: "Anton", Impact, sans-serif;
  font-size: 1.5rem;
  font-weight: 400;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.formation-card .f-detail { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.6; }

/* ===== PITCH ===== */
.pitch-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.pitch-header .ph-info { font-size: 0.8rem; color: var(--text-secondary); }
.pitch-header .ph-info strong { color: var(--text-primary); }
.pitch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 24px 12px;
  background: var(--card-bg);
  background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 64px, transparent 64px 128px);
  border-radius: 16px;
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
}
.pitch-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.pitch-row.gk-row { margin-bottom: 6px; }
.pitch-slot {
  width: 90px;
  min-height: 92px;
  padding: 10px 8px;
  background: var(--card-bg);
  border: 2px solid;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.pitch-slot:hover { transform: scale(1.05); background: rgba(28, 53, 112, 0.25); }
.pitch-slot .ps-pos {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 2px;
}
.pitch-slot .ps-name { font-size: 0.7rem; font-weight: 600; line-height: 1.2; margin-top: 4px; color: var(--text-primary); }
.pitch-slot .ps-rating { font-size: 0.65rem; color: var(--gold); margin-top: 2px; }
.pitch-slot .ps-empty { font-size: 0.65rem; color: var(--text-muted); font-style: italic; margin-top: 4px; }
.pitch-slot.empty { border-style: dashed; opacity: 0.7; }
.pitch-slot.filled { cursor: pointer; }

/* ===== CLUB ERA SPIN ===== */
.spin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.spin-header .sh-left { display: flex; align-items: center; gap: 12px; }
.spin-header .sh-badge {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--mls-red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.7rem;
  color: #fff;
  flex-shrink: 0;
}
.spin-header .sh-name { font-weight: 700; font-size: 0.9rem; }
.spin-header .sh-year { color: var(--text-secondary); font-size: 0.75rem; }
.spin-header .sh-tier {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 700;
}
.sh-tier.elite { background: rgba(246, 201, 69, 0.2); color: var(--tier-elite); }
.sh-tier.playoff { background: rgba(74, 222, 128, 0.2); color: var(--tier-playoff); }
.sh-tier.mid { background: rgba(148, 163, 184, 0.2); color: var(--tier-mid); }
.sh-tier.rebuild { background: rgba(251, 113, 133, 0.2); color: var(--tier-rebuild); }

/* ===== PICK VIEW ===== */
.pick-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.pick-team-info { display: flex; align-items: center; gap: 12px; }
.pick-team-info .pti-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--mls-red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.65rem;
  color: #fff;
  flex-shrink: 0;
}
.pick-team-info .pti-name { font-weight: 700; font-size: 0.9rem; }
.pick-team-info .pti-year { color: var(--text-secondary); font-size: 0.75rem; }
.player-grid { display: grid; gap: 8px; }
.player-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.player-card:hover { border-color: var(--mls-red); background: rgba(226, 35, 26, 0.1); }
.player-card .pc-name { font-weight: 600; font-size: 0.85rem; }
.player-card .pc-rating {
  background: rgba(246, 201, 69, 0.2);
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--gold);
}
.player-card .pc-pos {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-left: 8px;
  font-weight: 700;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 28px;
  border: none;
  border-radius: 12px;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--mls-red); color: #fff; }
.btn-primary:hover { background: #c01e16; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--card-border); }
.btn-secondary:hover { background: rgba(28, 53, 112, 0.3); }
.btn-gold { background: var(--gold); color: #080e1a; }
.btn-gold:hover { background: #e0b830; }
.btn-reroll { background: rgba(246, 201, 69, 0.2); color: var(--gold); border: 1px solid rgba(246, 201, 69, 0.3); }
.btn-reroll:hover { background: rgba(246, 201, 69, 0.3); }
.btn-reroll:disabled { opacity: 0.3; cursor: not-allowed; }

/* ===== SEASON ===== */
.season-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--card-border);
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.record-display { display: flex; gap: 16px; align-items: center; }
.record-display .r-item { text-align: center; }
.record-display .r-num { font-size: 1.3rem; font-weight: 800; }
.record-display .r-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; }
.record-display .r-win .r-num { color: #4caf50; }
.record-display .r-draw .r-num { color: var(--gold); }
.record-display .r-loss .r-num { color: var(--mls-red); }
.game-preview {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
}
.game-preview .gp-num { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.game-preview .gp-matchup { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
.game-preview .gp-detail { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5; }
.game-preview .gp-win-prob { margin-top: 8px; font-size: 0.85rem; }
.game-preview .gp-win-prob strong { color: var(--gold); }
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  margin-top: 16px;
}
.game-cell {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 10px 6px;
  text-align: center;
  font-size: 0.7rem;
}
.game-cell .gc-num { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 3px; }
.game-cell .gc-opp { color: var(--text-secondary); margin-bottom: 3px; }
.game-cell .gc-result {
  font-weight: 700;
  font-size: 0.8rem;
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
}
.game-cell .gc-result.win { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
.game-cell .gc-result.draw { background: rgba(246, 201, 69, 0.2); color: var(--gold); }
.game-cell .gc-result.loss { background: rgba(226, 35, 26, 0.2); color: var(--mls-red); }
.game-cell.upcoming { opacity: 0.4; }
.game-cell.current { border-color: var(--mls-red); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  padding: 10px 16px;
  background: var(--card-bg);
  border-radius: 8px;
  border: 1px solid var(--card-border);
  margin-bottom: 12px;
  font-size: 0.75rem;
  color: var(--text-secondary);
}
.stats-bar strong { color: var(--text-primary); }

/* ===== WATCH MODE ===== */
.watch-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  flex-direction: column;
}
.watch-overlay.active { display: flex; }
.watch-pitch {
  width: 320px;
  height: 220px;
  background: var(--bg-1);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  position: relative;
  margin-bottom: 20px;
  overflow: hidden;
}
.watch-pitch .wp-field {
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
}
.watch-pitch .wp-center {
  position: absolute;
  top: 50%; left: 50%;
  width: 40px; height: 40px;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
}
.watch-pitch .wp-midline {
  position: absolute;
  top: 10px; left: 50%;
  width: 1px; height: calc(100% - 20px);
  background: rgba(255,255,255,0.1);
}
.watch-pitch .wp-penalty-a, .watch-pitch .wp-penalty-b {
  position: absolute;
  width: 60%; height: 18%;
  left: 20%;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 2px;
}
.watch-pitch .wp-penalty-a { top: 8%; }
.watch-pitch .wp-penalty-b { bottom: 8%; }
.watch-score {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.watch-score .ws-us { color: var(--text-primary); }
.watch-score .ws-them { color: var(--text-muted); }
.watch-score .ws-sep { color: var(--text-muted); margin: 0 12px; }
.watch-progress { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
.watch-event {
  padding: 8px 20px;
  margin: 4px 0;
  border-radius: 8px;
  font-size: 0.85rem;
  animation: slideIn 0.4s ease-out;
  max-width: 400px;
  text-align: center;
}
@keyframes slideIn {
  0% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 1; transform: translateY(0); }
}
.watch-event.ev-goal { background: rgba(246, 201, 69, 0.2); color: var(--gold); font-weight: 700; }
.watch-event.ev-save { background: rgba(28, 53, 112, 0.3); color: var(--text-secondary); }
.watch-event.ev-card { background: rgba(226, 35, 26, 0.2); color: var(--mls-red); }
.watch-event.ev-sub { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }
.watch-event.ev-whistle { background: transparent; color: var(--text-muted); font-size: 0.7rem; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--bg-1);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 32px 40px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  animation: pop-in 0.3s ease-out;
}
@keyframes pop-in { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
.modal-box .m-result { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
.modal-box .m-result.win { color: #4caf50; }
.modal-box .m-result.draw { color: var(--gold); }
.modal-box .m-result.loss { color: var(--mls-red); }
.modal-box .m-score { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 16px; }
.modal-box .m-sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

/* ===== RESULT ===== */
.result-screen { text-align: center; padding: 40px 20px; }
.result-screen .big-record {
  font-family: "Anton", Impact, sans-serif;
  font-size: 5rem;
  font-weight: 400;
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 8px;
}
.result-screen .big-record.perfect { color: var(--gold); animation: glow 2s ease-in-out infinite; }
@keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(246, 201, 69, 0.3); } 50% { text-shadow: 0 0 30px rgba(246, 201, 69, 0.7); } }
.result-screen .big-record.normal { color: var(--text-primary); }
.result-screen .big-record.champion { color: var(--gold); animation: glow 2s ease-in-out infinite; }
.result-screen .result-title { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 24px; }
.result-screen .result-detail { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
.result-screen .result-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.result-screen .result-team { display: inline-flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 24px; }
.result-screen .result-team .rt-player {
  padding: 4px 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  font-size: 0.75rem;
}

/* ===== PLAYOFFS ===== */
.standings-wrap { display: flex; gap: 20px; width: 100%; }
.standings-conf { flex: 1; min-width: 0; }
.standings-conf h2 { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
.standings-table th { color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; padding: 4px 6px; text-align: center; border-bottom: 1px solid var(--card-border); }
.standings-table td { padding: 5px 6px; text-align: center; border-bottom: 1px solid rgba(28, 53, 112, 0.2); }
.standings-table tr.user-row { background: rgba(226, 35, 26, 0.15); }
.standings-table tr.user-row td { color: var(--text-primary); font-weight: 600; }
.standings-table tr.playoff-line td { border-bottom: 2px solid var(--mls-red); }
.standings-table .s-team { text-align: left; }
.standings-table .s-pts { font-weight: 700; color: var(--gold); }
.standings-table .s-rating { color: var(--text-secondary); }
.standings-table .s-seed { font-weight: 700; color: var(--mls-red); }
.bracket {
  display: flex; justify-content: center; gap: 24px;
  padding: 16px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border); margin-bottom: 16px;
  overflow-x: auto; flex-wrap: wrap;
}
.bracket-round { min-width: 120px; }
.bracket-round h3 { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-align: center; }
.bracket-matchup {
  background: var(--bg-0); border: 1px solid var(--card-border); border-radius: 6px; padding: 6px 10px; margin-bottom: 6px;
  font-size: 0.7rem; text-align: center;
}
.bracket-matchup .bm-team { padding: 2px 0; }
.bracket-matchup .bm-team.active { color: var(--text-primary); font-weight: 700; }
.bracket-matchup .bm-team.eliminated { color: var(--text-muted); }
.bracket-matchup .bm-team.winner { color: #4caf50; }
.bracket-matchup .bm-team.loser { color: var(--text-muted); }
.bracket-matchup .bm-score { font-size: 0.6rem; color: var(--text-muted); }

// ========== SEEDED RNG ==========
function fnv1a(str) {
  let hash = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 16777619) >>> 0;
  }
  return hash;
}

function mulberry32(seed) {
  return function() {
    seed |= 0;
    seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function computeTier(rating) {

// ========== POOL GENERATION (CLUB-ERA SPINS) ==========
function shuffleArray(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor((rng || Math.random)() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function generateDraftPool(size) {
  const pool = [];
  const used = new Set();

  while (pool.length < size) {
    const club = MLS_CLUBS[Math.floor(Math.random() * MLS_CLUBS.length)];
    const era = club.eras[Math.floor(Math.random() * club.eras.length)];
    const key = club.id + '-' + era;
    if (used.has(key)) continue;
    used.add(key);

    const year = era + Math.floor(Math.random() * 10);
    const cappedYear = Math.min(year, MAX_SEASON);
    if (cappedYear < club.founded) continue;

    const roster = await fetchRoster(club.id, cappedYear);
    if (!roster || roster.length < 11) continue;

    const players = roster
      .filter(a => extractStat(a, 'appearances') > 3)
      .map(a => ({
        id: a.id,
        fullName: a.fullName,
        pos: (a.position && a.position.abbreviation) || 'M',
        apps: extractStat(a, 'appearances'),
        goals: extractStat(a, 'totalGoals'),
        assists: extractStat(a, 'goalAssists'),
      }));

    if (players.length < 11) continue;

    const avgRating = computeClubEraRating(players);
    const tier = computeTier(avgRating);

    pool.push({
      club,
      era,
      year: cappedYear,
      players,
      avgRating,
      tier,
    });
  }

  return pool;
}

function computeClubEraRating(players) {
  if (!players.length) return 40;
  let total = 0;
  for (const p of players) {
    let base;
    if (p.pos === 'G') base = 40 + p.apps * 0.4;
    else if (p.pos === 'D') base = 48 + p.apps * 0.25 + p.goals * 1.5;
    else if (p.pos === 'M') base = 40 + p.apps * 0.3 + (p.goals + p.assists) * 1.2;
    else base = 35 + p.apps * 0.2 + p.goals * 1.6 + p.assists * 0.6;
    total += Math.max(40, Math.min(99, base));
  }
  return Math.round(total / players.length);
}

function computePlayerRating(playerData, noiseRange) {
  const nr = noiseRange || 10;
  let base;
  if (playerData.pos === 'G') base = 40 + playerData.apps * 0.4;
  else if (playerData.pos === 'D') base = 48 + playerData.apps * 0.25 + playerData.goals * 1.5;
  else if (playerData.pos === 'M') base = 40 + playerData.apps * 0.3 + (playerData.goals + playerData.assists) * 1.2;
  else base = 35 + playerData.apps * 0.2 + playerData.goals * 1.6 + playerData.assists * 0.6;
  const noise = Math.random() * nr - nr / 2;
  return Math.round(Math.max(40, Math.min(99, base + noise)));
}

  renderPickView(document.getElementById('app'));

// ========== API ==========
async function fetchRoster(teamId, season) {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/' + teamId + '/roster?season=' + season;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (!data.athletes || data.athletes.length === 0) return null;
  return data.athletes;
}

function extractStat(athlete, name) {
  const stats = athlete.statistics;
  if (!stats) return 0;
  for (const sk in stats) {
    const splits = stats[sk];
    if (!splits || !splits.categories) continue;
    for (const cat of splits.categories) {
      if (!cat.stats) continue;
      for (const s of cat.stats) {
        if (s.name === name && s.value != null) return s.value;
      }
    }
  }
  return 0;
}

// ========== POISSON MATCH ENGINE ==========
function poissonRand(lambda, rng) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do {
    k++;
    p *= (rng || Math.random)();
  } while (p > L);
  return k - 1;
}

function simulateMatch(userRating, oppRating, drawRate, seed) {
  const rng = seed ? mulberry32(fnv1a(seed)) : Math.random;
  const lambdaUs = Math.max(0.2, userRating / oppRating * 1.1);
  const lambdaThem = Math.max(0.2, oppRating / userRating * 0.9);
  const rawUs = poissonRand(lambdaUs, rng);
  const rawThem = poissonRand(lambdaThem, rng);
  const cappedUs = Math.min(rawUs, 8);
  const cappedThem = Math.min(rawThem, 8);

  let outcome;
  if (cappedUs > cappedThem) outcome = 'W';
  else if (cappedUs < cappedThem) outcome = 'L';
  else outcome = 'D';

  return { us: cappedUs, them: cappedThem, outcome };
}

// ========== MATCH EVENTS ==========
function generateMatchEvents(match, userRating, oppRating, oppName, rng) {
  const events = [];
  const totalGoals = match.us + match.them;
  const minutes = [];

  if (totalGoals === 0) {
    events.push({ type: 'whistle', text: 'Full time. 0-0 draw.', min: 90 });
    return events;
  }

  const weighted = [];
  const userGoalShare = match.us / Math.max(totalGoals, 1);
  for (let i = 0; i < 90; i++) {
    const isUser = (rng() < userGoalShare);
    weighted.push({ min: i + 1, us: isUser, them: !isUser });
  }
  weighted.sort(() => rng() - 0.5);

  let usScored = 0, themScored = 0;
  const usGoalMin = Math.max(1, 90 / Math.max(match.us, 1));
  const themGoalMin = Math.max(1, 90 / Math.max(match.them, 1));

  for (let i = 0; i < 90 && (usScored < match.us || themScored < match.them); i++) {
    const w = weighted[i];
    if (!w) break;
    if (w.us && usScored < match.us) {
      usScored++;
      const min = Math.round(usScored * usGoalMin * (0.5 + rng() * 0.5));
      const scorer = getRandomScorer('F', rng);
      const assister = rng() < 0.6 ? getRandomScorer('M', rng) : null;
      events.push({
        type: 'goal',
        text: min + '\' GOAL! ' + scorer + (assister ? ' (assisted by ' + assister + ')' : '') + ' — ' + usScored + '-' + themScored,
        min,
        us: usScored,
        them: themScored,
      });
    } else if (w.them && themScored < match.them) {
      themScored++;
      const min = Math.round(themScored * themGoalMin * (0.5 + rng() * 0.5));
      events.push({
        type: 'goal',
        text: min + '\' GOAL! ' + oppName + ' scores — ' + usScored + '-' + themScored,
        min,
        us: usScored,
        them: themScored,
      });
    }
  }

  events.sort((a, b) => a.min - b.min);

  if (events.length && events[events.length - 1].min < 88) {
    const last = events[events.length - 1];
    events.push({ type: 'whistle', text: 'Full time. ' + match.us + '-' + match.them + '.', min: 90 });
  }

  return events;
}

function getRandomScorer(pos, rng) {
  const candidates = state.slots.filter(s => s.player && s.player.pos === pos);
  if (candidates.length === 0) {
    const fallback = state.slots.filter(s => s.player);
    if (fallback.length === 0) return 'Unknown';
    return fallback[Math.floor((rng || Math.random)() * fallback.length)].player.fullName;
  }
  return candidates[Math.floor((rng || Math.random)() * candidates.length)].player.fullName;
}

// ========== SEASON SIMULATION ==========
function initSeason() {
  const otherTeams = MLS_CLUBS.filter(t => t.id !== USER_TEAM_ID);

  state.teamBaseRatings = {};
  for (const t of otherTeams) {
    state.teamBaseRatings[t.id] = Math.round(40 + Math.random() * 35);
  }
  state.teamBaseRatings[USER_TEAM_ID] = state.squadRating;

  state.games = [];
  for (let i = 0; i < TOTAL_GAMES; i++) {
    const team = otherTeams[Math.floor(Math.random() * otherTeams.length)];
    const rating = state.teamBaseRatings[team.id];
    state.games.push({ team, rating, result: null, score: null, events: null });
  }

  state.currentGame = 0;
  state.record = { w: 0, d: 0, l: 0 };
  state.playerStats = {};
  for (const s of state.slots) {
    state.playerStats[s.player.id] = { goals: 0, assists: 0, cleanSheets: 0, motm: 0, pos: s.player.pos, name: s.player.fullName };
  }
}

function advanceGame() {
  const idx = state.currentGame;
  if (idx >= TOTAL_GAMES) return null;
  const game = state.games[idx];

  const seed = 'g' + idx + '-' + Date.now() + '-' + Math.random();
  const match = simulateMatch(state.squadRating, game.rating, DRAW_RATE, seed);
  game.score = { us: match.us, them: match.them };
  game.result = match.outcome;
  game.seed = seed;

  const rng = mulberry32(fnv1a(seed + '-events'));
  game.events = generateMatchEvents(match, state.squadRating, game.rating, game.team.name, rng);

  const motmId = distributeStats(match);
  game.motm = motmId;

  state.record[match.outcome === 'W' ? 'w' : match.outcome === 'D' ? 'd' : 'l']++;
  state.currentGame++;

  return { outcome: match.outcome, score: match, game };
}

function distributeStats(match) {
  const us = match.us;
  const cleanSheet = match.them === 0;
  const contrib = {};
  for (const s of state.slots) contrib[s.player.id] = { g: 0, a: 0 };

  const goalPool = [];
  for (const s of state.slots) {
    const w = { F: 65, M: 25, D: 8, G: 2 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) goalPool.push(s.player.id);
  }
  for (let i = 0; i < us; i++) {
    const id = goalPool[Math.floor(Math.random() * goalPool.length)];
    if (contrib[id]) contrib[id].g++;
  }

  const assistPool = [];
  for (const s of state.slots) {
    const w = { G: 2, D: 13, M: 50, F: 35 }[s.player.pos] || 0;
    for (let i = 0; i < w; i++) assistPool.push(s.player.id);
  }
  for (let i = 0; i < us; i++) {
    if (Math.random() < 0.6) {
      const id = assistPool[Math.floor(Math.random() * assistPool.length)];
      if (contrib[id]) contrib[id].a++;
    }
  }

  let motmId = null, motmScore = -1;
  for (const s of state.slots) {
    const pid = s.player.id;
    const c = contrib[pid] || { g: 0, a: 0 };
    const ps = state.playerStats[pid];
    if (!ps) continue;
    ps.goals += c.g;
    ps.assists += c.a;
    const cs = cleanSheet && (s.player.pos === 'G' || s.player.pos === 'D') ? 1 : 0;
    ps.cleanSheets += cs;
    const perf = c.g * 3 + c.a * 2 + cs * 2 + Math.random() * 3;
    if (perf > motmScore) { motmScore = perf; motmId = pid; }
  }
  if (motmId && state.playerStats[motmId]) state.playerStats[motmId].motm++;
  return motmId;
}

function isSeasonComplete() { return state.currentGame >= TOTAL_GAMES; }
function isPerfect() { return state.record.w === TOTAL_GAMES && state.record.d === 0 && state.record.l === 0; }

function simAll() {
  while (!isSeasonComplete()) { advanceGame(); }
  generateStandings();
  state.phase = 'result';
  render();
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

// ========== WATCH MODE ==========
function watchGame() {
  if (state.watchActive) return;
  const idx = state.currentGame;
  if (idx >= TOTAL_GAMES) return;

  const result = advanceGame();
  if (!result) return;

  state.watchActive = true;
  state.watchEvents = result.game.events || [];
  state.watchIndex = 0;

  const overlay = document.getElementById('watchOverlay');
  overlay.classList.add('active');
  renderWatchFrame();
}

function renderWatchFrame() {
  const overlay = document.getElementById('watchOverlay');
  const game = state.games[state.currentGame - 1];
  if (!game) { closeWatch(); return; }

  const score = game.score || { us: 0, them: 0 };
  const evts = state.watchEvents;
  const shown = evts.slice(0, state.watchIndex);
  const remaining = evts.length - state.watchIndex;

  const eventsHtml = shown.map(function(e) {
    return '<div class="watch-event ev-' + e.type + '">' + e.text + '</div>';
  }).join('');

  overlay.innerHTML = `
    <div class="watch-pitch">
      <div class="wp-field"></div>
      <div class="wp-midline"></div>
      <div class="wp-center"></div>
      <div class="wp-penalty-a"></div>
      <div class="wp-penalty-b"></div>
    </div>
    <div class="watch-score">
      <span class="ws-us">${score.us}</span>
      <span class="ws-sep">-</span>
      <span class="ws-them">${score.them}</span>
    </div>
    <div class="watch-progress">vs ${game.team.name} &middot; Game ${state.currentGame} of ${TOTAL_GAMES}</div>
    <div id="watchEvents" style="min-height:60px;">${eventsHtml}</div>
    <div style="margin-top:12px;display:flex;gap:12px;">
      ${remaining > 0
        ? '<button class="btn btn-primary" onclick="advanceWatch()">Next Event</button>'
        : '<button class="btn btn-gold" onclick="closeWatch()">Continue</button>'}
      <button class="btn btn-secondary" onclick="skipWatch()">Skip All</button>
    </div>
    ${remaining > 0 ? '<div style="color:var(--text-muted);font-size:0.7rem;margin-top:6px;">' + remaining + ' events remaining</div>' : ''}
  `;
}

function advanceWatch() {
  if (!state.watchActive) return;
  if (state.watchTimer) { clearTimeout(state.watchTimer); state.watchTimer = null; }
  if (state.watchIndex < state.watchEvents.length) {
    state.watchIndex++;
    renderWatchFrame();
  }
  if (state.watchIndex >= state.watchEvents.length) {
    state.watchTimer = setTimeout(function() {
      closeWatch();
    }, 2000);
  }
}

function skipWatch() {
  if (state.watchTimer) { clearTimeout(state.watchTimer); state.watchTimer = null; }
  closeWatch();
}

function closeWatch() {
  state.watchActive = false;
  if (state.watchTimer) { clearTimeout(state.watchTimer); state.watchTimer = null; }
  document.getElementById('watchOverlay').classList.remove('active');
  if (isSeasonComplete()) {
    generateStandings();
    state.phase = 'result';
    render();
  } else {
    render();
  }
}

// ========== STANDINGS GENERATION ==========
function generateStandings() {
  if (state.standings) return;
  const teams = MLS_CLUBS.map(function(t) {
    if (t.id === USER_TEAM_ID) {
      return { ...t, rating: state.squadRating, w: state.record.w, d: state.record.d, l: state.record.l, pts: state.record.w * 3 + state.record.d, userTeam: true };
    }
    const rating = state.teamBaseRatings[t.id] || 50;
    let w = 0, d = 0, l = 0;
    const others = MLS_CLUBS.filter(x => x.id !== t.id);
    for (let i = 0; i < TOTAL_GAMES; i++) {
      const opp = others[Math.floor(Math.random() * others.length)];
      const oppR = state.teamBaseRatings[opp.id] || 50;
      const result = simulateMatch(rating, oppR, DRAW_RATE, 's' + i + '-' + t.id).outcome;
      if (result === 'W') w++; else if (result === 'D') d++; else l++;
    }
    return { ...t, rating, w, d, l, pts: w * 3 + d, userTeam: false };
  });

  const east = teams.filter(t => t.conf === 'east').sort((a, b) => b.pts - a.pts || b.w - a.w);
  const west = teams.filter(t => t.conf === 'west').sort((a, b) => b.pts - a.pts || b.w - a.w);
  state.standings = { east, west };

  const userConf = teams.filter(t => t.conf === USER_CONF).sort((a, b) => b.pts - a.pts || b.w - a.w);
  for (let i = 0; i < userConf.length; i++) {
    if (userConf[i].userTeam) { state.userConfSeed = i + 1; state.userSeed = userConf[i]; break; }
  }
}

// ========== PLAYOFF SIMULATION ==========
function simPlayoffGame(userRating, oppRating, seed) {
  const rng = seed ? mulberry32(fnv1a(seed)) : Math.random;
  const lambdaUs = Math.max(0.2, userRating / oppRating * 0.9);
  const lambdaThem = Math.max(0.2, oppRating / userRating * 1.1);
  const us = Math.min(poissonRand(lambdaUs, rng), 6);
  const them = Math.min(poissonRand(lambdaThem, rng), 6);
  if (us > them) return 'W';
  if (them > us) return 'L';
  const extra = rng() < 0.5 ? 'W' : 'L';
  return extra;
}

function simPlayoffSeries(teamRating, oppRating, gamesToWin) {
  let ourWins = 0, theirWins = 0;
  while (ourWins < gamesToWin && theirWins < gamesToWin) {
    const seed = 'ps-' + ourWins + '-' + theirWins + '-' + Date.now();
    const result = simPlayoffGame(teamRating, oppRating, seed);
    if (result === 'W') ourWins++; else theirWins++;
  }
  return { ourWins, theirWins, won: ourWins > theirWins };
}

function simSinglePlayoffGame(userRating, oppRating) {
  const seed = 'ps-single-' + Date.now();
  const result = simPlayoffGame(userRating, oppRating, seed);
  return { result, won: result === 'W' };
}

function autoSimEastBracket() {
  const conf = state.standings.east;
  if (!conf || conf.length < 9) return null;

  const wc = simSinglePlayoffGame(conf[7].rating, conf[8].rating);
  const wcWinner = wc.won ? conf[7] : conf[8];

  const r1 = [
    { a: conf[0], b: wcWinner },
    { a: conf[1], b: conf[6] },
    { a: conf[2], b: conf[5] },
    { a: conf[3], b: conf[4] },
  ];
  const r1Winners = r1.map(m => {
    const res = simPlayoffSeries(m.a.rating, m.b.rating, 2);
    return res.won ? m.a : m.b;
  });

  const semi1 = simSinglePlayoffGame(r1Winners[0].rating, r1Winners[3].rating);
  const semi2 = simSinglePlayoffGame(r1Winners[1].rating, r1Winners[2].rating);
  const semiWinners = [semi1.won ? r1Winners[0] : r1Winners[3], semi2.won ? r1Winners[1] : r1Winners[2]];

  const confFinal = simSinglePlayoffGame(semiWinners[0].rating, semiWinners[1].rating);
  return confFinal.won ? semiWinners[0] : semiWinners[1];
}

function enterPlayoffs() {
  generateStandings();
  const conf = state.standings[USER_CONF];
  const seed = state.userConfSeed;
  if (!seed || seed > PLAYOFF_TEAMS) return;
  state.playoffRecord = { w: 0, l: 0 };
  state.playoffLog = [];

  if (seed >= 8) {
    const opp = seed === 8 ? conf[8] : conf[7];
    state.currentPlayoffOpponent = { team: opp, seed: seed === 8 ? 9 : 8 };
    state.playoffRound = -1;
  } else {
    const wc = simSinglePlayoffGame(conf[7].rating, conf[8].rating);
    const wcWinner = wc.won ? conf[7] : conf[8];
    const wcWinnerSeed = wc.won ? 8 : 9;
    const pairings = { 1: null, 2: 7, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2 };
    let oppTeam, oppSeed;
    if (seed === 1) { oppTeam = wcWinner; oppSeed = wcWinnerSeed; }
    else { oppSeed = pairings[seed]; oppTeam = conf[oppSeed - 1]; }
    state.currentPlayoffOpponent = { team: oppTeam, seed: oppSeed };
    state.playoffRound = 0;
  }
  state.playoffPhase = 'pregame';
  state.seriesWins = { us: 0, them: 0 };
  state.seriesGames = [];
  state.phase = 'playoff';
  render();
}

function advancePlayoff() {
  const opp = state.currentPlayoffOpponent;
  if (!opp) return null;

  const isBo3 = state.playoffRound === 0;
  const userRating = state.squadRating;
  const oppRating = opp.team.rating;

  if (isBo3) {
    const seed = 'bo3-' + state.seriesGames.length + '-' + Date.now();
    const result = simPlayoffGame(userRating, oppRating, seed);
    const score = generatePlayoffScore(result, userRating, oppRating);
    state.seriesGames.push({ result, score });
    if (result === 'W') state.seriesWins.us++;
    else state.seriesWins.them++;

    if (state.seriesWins.us >= 2 || state.seriesWins.them >= 2) {
      const won = state.seriesWins.us >= 2;
      if (won) state.playoffRecord.w++; else state.playoffRecord.l++;
      state.playoffLog.push({ round: 'Round 1', opponent: opp.team.name, won, seriesWins: { ...state.seriesWins } });
      return { result, score, seriesOver: true, won, isBo3: true, seriesWins: { ...state.seriesWins }, gameNum: state.seriesGames.length };
    }
    return { result, score, seriesOver: false, won: result === 'W', isBo3: true, seriesWins: { ...state.seriesWins }, gameNum: state.seriesGames.length };
  } else {
    const seed = 'ko-' + state.playoffRound + '-' + Date.now();
    const result = simPlayoffGame(userRating, oppRating, seed);
    const score = generatePlayoffScore(result, userRating, oppRating);
    const won = result === 'W';
    if (won) state.playoffRecord.w++; else state.playoffRecord.l++;
    return { result, score, seriesOver: true, won, isBo3: false, seriesWins: { us: won ? 1 : 0, them: won ? 0 : 1 }, gameNum: 1 };
  }
}

function generatePlayoffScore(result, userRating, oppRating) {
  const diff = userRating - oppRating;
  const base = Math.max(1, Math.min(5, Math.round(1.5 + (diff / 25) + (Math.random() - 0.3))));
  if (result === 'W') {
    const ourGoals = Math.max(1, base + 1);
    const theirGoals = Math.max(0, Math.min(ourGoals - 1, Math.round(base * 0.3 + Math.random() * 0.5)));
    return { us: ourGoals, them: theirGoals };
  } else {
    const theirGoals = Math.max(1, base + 2);
    const ourGoals = Math.max(0, Math.min(theirGoals - 1, Math.round(base * 0.2 + Math.random() * 0.5)));
    return { us: ourGoals, them: theirGoals };
  }
}

function handlePlayoffAdvancement(won, silent) {
  const seed = state.userConfSeed;
  const conf = state.standings[USER_CONF];

  if (!won) {
    state.phase = 'champion';
    state.wonPlayoffs = false;
    state.playoffLog.push({ round: 'Eliminated', won: false });
    if (!silent) render();
    return false;
  }

  if (state.playoffRound === -1) {
    state.currentPlayoffOpponent = { team: conf[0], seed: 1 };
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    state.playoffRound = 0;
    state.playoffLog.push({ round: 'Wild Card', opponent: conf[0].name, won: true });
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  if (state.playoffRound === 0) {
    const topHalfSeeds = [[1, 8], [4, 5]];
    const bottomHalfSeeds = [[2, 7], [3, 6]];
    let userHalf;
    if (seed <= 1 || seed === 8 || seed === 9 || seed === 4 || seed === 5) {
      userHalf = topHalfSeeds;
    } else {
      userHalf = bottomHalfSeeds;
    }
    const otherMatchup = userHalf.find(pair => !pair.includes(seed) && !(seed >= 8 && pair.includes(8)));
    let oppTeam;
    if (otherMatchup) {
      const a = conf[otherMatchup[0] - 1];
      const b = otherMatchup[1] <= conf.length ? conf[otherMatchup[1] - 1] : null;
      if (a && b) { const res = simPlayoffSeries(a.rating, b.rating, 2); oppTeam = res.won ? a : b; }
      else if (a) { oppTeam = a; }
    }
    state.currentPlayoffOpponent = { team: oppTeam, seed: null };
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    state.playoffRound = 1;
    state.playoffLog.push({ round: 'Round 1', won: true });
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  if (state.playoffRound === 1) {
    state.playoffLog.push({ round: 'Conference Semifinal', won: true });
    const topHalfSeeds = [[1, 8], [4, 5]];
    const bottomHalfSeeds = [[2, 7], [3, 6]];
    let userHalf, otherHalf;
    if (seed <= 1 || seed === 8 || seed === 9 || seed === 4 || seed === 5) {
      userHalf = topHalfSeeds; otherHalf = bottomHalfSeeds;
    } else {
      userHalf = bottomHalfSeeds; otherHalf = topHalfSeeds;
    }
    const otherRes1 = otherHalf[0] ? simPlayoffSeries(conf[(otherHalf[0][0] || 2) - 1].rating, conf[Math.min(otherHalf[0][1] || 7, conf.length) - 1].rating, 2) : null;
    const otherRes2 = otherHalf[1] ? simPlayoffSeries(conf[(otherHalf[1][0] || 3) - 1].rating, conf[Math.min(otherHalf[1][1] || 6, conf.length) - 1].rating, 2) : null;
    const otherSemiA = otherRes1 ? (otherRes1.won ? conf[(otherHalf[0][0] || 2) - 1] : conf[Math.min(otherHalf[0][1] || 7, conf.length) - 1]) : null;
    const otherSemiB = otherRes2 ? (otherRes2.won ? conf[(otherHalf[1][0] || 3) - 1] : conf[Math.min(otherHalf[1][1] || 6, conf.length) - 1]) : null;
    const confFinal = otherSemiA && otherSemiB ? simSinglePlayoffGame(otherSemiA.rating, otherSemiB.rating) : null;
    const oppTeam = confFinal ? (confFinal.won ? otherSemiA : otherSemiB) : (otherSemiA || otherSemiB);
    state.currentPlayoffOpponent = { team: oppTeam, seed: null };
    state.playoffRound = 2;
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  if (state.playoffRound === 2) {
    state.playoffLog.push({ round: 'Conference Final', won: true });
    const eastChamp = autoSimEastBracket();
    state.currentPlayoffOpponent = { team: eastChamp, seed: 'E' };
    state.playoffRound = 3;
    state.seriesWins = { us: 0, them: 0 };
    state.seriesGames = [];
    if (!silent) { state.playoffPhase = 'pregame'; render(); }
    return true;
  }

  if (state.playoffRound === 3) {
    state.playoffLog.push({ round: 'MLS Cup', won: true });
    state.wonPlayoffs = true;
    state.phase = 'champion';
    if (!silent) render();
    return false;
  }

  state.phase = 'champion';
  if (!silent) render();
  return false;
}

function playPlayoffGame() {
  const result = advancePlayoff();
  if (!result) return;
  showPlayoffGameResult(result);
  setTimeout(function() {
    closeModal();
    if (result.seriesOver) {
      handlePlayoffAdvancement(result.won);
    } else {
      state.playoffPhase = 'pregame';
      render();
    }
  }, 2200);
}

function showPlayoffGameResult(result) {
  const modal = document.getElementById('modal');
  const color = result.won ? 'win' : 'loss';
  const label = result.won ? 'WIN' : 'LOSS';
  const opp = state.currentPlayoffOpponent;
  let seriesDetail = '';
  if (result.isBo3) {
    seriesDetail = '<div style="color:var(--text-secondary);font-size:0.75rem;margin-top:4px;">Series: ' + result.seriesWins.us + ' \u2013 ' + result.seriesWins.them + '</div>';
  }
  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${color}">${label}</div>
      <div class="m-score">${result.score.us} - ${result.score.them}</div>
      <div class="m-sub">vs ${opp.team.name} #${opp.seed}</div>
      ${seriesDetail}
      ${result.isBo3 && !result.seriesOver ? '<div style="color:var(--gold);font-size:0.8rem;margin-top:8px;">Next game in series...</div>' : ''}
      ${result.seriesOver ? '<div style="color:#4caf50;font-size:0.85rem;font-weight:700;margin-top:8px;">' + (result.won ? 'Series won!' : 'Eliminated') + '</div>' : ''}
    </div>
  `;
  modal.classList.add('active');
}

function simAllPlayoffs() {
  while (true) {
    const result = advancePlayoff();
    if (!result) break;
    if (!result.seriesOver) continue;
    const keepGoing = handlePlayoffAdvancement(result.won, true);
    if (!keepGoing) break;
  }
  render();
}

function showStandings() {
  generateStandings();
  state.phase = 'standings';
  render();
}

function showResult() { generateStandings(); state.phase = 'result'; render(); }

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  switch (state.phase) {
    case 'splash': renderSplash(app); break;
    case 'formation': renderFormation(app); break;
    case 'draft': renderDraft(app); break;
    case 'spin': renderSpin(app); break;
    case 'season': renderSeason(app); break;
    case 'result': renderResult(app); break;
    case 'standings': renderStandings(app); break;
    case 'playoff': renderPlayoff(app); break;
    case 'champion': renderChampion(app); break;
  }
}

function renderSplash(app) {
  app.innerHTML = `
    <div class="splash">
      <h1>34-0</h1>
      <p class="tagline">Draft &middot; Simulate &middot; Conquer</p>
      <p class="goal">Spin club-era reels to draft a 34-game MLS squad, then simulate using our Poisson match engine. Can you go perfect?</p>
      <div style="max-width:500px;margin:0 auto;">
        <div class="formation-grid">
          <div class="formation-card" onclick="selectDifficulty('easy')">
            <div class="f-name">Easy</div>
            <div class="f-detail">Generous pool, higher ratings, weaker opponents</div>
          </div>
          <div class="formation-card" onclick="selectDifficulty('normal')">
            <div class="f-name">Normal</div>
            <div class="f-detail">Balanced challenge</div>
          </div>
          <div class="formation-card" onclick="selectDifficulty('hard')">
            <div class="f-name">Hard</div>
            <div class="f-detail">Limited pool, lower ratings, stronger opponents</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function selectDifficulty(key) {
  state.difficulty = key;
  state.phase = 'formation';
  render();
}

function renderFormation(app) {
  const cards = Object.entries(FORMATIONS).map(function(kv) {
    const key = kv[0], f = kv[1];
    return '<div class="formation-card" onclick="selectFormation(\'' + key + '\')"><div class="f-name">' + f.label + '</div><div class="f-detail">' + f.desc + '</div></div>';
  }).join('');

    <div class="page-title"><h1>34-0</h1></div>

async function selectFormation(key) {
  state.formation = FORMATIONS[key];
  state.slots = createSlots(state.formation);
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="lds-ring"><div></div></div>Generating club-era draft pool...</div>';

  const poolSize = { easy: 30, normal: 20, hard: 14 }[state.difficulty] || 20;
  state.draftPool = await generateDraftPool(poolSize);
  if (state.draftPool.length < state.slots.length) {
    app.innerHTML = '<div style="text-align:center;padding:60px;color:var(--mls-red);">Couldn\'t build a valid draft pool. <button class="btn btn-primary" onclick="selectFormation(\'' + key + '\')">Retry</button></div>';
    return;
  }
  state.usedPool = new Set();
  state.currentSpin = null;
  state.rerolls = 1;
  state.phase = 'draft';
  render();
}

// ========== DRAFT RENDER ==========
function renderDraft(app) {
  const filled = filledCount();
  const total = state.slots.length;
  const remaining = state.draftPool.length - state.usedPool.size;

  if (!state.currentSpin && filled < total) {
    startSpin();
    return;
  }

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">Draft — tap a slot or spin the reels</p>

    <div class="pitch-header">
      <div class="ph-info">Filled: <strong>${filled}/${total}</strong></div>
      <div class="ph-info">Pool: <strong>${remaining}</strong> club-eras remaining</div>
      <div class="ph-info">Rerolls: <strong style="color:var(--gold);">${state.rerolls}</strong></div>
    </div>

    <div class="pitch">
      ${buildFormationRows()}
    </div>

    <div style="text-align:center;margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startSpin()">Spin Reel</button>
      <button class="btn btn-reroll" onclick="useReroll()" ${state.rerolls <= 0 ? 'disabled' : ''}>Reroll (${state.rerolls})</button>
    </div>

    ${allSlotsFilled()
      ? '<div style="text-align:center;margin-top:12px;"><button class="btn btn-gold" onclick="finalizeDraft()">Start Season</button></div>'
      : remaining === 0
        ? '<div style="text-align:center;margin-top:12px;color:var(--mls-red);font-size:0.85rem;">Pool exhausted — <button class="btn btn-secondary" onclick="selectFormation(state.formation.label)">Re-roll Pool</button></div>'
        : ''}
  `;
}

function buildFormationRows() {
  const slotHtml = function(idx) {
    const s = state.slots[idx];
    const color = POS_COLORS[s.pos];
    const label = POS_LABELS[s.pos];
    const filled = s.player !== null;
    return '<div class="pitch-slot ' + (filled ? 'filled' : 'empty') + '" style="border-color:' + color + '"><div class="ps-pos" style="color:' + color + '">' + label + '</div>' + (filled ? '<div class="ps-name">' + s.player.fullName + '</div><div class="ps-rating">' + s.player.rating + '</div>' : '<div class="ps-empty">empty</div>') + '</div>';
  };

  const rows = [];
  const gkSlots = state.slots.filter(s => s.pos === 'G');
  const dSlots = state.slots.filter(s => s.pos === 'D');
  const mSlots = state.slots.filter(s => s.pos === 'M');
  const fSlots = state.slots.filter(s => s.pos === 'F');

  let idx = 0;
  if (gkSlots.length > 0) {
    let html = '<div class="pitch-row gk-row">';
    for (let i = 0; i < gkSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (dSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < dSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (mSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < mSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  if (fSlots.length > 0) {
    let html = '<div class="pitch-row">';
    for (let i = 0; i < fSlots.length; i++) { html += slotHtml(idx); idx++; }
    html += '</div>';
    rows.push(html);
  }
  return rows.join('');
}

// ========== SPIN RENDER ==========
function renderSpin(app) {
  const spin = state.currentSpin;
  if (!spin) { state.phase = 'draft'; render(); return; }

  const tier = spin.tier;
  const tierClass = tier.key;
  const nextPos = findNextOpenPosition();
  const posLabel = nextPos ? POS_LABELS[nextPos] : '?';

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">Club-Era Spin — need a <strong>${posLabel}</strong></p>

    <div class="reel-container">
      <div class="reel-label">Club</div>
      <div class="reel-slot"><div class="reel-item" style="animation-delay:0s;">${spin.club.name}</div></div>
      <div class="reel-label">Era</div>
      <div class="reel-slot"><div class="reel-item" style="animation-delay:0.15s;">${spin.era}s — ${spin.year}</div></div>
      <div class="reel-label">Squad Rating · Tier</div>
      <div class="reel-slot"><div class="reel-item" style="animation-delay:0.3s;"><span class="sh-tier ${tierClass}">${tier.label}</span> (${spin.avgRating})</div></div>
    </div>

    <div class="spin-header">
      <div class="sh-left">
        <div class="sh-badge">${spin.club.abbr}</div>
        <div>
          <div class="sh-name">${spin.club.name}</div>
          <div class="sh-year">${spin.era}s — ${spin.year} Season</div>
        </div>

      <span class="sh-tier ${tierClass}">${tier.label}</span>

    <div style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="acceptSpin()">Draft from This Club</button>
      <button class="btn btn-secondary" onclick="rejectSpin()">Skip</button>
      <button class="btn btn-reroll" onclick="useReroll()" ${state.rerolls <= 0 ? 'disabled' : ''}>Reroll (${state.rerolls})</button>
    </div>
  `;
}

function rejectSpin() {
  state.currentSpin = null;
  state.phase = 'draft';
  render();
}

// ========== PICK VIEW ==========
function renderPickView(app) {
  const slot = state.slots[state.activeSlot];
  if (!slot || !slot.entry) { state.activeSlot = -1; state.phase = 'draft'; render(); return; }
  const entry = slot.entry;

  const candidates = entry.players.filter(p => p.pos === slot.pos)
    .sort(function(a, b) { return (b.apps - a.apps) || (b.goals - a.goals); })
    .slice(0, 5);

  const rePick = slot.player !== null;

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${rePick ? 'Re-pick' : 'Pick'} — ${POS_LABELS[slot.pos]}</p>

    <div class="pick-header">
      <div class="pick-team-info">
        <div class="pti-badge">${entry.club.abbr}</div>
        <div>
          <div class="pti-name">${entry.club.name}</div>
          <div class="pti-year">${entry.year} Season</div>
        </div>
      </div>
      <span class="sh-tier ${entry.tier.key}">${entry.tier.label}</span>
    </div>

    <div class="player-grid">
      ${candidates.length === 0
        ? '<div style="text-align:center;padding:20px;color:var(--text-muted);">No players available for this position.</div>'
        : candidates.map(function(p) {
            const rating = computePlayerRating(p);
            return '<div class="player-card" onclick="fillSlot(\'' + p.id + '\', ' + state.activeSlot + ')"><div><span class="pc-name">' + p.fullName + '</span><span class="pc-pos">' + p.pos + '</span></div><div class="pc-rating">' + rating + '</div></div>';
          }).join('')}
    </div>

    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-secondary" onclick="cancelPick()">Back to Draft</button>
    </div>
  `;
}

function cancelPick() {
  state.activeSlot = -1;
  state.phase = 'draft';
  render();
}

// ========== SEASON RENDER ==========
function renderSeason(app) {
  let gamePreview = '';
  let playBtn = '';

  if (!isSeasonComplete()) {
    const game = state.games[state.currentGame];
    const winProb = state.squadRating / (state.squadRating + game.rating);
    gamePreview = `
      <div class="game-preview">
        <div class="gp-num">Game ${state.currentGame + 1} of ${TOTAL_GAMES}</div>
        <div class="gp-matchup">${state.squadRating} vs ${game.team.abbr} (${game.rating})</div>
        <div class="gp-detail">Your squad: ${state.squadRating} avg · Opponent: ${game.rating}</div>
        <div class="gp-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>
      </div>
    `;
    playBtn = `<div style="text-align:center;margin-top:8px;display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" onclick="playGame()">Play Next Game</button>
      <button class="btn btn-secondary" onclick="watchGame()">Watch</button>
      <button class="btn btn-secondary" onclick="simAll()">Sim All</button>
    </div>`;
  } else {
    gamePreview = '<div class="game-preview"><div class="gp-num">Season Complete!</div></div>';
    playBtn = '<div style="text-align:center;margin-top:8px;"><button class="btn btn-gold" onclick="showResult()">View Results</button></div>';
  }

  const gameCells = state.games.map(function(g, i) {
    let cls = 'game-cell';
    if (g.result) {
      const rcls = g.result === 'W' ? 'win' : g.result === 'D' ? 'draw' : 'loss';
      cls += ' ' + rcls;
      return '<div class="' + cls + '"><div class="gc-num">Game ' + (i + 1) + '</div><div class="gc-opp">' + g.team.abbr + '</div><div class="gc-result ' + rcls + '">' + g.result + ' ' + g.score.us + '-' + g.score.them + '</div></div>';
    } else if (i === state.currentGame) {
      cls += ' current';
      return '<div class="' + cls + '"><div class="gc-num">Game ' + (i + 1) + '</div><div class="gc-opp">' + g.team.abbr + '</div><div class="gc-result" style="color:var(--text-secondary);">?</div></div>';
    } else {
      cls += ' upcoming';
      return '<div class="' + cls + '"><div class="gc-num">Game ' + (i + 1) + '</div><div class="gc-opp">?</div></div>';
    }
  }).join('');

  const teamHtml = state.slots.map(function(s) {
    return '<span class="rt-player">' + POS_LABELS[s.pos] + ' ' + s.player.fullName + ' (' + s.player.rating + ')</span>';
  }).join('');

  const ps = state.playerStats;
  const topScorer = Object.values(ps).sort(function(a, b) { return b.goals - a.goals; })[0];
  const topAssist = Object.values(ps).sort(function(a, b) { return b.assists - a.assists; })[0];
  const topCS = Object.values(ps).sort(function(a, b) { return b.cleanSheets - a.cleanSheets; })[0];
  const topMotm = Object.values(ps).sort(function(a, b) { return b.motm - a.motm; })[0];

  const statsBar = `
    <div class="stats-bar">
      <span>Goals: <strong>${topScorer ? topScorer.name + ' (' + topScorer.goals + ')' : '0'}</strong></span>
      <span>Assists: <strong>${topAssist ? topAssist.name + ' (' + topAssist.assists + ')' : '0'}</strong></span>
      <span>CS: <strong>${topCS ? topCS.name + ' (' + topCS.cleanSheets + ')' : '0'}</strong></span>
      <span>MOTM: <strong>${topMotm ? topMotm.name + ' (' + topMotm.motm + ')' : '0'}</strong></span>
    </div>
  `;

  const tier = computeSquadTier();

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">${tier.label} · ${state.formation.label} · ${state.squadRating} avg</p>

    <div class="season-header">
      <div class="record-display">
        <div class="r-item r-win"><div class="r-num">${state.record.w}</div><div class="r-label">Wins</div></div>
        <div class="r-item r-draw"><div class="r-num">${state.record.d}</div><div class="r-label">Draws</div></div>
        <div class="r-item r-loss"><div class="r-num">${state.record.l}</div><div class="r-label">Losses</div></div>
      </div>
      <div style="display:flex;gap:16px;font-size:0.8rem;color:var(--text-secondary);">
        <span>Rating: <strong style="color:var(--text-primary);">${state.squadRating}</strong></span>
        <span>Games: <strong style="color:var(--text-primary);">${state.currentGame}/${TOTAL_GAMES}</strong></span>
      </div>
    </div>

    ${statsBar}
    ${gamePreview}
    ${playBtn}

    <div class="result-team" style="margin-top:8px;">
      ${teamHtml}
    </div>

    <div class="game-grid">${gameCells}</div>
  `;
}

function playGame() {
  const result = advanceGame();
  if (!result) return;
  showGameResult(result);
  setTimeout(function() {
    closeModal();
    if (isSeasonComplete()) { generateStandings(); state.phase = 'result'; render(); }
    else { render(); }
  }, 2000);
}

function showGameResult(result) {
  const modal = document.getElementById('modal');
  const labels = { W: 'WIN', D: 'DRAW', L: 'LOSS' };
  const colors = { W: 'win', D: 'draw', L: 'loss' };
  const game = state.games[state.currentGame - 1];
  const motmName = game.motm ? (state.playerStats[game.motm] ? state.playerStats[game.motm].name : '') : '';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="m-result ${colors[result.outcome]}">${labels[result.outcome]}</div>
      <div class="m-score">${result.score.us} - ${result.score.them}</div>
      <div class="m-sub">vs ${game.team.name} · Record: ${state.record.w}W-${state.record.d}D-${state.record.l}L</div>
      ${motmName ? '<div style="color:var(--gold);font-size:0.8rem;margin-top:8px;">MOTM: ' + motmName + '</div>' : ''}
      <div style="color:var(--text-muted);font-size:0.7rem;margin-top:4px;">Game ${state.currentGame} of ${TOTAL_GAMES}</div>
    </div>
  `;
  modal.classList.add('active');
}

  generateStandings();

  function tableHtml(conf, label) {
    const rows = conf.map(function(t, i) {

      return '<tr class="' + (isUser ? 'user-row' : '') + '"><td class="s-seed">' + s + '</td><td class="s-team">' + t.abbr + '</td><td>' + t.w + '\u2013' + t.d + '\u2013' + t.l + '</td><td class="s-pts">' + t.pts + '</td><td class="s-rating">' + t.rating + '</td></tr>' + (isCutoff ? '<tr class="playoff-line"><td colspan="5"></td></tr>' : '');

  }

  const userInfo = qualified
    ? '<div style="text-align:center;margin-bottom:16px;color:var(--gold);font-size:0.9rem;">You finished #' + seed + ' in the West — qualified for playoffs!</div>'
    : '<div style="text-align:center;margin-bottom:16px;color:var(--mls-red);font-size:0.9rem;">You finished #' + seed + ' in the West — missed the playoffs.</div>';

  app.innerHTML = `
    <div class="page-title"><h1>34-0</h1></div>
    <p class="subtitle">Final Standings</p>
    ${userInfo}
    <div class="standings-wrap">
      ${tableHtml(west, 'Western Conference')}
      ${tableHtml(east, 'Eastern Conference')}

    <div style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      ${qualified ? '<button class="btn btn-primary" onclick="enterPlayoffs()">Enter Playoffs</button>' : ''}
      <button class="btn btn-secondary" onclick="restart()">Try Again</button>
    </div>
  `;
}

      <div class="gp-num">${roundLabel}${seriesTotal}</div>
      <div class="gp-matchup">#${seed} ${state.squadRating} vs ${seedDisplay} ${opp.team.abbr} (${oppRating})</div>

      <div class="gp-win-prob">Win probability: <strong>${(winProb * 100).toFixed(0)}%</strong></div>

        <span>Round: <strong>${roundLabel}</strong></span>

// ========== SHARE IMAGE ==========
function downloadShareImage() {
  const W = 600, H = 850;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawPitch(px, py, pw, ph) {
    ctx.fillStyle = '#0e1a30';
    roundRect(px, py, pw, ph, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    roundRect(px, py, pw, ph, 4); ctx.stroke();

    const cx = px + pw / 2, cy = py + ph / 2;
    ctx.beginPath(); ctx.moveTo(px, cy); ctx.lineTo(px + pw, cy); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();

    const paW = pw * 0.6, paH = ph * 0.2;
    roundRect(px + (pw - paW) / 2, py, paW, paH, 2); ctx.stroke();
    roundRect(px + (pw - paW) / 2, py + ph - paH, paW, paH, 2); ctx.stroke();

    const gW = pw * 0.18, gH = 8;
    roundRect(px + (pw - gW) / 2, py - gH, gW, gH, 2); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill(); ctx.stroke();
    roundRect(px + (pw - gW) / 2, py + ph, gW, gH, 2); ctx.fill(); ctx.stroke();
  }

  function drawCard(cx, cy, cw, ch, slot, st) {
    const x = cx - cw / 2, y = cy - ch / 2;
    const pos = slot.pos;
    const colors = { G: '#E2231A', D: '#1C3570', M: '#c0c0c0', F: '#E2231A' };
    const col = colors[pos] || '#888';
    const name = (slot.player.fullName || '').split(' ').pop().substring(0, 12);
    const rat = slot.player.rating;

    roundRect(x, y, cw, ch, 6);
    ctx.fillStyle = '#111827'; ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 1.5;
    roundRect(x, y, cw, ch, 6); ctx.stroke();

    roundRect(x + 2, y + 5, 3, ch - 10, 1.5);
    ctx.fillStyle = col; ctx.fill();

    ctx.fillStyle = col;
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(POS_LABELS[pos], x + 10, y + 6);

    const rcX = x + cw - 16, rcY = y + 10, rcR = 11;
    ctx.beginPath(); ctx.arc(rcX, rcY, rcR, 0, Math.PI * 2);
    ctx.fillStyle = '#f6c945'; ctx.fill();
    ctx.fillStyle = '#080e1a';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(rat, rcX, rcY);

    ctx.fillStyle = '#ecfdf5';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(name, cx, y + 23);

    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    if (pos === 'G') {
      ctx.fillStyle = '#E2231A';
      ctx.fillText('CS:' + st.cleanSheets + '  M:' + st.motm, cx, y + 48);
    } else {
      ctx.fillStyle = '#f6c945';
      ctx.fillText('G:' + st.goals + '  A:' + st.assists, cx, y + 48);
    }
  }

  // Background
  ctx.fillStyle = '#080e1a';
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = '#E2231A';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('34-0', 30, 16);

  const recordStr = state.record.w + 'W-' + state.record.d + 'D-' + state.record.l + 'L';
  ctx.fillStyle = '#ecfdf5';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(recordStr, W - 30, 20);

  const perfect = isPerfect();
  const champion = state.wonPlayoffs;
  let verdict;
  if (champion && perfect) verdict = 'PERFECT SEASON & MLS CUP CHAMPIONS!';
  else if (champion) verdict = 'MLS CUP CHAMPIONS!';
  else if (perfect) verdict = 'PERFECT SEASON! 34-0-0!';
  else verdict = state.record.w >= 20 ? 'A strong season!' : state.record.w >= 10 ? 'A respectable campaign.' : 'Tough season.';
  ctx.fillStyle = (perfect || champion) ? '#f6c945' : 'rgba(236,253,245,0.6)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(verdict, W / 2, 52);

  const infoLine = state.formation.label + ' \u00b7 ' + state.squadRating + ' avg';
  ctx.fillStyle = 'rgba(236,253,245,0.35)';
  ctx.font = '11px sans-serif';
  ctx.fillText(infoLine, W / 2, 68);

  // Pitch
  const pX = 50, pY = 96, pW = 500, pH = 460;
  drawPitch(pX, pY, pW, pH);

  // Player cards
  const rows = [
    { pos: 'F', pct: 0.14 },
    { pos: 'M', pct: 0.36 },
    { pos: 'D', pct: 0.60 },
    { pos: 'G', pct: 0.84 },
  ];
  for (const r of rows) {
    const slots = state.slots.filter(s => s.pos === r.pos);
    if (!slots.length) continue;
    const cW = Math.min(155, Math.floor((pW - 16) / slots.length - 6));
    const cH = 74;
    const totalW = slots.length * cW + (slots.length - 1) * 6;
    const startX = pX + (pW - totalW) / 2 + cW / 2;
    const cY = pY + pH * r.pct;
    for (let i = 0; i < slots.length; i++) {
      const st = state.playerStats[slots[i].player.id] || { goals: 0, assists: 0, cleanSheets: 0, motm: 0 };
      drawCard(startX + i * (cW + 6), cY, cW, cH, slots[i], st);
    }
  }

  // Leaders
  const ps = state.playerStats;
  const topScorer = Object.values(ps).sort(function(a, b) { return b.goals - a.goals; })[0];
  const topAssist = Object.values(ps).sort(function(a, b) { return b.assists - a.assists; })[0];
  const topCS = Object.values(ps).sort(function(a, b) { return b.cleanSheets - a.cleanSheets; })[0];
  const topMotm = Object.values(ps).sort(function(a, b) { return b.motm - a.motm; })[0];

  ctx.fillStyle = 'rgba(28,53,112,0.4)';
  ctx.fillRect(30, 590, W - 60, 1);
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  var leaders = [];
  if (topScorer) leaders.push('Goals: ' + topScorer.name + ' (' + topScorer.goals + ')');
  if (topAssist) leaders.push('Assists: ' + topAssist.name + ' (' + topAssist.assists + ')');
  if (topCS) leaders.push('CS: ' + topCS.name + ' (' + topCS.cleanSheets + ')');
  if (topMotm) leaders.push('MOTM: ' + topMotm.name + ' (' + topMotm.motm + ')');
  ctx.fillStyle = 'rgba(236,253,245,0.6)';
  ctx.fillText(leaders.join('  \u00b7  '), W / 2, 600);

  // Playoff result
  if (state.wonPlayoffs) {
    ctx.fillStyle = '#f6c945';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('MLS CUP CHAMPIONS', W / 2, 635);
  } else if (state.playoffRecord.w > 0 || state.playoffRecord.l > 0) {
    const playoffRec = state.playoffRecord.w + 'W-' + state.playoffRecord.l + 'L';
    const lastRound = state.playoffLog.filter(function(r) { return r.round !== 'Eliminated'; }).pop();
    ctx.fillStyle = 'rgba(236,253,245,0.6)';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Playoffs: ' + playoffRec + '  |  ' + (lastRound ? lastRound.round : ''), W / 2, 635);
  }

  // Footer
  ctx.fillStyle = 'rgba(236,253,245,0.35)';
  ctx.font = '10px sans-serif';
  ctx.fillText('stljakeh.github.io/Sports/34-0.html', W / 2, 830);

  // Show in modal
  var dataUrl = canvas.toDataURL('image/png');
  var modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-box" style="max-width:660px;padding:20px;">
      <img src="` + dataUrl + `" style="width:100%;border-radius:8px;display:block;" alt="34-0 Result">
      <div style="text-align:center;margin-top:12px;color:var(--text-secondary);font-size:0.75rem;">
        Press and hold on iOS to save · <a download="34-0-result.png" href="` + dataUrl + `" style="color:var(--mls-red);text-decoration:none;font-weight:600;">Download</a>
      </div>
    </div>
  `;
  modal.classList.add('active');
}

// ========== INIT ==========
render();
</script>
</body>
</html>
