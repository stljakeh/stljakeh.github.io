<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Louis Sports Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/nav.css">
</head>
<body>

<nav>
  <button class="hamburger" onclick="this.nextElementSibling.classList.toggle('open')">&#9776;</button>
  <div class="nav-links">
    <a class="current" href="dashboard.html">Dashboard</a>
    <a href="news.html">News</a>
    <a href="standings.html">Standings</a>
    <a href="stats.html">Stats</a>
    <a href="xi-builder.html">XI Builder</a>
  </div>
  <div class="site-label">St. Louis Sports</div>
</nav>

<header>
  <div class="header-top">
    <h1>St. Louis Sports</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="STL.dashboard.refresh()">
      <span class="spinner hidden" id="spinner"></span>
      <span id="btnLabel">Refresh</span>
    </button>
  </div>
  <div class="header-meta">
    <span id="liveDate"></span>
    <span class="dot">&middot;</span>
    <span class="update-time" id="updateTime">auto-updates every 60s</span>
  </div>
</header>

<div class="grid" id="cardGrid"></div>

<div class="footer">Data from ESPN, ASA &amp; StatsCrew &middot; <a href="#" onclick="STL.dashboard.refresh();return false">refresh now</a></div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/toggle.js"></script>
<script src="js/render.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script>STL.dashboard.init();</script>
</body>
</html>
