<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Louis Sports Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 900px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header-meta {
    font-size: 0.85rem;
    color: #888;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-meta .dot { color: #444; }
  .refresh-btn {
    background: none;
    border: 1px solid #444;
    color: #aaa;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 1px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .refresh-btn:hover { border-color: #888; color: #fff; background: #222; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .refresh-btn .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid #666;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 4px;
    vertical-align: middle;
  }
  .refresh-btn .spinner.hidden { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .update-time { font-size: 0.75rem; color: #555; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 16px; }
    header h1 { font-size: 1.5rem; letter-spacing: 2px; }
  }
  .card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #444; }
  .card-head {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .card-head::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20px;
    right: 20px;
    height: 3px;
    border-radius: 0 0 2px 2px;
  }
  .cardinals .card-head::after { background: #C41E3A; }
  .blues .card-head::after { background: #003087; }
  .city-sc .card-head::after { background: #E80A4D; }
  .battlehawks .card-head::after { background: #00529B; }
  .team-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .team-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.7rem;
    letter-spacing: 1px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .team-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .cardinals .team-icon { background: #fff; color: #C41E3A; }
  .blues .team-icon { background: #003087; color: #FCB514; }
  .city-sc .team-icon { background: #E80A4D; color: #fff; }
  .battlehawks .team-icon { background: #fff; color: #00529B; }
  .team-name { font-weight: 700; font-size: 1.1rem; }
  .team-league { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-active { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; }
  .status-break { background: #3a2a0a; color: #ff9800; border: 1px solid #5a4010; }
  .status-offseason { background: #2a1a3a; color: #9c27b0; border: 1px solid #4a2a5a; }
  .status-playoffs { background: #1a2a3a; color: #2196f3; border: 1px solid #2a4a6a; }
  .status-live { background: #3a1a1a; color: #f44336; border: 1px solid #5a2a2a; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .card-body { padding: 16px 20px 20px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.85rem;
    border-bottom: 1px solid #252525;
  }
  .stat-row:last-of-type { border-bottom: none; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 600; text-align: right; }
  .stat-value.win { color: #4caf50; }
  .stat-value.loss { color: #f44336; }
  .links {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #252525;
  }
  .links a {
    color: #888;
    text-decoration: none;
    font-size: 0.75rem;
    transition: color 0.2s;
    letter-spacing: 0.5px;
  }
  .links a:hover { color: #fff; }
  .next-game {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.5;
  }
  .cardinals .next-game { background: rgba(196, 30, 58, 0.1); border-left: 3px solid #C41E3A; }
  .blues .next-game { background: rgba(0, 48, 135, 0.1); border-left: 3px solid #003087; }
  .city-sc .next-game { background: rgba(232, 10, 77, 0.1); border-left: 3px solid #E80A4D; }
  .battlehawks .next-game { background: rgba(0, 82, 155, 0.1); border-left: 3px solid #00529B; }
  .next-game-label { color: #888; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
  .next-game-detail { font-weight: 600; }
  .countdown-timer { font-size: 0.78rem; color: #4caf50; font-weight: 600; margin-top: 3px; }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
  .footer {
    margin-top: 32px;
    font-size: 0.75rem;
    color: #444;
    text-align: center;
    letter-spacing: 1px;
  }
  .footer a { color: #555; }
  .error-msg {
    color: #f44336;
    font-size: 0.7rem;
    text-align: center;
    padding: 4px;
  }
  .empty-msg {
    color: #666;
    font-size: 0.8rem;
    text-align: center;
    padding: 12px;
  }


  .lineup-toggle {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    padding: 6px 0 2px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    font-family: inherit;
  }
  .lineup-toggle:hover { color: #ddd; }
  .lineup-toggle-icon {
    display: inline-block;
    font-size: 0.6rem;
    transition: transform 0.2s;
  }
  .lineup-toggle.open .lineup-toggle-icon { transform: rotate(90deg); }
  .lineup-panel {
    display: none;
    margin-top: 6px;
    padding: 8px 10px;
    background: #141414;
    border-radius: 6px;
    border: 1px solid #2a2a2a;
    font-size: 0.78rem;
    line-height: 1.7;
  }
  .lineup-panel.open { display: block; }
  .lineup-row { display: flex; gap: 8px; align-items: baseline; }
  .lineup-row .order { color: #555; min-width: 18px; text-align: right; }
  .lineup-row .pos { color: #777; min-width: 28px; font-weight: 600; }
  .lineup-row .name { color: #ddd; }
  .lineup-header { color: #666; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .sp-label { color: #888; font-size: 0.72rem; margin-top: 4px; padding-top: 4px; border-top: 1px solid #252525; }
  .leaders-toggle {
    background: none; border: none; color: #888; cursor: pointer;
    font-size: 0.75rem; letter-spacing: 0.5px; padding: 6px 0 2px;
    display: flex; align-items: center; gap: 4px;
    transition: color 0.2s; font-family: inherit;
  }
  .leaders-toggle:hover { color: #ddd; }
  .leaders-toggle-icon {
    display: inline-block; font-size: 0.6rem; transition: transform 0.2s;
  }
  .leaders-toggle.open .leaders-toggle-icon { transform: rotate(90deg); }
  .leaders-panel {
    display: none; margin-top: 6px; padding: 8px 10px;
    background: #141414; border-radius: 6px;
    border: 1px solid #2a2a2a; font-size: 0.78rem; line-height: 1.6;
  }
  .leaders-panel.open { display: block; }
  .leader-cat {
    color: #999; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; margin: 6px 0 2px; font-weight: 600;
  }
  .leader-cat:first-of-type { margin-top: 0; }
  .leader-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
  .leader-name { color: #ddd; }
  .leader-val { color: #e0e0e0; font-weight: 600; font-variant-numeric: tabular-nums; }
  .leader-note { color: #666; font-size: 0.7rem; margin-top: 4px; }
  .live-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; margin: 8px 0;
    background: #0d1a0d; border-radius: 8px;
    border: 1px solid #2a4a2a;
  }
  .live-badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #4caf50;
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .live-badge::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #4caf50;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .live-score {
    font-size: 1.3rem; font-weight: 800; letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }
  .live-info {
    font-size: 0.75rem; color: #888; margin-left: auto;
    text-align: right; line-height: 1.4;
  }
</style>
</head>
<body>

<nav style="width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:12px 16px;background:#1a1a1a;border-radius:10px;border:1px solid #2a2a2a;">
  <div style="display:flex;gap:20px;align-items:center;">
    <span style="color:#e0e0e0;font-weight:700;font-size:0.85rem;letter-spacing:1px;text-transform:uppercase;">Dashboard</span>
    <a href="bh-attendance.html" style="color:#888;text-decoration:none;font-size:0.85rem;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;">Attendance</a>
    <a href="34-0.html" style="color:#888;text-decoration:none;font-size:0.85rem;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;">34-0 Game</a>
  </div>
  <div style="font-size:0.7rem;color:#444;letter-spacing:1px;text-transform:uppercase;">St. Louis Sports</div>
</nav>

<header>
  <div class="header-top">
    <h1>St. Louis Sports</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">
      <span class="spinner hidden" id="spinner"></span>
      <span id="btnLabel">Refresh</span>
    </button>
  </div>
  <div class="header-meta">
    <span id="liveDate"></span>
    <span class="dot">&middot;</span>
    <span class="update-time" id="updateTime">auto-updates every 60s</span>
  </div>
</header>

<div class="grid" id="cardGrid"></div>

<div class="footer">Data from ESPN &middot; <a href="#" onclick="refresh();return false">refresh now</a></div>

<script>
const TEAMS = [
  {
    id: '24',
    name: 'Cardinals',
    league: 'MLB',
    leagueFull: 'National League Central',
    sport: 'baseball',
    leagueSlug: 'mlb',
    cardClass: 'cardinals',
    icon: 'STL',
    links: [
      { text: 'Official Site', href: 'https://www.mlb.com/cardinals' },
      { text: 'Schedule', href: 'https://www.mlb.com/cardinals/schedule' },
      { text: 'Tickets', href: 'https://www.mlb.com/cardinals/tickets' },
    ]
  },
  {
    id: '19',
    name: 'Blues',
    league: 'NHL',
    leagueFull: 'Central Division',
    sport: 'hockey',
    leagueSlug: 'nhl',
    cardClass: 'blues',
    icon: 'STL',
    links: [
      { text: 'Official Site', href: 'https://www.nhl.com/blues' },
      { text: 'Schedule', href: 'https://www.nhl.com/blues/schedule' },
      { text: 'Tickets', href: 'https://www.nhl.com/blues/tickets' },
    ]
  },
  {
    id: '21812',
    name: 'CITY SC',
    league: 'MLS',
    leagueFull: 'Western Conference',
    sport: 'soccer',
    leagueSlug: 'usa.1',
    cardClass: 'city-sc',
    icon: 'CITY',
    links: [
      { text: 'Official Site', href: 'https://www.stlcitysc.com' },
      { text: 'Schedule', href: 'https://www.stlcitysc.com/schedule' },
      { text: 'Tickets', href: 'https://www.stlcitysc.com/tickets' },
      { text: 'Datavizer', href: 'https://www.soccerdatavizer.com' },
    ]
  },
  {
    id: '112651',
    name: 'BattleHawks',
    league: 'UFL',
    leagueFull: 'UFL',
    sport: 'football',
    leagueSlug: 'ufl',
    cardClass: 'battlehawks',
    icon: 'STL',
    standingOverride: '2nd in UFL',
    links: [
      { text: 'Official Site', href: 'https://www.theufl.com/teams/st-louis' },
      { text: 'Schedule', href: 'https://www.theufl.com/teams/st-louis/schedule' },
      { text: 'Tickets', href: 'https://www.theufl.com/teams/st-louis/tickets' },
    ]
  }
];

let refreshTimer = null;
let isRefreshing = false;
window._lineupOpen = {};

function init() {
  const d = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('liveDate').textContent = d.toLocaleDateString('en-US', opts);
  buildCards();
  refresh();
  refreshTimer = setInterval(refresh, 60000);
}

function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  TEAMS.forEach(t => {
    const card = document.createElement('div');
    card.className = `card ${t.cardClass}`;
    card.id = `card-${t.cardClass}`;
    card.innerHTML = `
      <div class="card-head">
        <div class="team-info">
          <div class="team-icon">${t.icon}</div>
          <div>
            <div class="team-name">${t.name}</div>
            <div class="team-league">${t.league}${t.leagueFull && t.leagueFull !== t.league ? ' &middot; ' + t.leagueFull : ''}</div>
          </div>
        </div>
        <span class="status-badge ${t.statusClass}" id="badge-${t.cardClass}">${t.statusText}</span>
      </div>
      <div class="card-body" id="body-${t.cardClass}">
        <div class="stat-row">
          <span class="stat-label">Record</span>
          <span class="stat-value" id="record-${t.cardClass}">—</span>
        </div>
        <div class="stat-row" id="pointsRow-${t.cardClass}" style="display:none">
          <span class="stat-label">Points</span>
          <span class="stat-value" id="points-${t.cardClass}"></span>
        </div>
        <div class="stat-row" id="standingRow-${t.cardClass}" style="display:none">
          <span class="stat-label">Standing</span>
          <span class="stat-value" id="standing-${t.cardClass}"></span>
        </div>
        <div class="stat-row" id="streakRow-${t.cardClass}" style="display:none">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak-${t.cardClass}"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Last Game</span>
          <span class="stat-value" id="lastGame-${t.cardClass}">—</span>
        </div>
        <div id="nextGame-${t.cardClass}"></div>
        <div class="countdown-timer" id="countdown-${t.cardClass}" data-target="" style="display:none"></div>
        <div class="live-banner" id="liveBanner-${t.cardClass}" style="display:none">
          <span class="live-badge">LIVE</span>
          <span class="live-score" id="liveScore-${t.cardClass}"></span>
          <div class="live-info" id="liveInfo-${t.cardClass}"></div>
        </div>
        <div id="leadersContainer-${t.cardClass}" style="display:none">
          <button class="leaders-toggle" onclick="toggleLeaders(this,'${t.cardClass}')">
            <span class="leaders-toggle-icon">&#9654;</span> Stat Leaders
          </button>
          <div class="leaders-panel" id="leadersPanel-${t.cardClass}"></div>
        </div>
        <div class="links" id="links-${t.cardClass}"></div>
      </div>
    `;
    grid.appendChild(card);
  });
}

async function refresh() {
  if (isRefreshing) return;
  isRefreshing = true;
  TEAMS.forEach(t => { t._liveEvent = null; t._liveScoreData = null; t._liveStatus = null; t._lineupData = null; });
  const btn = document.getElementById('refreshBtn');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('btnLabel');
  btn.disabled = true;
  spinner.classList.remove('hidden');
  label.textContent = 'Updating';

  window._mlsOverall = {};
  await enrichLiveScores();
  await Promise.all([...TEAMS.map(t => fetchTeam(t)), fetchMlsStandings()]);
  adjustRefreshInterval();
  startCountdownTimer();

  const now = new Date();
  const ts = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('updateTime').textContent = `last updated ${ts}`;

  btn.disabled = false;
  spinner.classList.add('hidden');
  label.textContent = 'Refresh';
  isRefreshing = false;
}

async function fetchTeam(team) {
  const baseUrl = `https://site.api.espn.com/apis/site/v2/sports/${team.sport}/${team.leagueSlug}/teams/${team.id}`;
  let data;
  try {
    const resp = await fetch(baseUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
  } catch (e) {
    renderError(team, `Failed to load: ${e.message}`);
    return;
  }

  let lastEvent = null;
  let nextEvent = null;
  try {
    const schedResp = await fetch(`${baseUrl}/schedule`);
    if (schedResp.ok) {
      const schedData = await schedResp.json();
      const events = schedData.events || [];
      let lastDate = null, nextDate = null;
      for (const e of events) {
        const st = e.competitions?.[0]?.status?.type;
        const d = new Date(e.date);
        if (!isFinite(d)) continue;
        if (st && (st.completed === true || st.state === 'post')) {
          if (!lastDate || d > lastDate) { lastDate = d; lastEvent = e; }
        } else if (st && (st.completed === false || st.state === 'pre' || st.state === 'in' || st.name === 'STATUS_SCHEDULED' || st.name === 'STATUS_PREVIEW')) {
          if (!nextDate || d < nextDate) { nextDate = d; nextEvent = e; }
        }
      }
    }
  } catch (e) {
    // non-fatal — fall back to team endpoint
  }

  if (nextEvent && !team._liveScoreData) {
    const nexSt = nextEvent.competitions?.[0]?.status?.type;
    if (nexSt?.state === 'in') {
      try {
        const gResp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${team.sport}/${team.leagueSlug}/summary?event=${nextEvent.id}`);
        if (gResp.ok) {
          const gData = await gResp.json();
          const gComps = gData.header?.competitions?.[0]?.competitors;
          if (gComps) {
            team._liveScoreData = gComps;
            team._liveStatus = gData.header?.competitions?.[0]?.status;
          }
        }
      } catch (e) { /* non-fatal */ }
    }
  }

  if (nextEvent) {
    fetchWinProb(team, nextEvent).then(() => renderTeam(team, data, lastEvent, nextEvent));
  }
  fetchStatLeaders(team, data).then(() => renderTeam(team, data, lastEvent, nextEvent));
}

async function fetchMlsStandings() {
  try {
    const resp = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/standings');
    if (!resp.ok) return;
    const data = await resp.json();
    const entries = data?.standings?.entries;
    if (!entries) return;
    for (const entry of entries) {
      const tid = entry.team?.id;
      if (!tid) continue;
      const rankStat = entry.stats?.find(s => s.name === 'rank');
      if (rankStat && rankStat.value != null) {
        const r = Math.round(rankStat.value);
        window._mlsOverall[tid] = r + suffix(r);
      }
    }
  } catch (e) { /* non-fatal */ }
}
function suffix(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function isGameDay(event) {
  if (!event || !event.date) return false;
  const d = new Date(event.date);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth() &&
         d.getDate() === now.getDate();
}

async function fetchLineup(team, event) {
  if (!event || !isGameDay(event)) return;
  const comp = event.competitions?.[0];
  if (!comp) return;
  const eventId = event.id;
  try {
    const resp = await fetch(
      `https://site.api.espn.com/apis/site/v2/sports/${team.sport}/${team.leagueSlug}/summary?event=${eventId}`
    );
    if (!resp.ok) return;
    const data = await resp.json();

    if (team.sport === 'baseball') {
      const players = data.boxscore?.players;
      if (!players) return;
      const teamIdx = players.findIndex(p => String(p.team?.id) === String(team.id));
      if (teamIdx === -1) return;
      const batting = players[teamIdx]?.statistics?.find(s => s.type === 'batting');
      if (!batting?.athletes) return;
      const batters = batting.athletes
        .filter(a => a.starter === true && a.batOrder > 0)
        .sort((a, b) => a.batOrder - b.batOrder)
        .map(a => ({
          batOrder: a.batOrder,
          position: a.position?.abbreviation || '',
          name: a.athlete?.displayName || ''
        }));
      const pitching = players[teamIdx]?.statistics?.find(s => s.type === 'pitching');
      let sp = null;
      if (pitching?.athletes) {
        const spData = pitching.athletes.find(a => a.starter === true);
        if (spData) {
          sp = {
            name: spData.athlete?.displayName || '',
            throws: spData.athlete?.throws || ''
          };
        }
      }
      if (batters.length) {
        team._lineupData = { sport: 'baseball', batters, startingPitcher: sp };
      }
    } else if (team.sport === 'soccer') {
      const rosters = data.rosters;
      if (!rosters) return;
      const teamRoster = rosters.find(r => String(r.team?.id) === String(team.id));
      if (!teamRoster?.roster) return;
      const formation = teamRoster.formation || '';
      const starters = teamRoster.roster
        .filter(p => p.starter === true)
        .sort((a, b) => parseInt(a.formationPlace || 0) - parseInt(b.formationPlace || 0))
        .map(p => ({
          formationPlace: parseInt(p.formationPlace || 0),
          position: p.position?.abbreviation || '',
          name: p.athlete?.displayName || '',
          jersey: p.jersey || ''
        }));
      if (starters.length) {
        team._lineupData = { sport: 'soccer', formation, starters };
      }
    } else if (team.sport === 'hockey') {
      const players = data.boxscore?.players;
      if (!players) return;
      const teamIdx = players.findIndex(p => String(p.team?.id) === String(team.id));
      if (teamIdx === -1) return;
      const stats = players[teamIdx]?.statistics;
      if (!stats) return;
      const forwards = stats.find(s => s.name === 'forwards')?.athletes
        ?.filter(a => a.athlete?.scratched === false)
        ?.map(a => ({
          name: a.athlete?.displayName || '',
          position: a.athlete?.position?.abbreviation || ''
        })) || [];
      const defensemen = stats.find(s => s.name === 'defenses')?.athletes
        ?.filter(a => a.athlete?.scratched === false)
        ?.map(a => ({
          name: a.athlete?.displayName || '',
          position: a.athlete?.position?.abbreviation || ''
        })) || [];
      const goalies = stats.find(s => s.name === 'goalies')?.athletes
        ?.filter(a => a.athlete?.scratched === false)
        ?.map(a => ({
          name: a.athlete?.displayName || '',
          position: a.athlete?.position?.abbreviation || ''
        })) || [];
      let startingGoalie = null;
      const teamComp = comp.competitors?.find(c => String(c.team.id) === String(team.id));
      const probs = teamComp?.probables;
      if (probs) {
        const sg = probs.find(p => p.name === 'probableStartingGoalie');
        if (sg) startingGoalie = { name: sg.athlete?.fullName || '' };
      }
      if (forwards.length || defensemen.length || goalies.length) {
        team._lineupData = { sport: 'hockey', forwards, defensemen, goalies, startingGoalie };
      }
    }
  } catch (e) { /* non-fatal */ }
}

async function fetchWinProb(team, event) {
  if (!event) return;
  const comp = event.competitions?.[0];
  if (!comp) return;
  const st = comp.status?.type;
  const eventId = event.id;
  const isLive = st?.state === 'in';

  try {
    if (isLive) {
      const resp = await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/${team.sport}/${team.leagueSlug}/summary?event=${eventId}`
      );
      if (!resp.ok) return;
      const data = await resp.json();
      const wp = data.winprobability;
      if (!wp || !wp.length) return;
      const latest = wp[wp.length - 1];
      const homePct = latest.homeWinPercentage;
      const tiePct = latest.tiePercentage || 0;
      const isHome = comp.competitors?.find(c => String(c.team.id) === String(team.id))?.homeAway === 'home';
      let winPct = isHome ? homePct : (1 - homePct - tiePct);
      team._winProb = Math.max(0, Math.round(winPct * 1000) / 10);
      team._winProbLive = true;
    } else {
      const d = new Date(event.date);
      const dateStr = d.toISOString().slice(0, 10).replace(/-/g, '');
      const resp = await fetch(
        `https://site.api.espn.com/apis/site/v2/sports/${team.sport}/${team.leagueSlug}/scoreboard?dates=${dateStr}&includeOdds=true`
      );
      if (!resp.ok) return;
      const data = await resp.json();
      const ev = data.events?.find(e => e.id === eventId);
      if (!ev) return;
      const odds = ev.competitions?.[0]?.odds?.[0];
      if (!odds) return;
      const isHome = ev.competitions[0].competitors?.find(c => String(c.team.id) === String(team.id))?.homeAway === 'home';
      const ml = isHome ? odds.moneyline?.home?.close?.odds : odds.moneyline?.away?.close?.odds;
      if (!ml) return;
      const num = parseInt(ml);
      let winPct;
      if (num < 0) {
        winPct = Math.abs(num) / (Math.abs(num) + 100);
      } else {
        winPct = 100 / (num + 100);
      }
      team._winProb = Math.round(winPct * 1000) / 10;
      team._winProbLive = false;
    }
  } catch (e) { /* non-fatal */ }
}

function getScoreDisplay(competitor) {
  if (!competitor || competitor.score == null) return '0';
  if (typeof competitor.score === 'string') return competitor.score;
  if (competitor.score.displayValue != null) return competitor.score.displayValue;
  return String(competitor.score.value ?? '0');
}

async function enrichLiveScores() {
  const sports = new Set(TEAMS.map(t => `${t.sport}/${t.leagueSlug}`));
  if (sports.size === 0) return;
  const now = new Date();
  const dates = [];
  for (let i = -1; i <= 1; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().slice(0, 10).replace(/-/g, ''));
  }
  const datesParam = dates.join('-');
  await Promise.all([...sports].map(async key => {
    try {
      const resp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${key}/scoreboard?dates=${datesParam}`);
      if (!resp.ok) return;
      const data = await resp.json();
      for (const ev of (data.events || [])) {
        const comps = ev.competitions?.[0]?.competitors;
        if (!comps) continue;
        const status = ev.competitions[0].status;
        for (const t of TEAMS) {
          if (`${t.sport}/${t.leagueSlug}` !== key) continue;
          const isOurs = comps.some(c => String(c.team.id) === String(t.id));
          if (!isOurs) continue;
          if (status?.type?.state === 'in') {
            t._liveEvent = ev;
            t._liveScoreData = comps;
            t._liveStatus = status;
          } else if (t._liveEvent && t._liveEvent.id === ev.id) {
            t._liveScoreData = comps;
            t._liveStatus = status;
          }
        }
      }
    } catch (e) { /* non-fatal */ }
  }));
}

function findStatValue(categories, catName, statName) {
  const cat = categories.find(c => c.name === catName);

  return s ? (s.value ?? 0) : 0;

async function fetchStatLeaders(team, data) {
  if (team.sport === 'soccer') {
    try {
      const resp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/teams/${team.id}/roster?season=2026`);
      if (!resp.ok) return;
      const roster = await resp.json();
      const players = [];
      for (const group of (roster.athletes || [])) {
        for (const item of (group.items || [])) {
          const cats = item.statistics?.splits?.categories;
          if (!cats) continue;
          const apps = findStatValue(cats, 'general', 'appearances');
          if (!apps) continue;
          players.push({
            name: item.shortName || item.displayName,
            goals: findStatValue(cats, 'offensive', 'totalGoals'),
            assists: findStatValue(cats, 'offensive', 'goalAssists')
          });
        }
      }
      const top = (arr, key) => [...arr].sort((a, b) => b[key] - a[key]).filter(p => p[key] > 0).slice(0, 3);
      const cats = [];
      const g = top(players, 'goals');
      if (g.length) cats.push({ cat: 'Goals', items: g.map(p => ({ name: p.name, val: p.goals })) });
      const a = top(players, 'assists');
      if (a.length) cats.push({ cat: 'Assists', items: a.map(p => ({ name: p.name, val: p.assists })) });
      if (cats.length) team._leaders = cats;
    } catch (e) { /* non-fatal */ }
  } else if (team.sport === 'hockey') {
    try {
      const ne = data?.team?.nextEvent?.[0];
      if (!ne) return;
      const comps = ne.competitions?.[0]?.competitors;
      if (!comps) return;
      const us = comps.find(c => String(c.team.id) === String(team.id));
      const leaders = us?.roster?.leaders;
      if (!leaders) return;
      const seen = {};
      for (const group of leaders) {
        for (const entry of (group.leaders || [])) {
          const id = entry.athlete?.id;
          if (!id || seen[id]) continue;
          const cats = entry.statistics?.splits?.categories;
          if (!cats) continue;
          const off = cats.find(c => c.name === 'offensive');
          if (!off) continue;
          const ytdG = off.stats.find(s => s.name === 'ytdGoals');
          const pts = off.stats.find(s => s.name === 'points');
          const ast = off.stats.find(s => s.name === 'assists');
          if (!ytdG || !pts) continue;
          seen[id] = {
            name: entry.athlete.shortName || entry.athlete.displayName,
            goals: ytdG.value ?? 0,
            assists: ast ? (ast.value ?? 0) : 0,
            points: pts.value ?? 0
          };
        }
      }
      const items = Object.values(seen).filter(p => p.goals > 0 || p.points > 0);
      if (!items.length) return;
      const byPts = [...items].sort((a, b) => b.points - a.points).slice(0, 5);
      const byG = [...items].sort((a, b) => b.goals - a.goals).slice(0, 5);
      const cats = [];
      const g2 = byG.filter(p => p.goals > 0);
      if (g2.length) cats.push({ cat: 'Goals', items: g2.map(p => ({ name: p.name, val: p.goals })) });
      cats.push({ cat: 'Points', items: byPts.map(p => ({ name: p.name, val: p.points })) });
      team._leaders = cats;
    } catch (e) { /* non-fatal */ }
  } else if (team.sport === 'baseball') {
    try {
      const resp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/${team.id}/statistics`);
      if (!resp.ok) return;
      const st = await resp.json();
      const cats = st?.results?.stats?.categories;
      if (!cats) return;
      const batting = cats.find(c => c.name === 'batting')?.stats || [];
      const pitching = cats.find(c => c.name === 'pitching')?.stats || [];
      const fv = (arr, name) => { const s = arr.find(x => x.name === name); return s ? s.displayValue : '—'; };
      team._leaders = [
        { cat: 'Batting', items: [
          { name: 'AVG', val: fv(batting, 'avg') },
          { name: 'HR', val: fv(batting, 'homeRuns') },
          { name: 'RBI', val: fv(batting, 'RBIs') },
        ]},
        { cat: 'Pitching', items: [
          { name: 'ERA', val: fv(pitching, 'ERA') },
          { name: 'WHIP', val: fv(pitching, 'WHIP') },
          { name: 'K', val: fv(pitching, 'strikeouts') },
        ]}
      ];
    } catch (e) { /* non-fatal */ }
  }
}

function determineStatus(team, lastGameEvent, upcomingEvent, teamNextEvent) {
  if (!upcomingEvent && !lastGameEvent && !teamNextEvent) {
    return { text: 'Offseason', className: 'status-offseason' };
  }
  if (!upcomingEvent) {
    return { text: 'Offseason', className: 'status-offseason' };
  }
  const st = upcomingEvent.competitions?.[0]?.seasonType;
  if (st && st.name && st.name.toLowerCase().includes('playoff')) {
    return { text: 'Playoffs', className: 'status-playoffs' };
  }
  const daysUntilNext = (new Date(upcomingEvent.date).getTime() - Date.now()) / 86400000;
  if (daysUntilNext > 14) {
    return { text: 'Break', className: 'status-break' };
  }
  return { text: 'Active', className: 'status-active' };
}

function formatDateStr(dateStr, showYear) {
  const d = new Date(dateStr);
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  if (showYear) opts.year = 'numeric';
  return d.toLocaleDateString('en-US', opts);
}

function formatTimeStr(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
}

let countdownTimer = null;

function startCountdownTimer() {
  if (countdownTimer) clearInterval(countdownTimer);
  updateCountdowns();
  countdownTimer = setInterval(updateCountdowns, 1000);
}

function updateCountdowns() {
  const now = Date.now();
  document.querySelectorAll('.countdown-timer').forEach(el => {
    const target = new Date(el.dataset.target).getTime();
    const diff = target - now;
    if (diff <= 0) { el.textContent = ''; el.style.display = 'none'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    let str = d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
    el.textContent = `Starts in ${str}`;
  });
}

async function renderTeam(team, data, schedLastEvent, schedNextEvent) {
  const body = document.getElementById(`body-${team.cardClass}`);
  const badge = document.getElementById(`badge-${team.cardClass}`);
  if (!body) return;

  const t = data.team;
  const iconEl = document.querySelector(`#card-${team.cardClass} .team-icon`);
  if (iconEl && t.logos && t.logos[0]) {
    iconEl.innerHTML = `<img src="${t.logos[0].href}" alt="${t.displayName}">`;
  }
  const record = t.record && t.record.items ? t.record.items[0] : null;
  const statsArr = record ? (record.stats || []) : [];
  let standingSummary = team.standingOverride || t.standingSummary || '';
  standingSummary = standingSummary.replace('NL Cent', 'NL Central');
  if (standingSummary.includes('in MLS')) {
    standingSummary = standingSummary.replace('in MLS', 'in Western Conference');
    if (window._mlsOverall && window._mlsOverall[team.id]) {
      standingSummary += ` | ${window._mlsOverall[team.id]} in MLS`;
    }
  }

  const wins = findStat(statsArr, 'wins') || 0;
  const losses = findStat(statsArr, 'losses') || 0;
  const ties = findStat(statsArr, 'ties') || 0;
  const otLosses = findStat(statsArr, 'otLosses') || 0;
  const pts = findStat(statsArr, 'points');
  const streakVal = findStat(statsArr, 'streak');

  let recordStr;
  if (team.sport === 'hockey') {
    recordStr = `${wins}-${losses}-${otLosses}`;
  } else if (team.sport === 'soccer') {
    recordStr = `${wins}-${losses}-${ties}`;
  } else {
    recordStr = `${wins}-${losses}`;
  }
  const totalDecisions = wins + losses + ties + (team.sport === 'hockey' ? otLosses : 0);
  if (totalDecisions > 0) {
    const winPct = (wins / totalDecisions).toFixed(3).replace(/^0/, '');
    recordStr += ` (${winPct})`;
  }

  const teamNextEvent = t.nextEvent && t.nextEvent[0];
  let lastGameEvent = null;
  let upcomingEvent = null;

  if (schedLastEvent) {
    lastGameEvent = schedLastEvent;
  } else if (teamNextEvent) {
    const st = teamNextEvent.competitions[0].status.type;
    if (st.completed === true || st.state === 'post') {
      lastGameEvent = teamNextEvent;
    }
  }

  if (schedNextEvent) {
    upcomingEvent = schedNextEvent;
  } else if (teamNextEvent) {
    const st = teamNextEvent.competitions[0].status.type;
    if (!(st.completed === true || st.state === 'post')) {
      upcomingEvent = teamNextEvent;
    }
  }

  let streakStr = '', streakClass = '';
  if (streakVal !== null && streakVal !== undefined) {
    const abs = Math.abs(streakVal);
    if (streakVal > 0) { streakStr = `Won ${abs}`; streakClass = 'win'; }
    else if (streakVal < 0) { streakStr = `Lost ${abs}`; streakClass = 'loss'; }
  }
  if (!streakStr && lastGameEvent) {
    const comp = lastGameEvent.competitions?.[0];
    if (comp) {
      const homeAway = comp.competitors?.find(c => String(c.team.id) === String(team.id));
      const opponent = comp.competitors?.find(c => String(c.team.id) !== String(team.id));
      if (homeAway && opponent && (comp.status?.type?.completed === true || comp.status?.type?.state === 'post')) {
        if (homeAway.winner === true) {
          streakStr = 'Won 1';
          streakClass = 'win';
        } else if (opponent.winner === true) {
          streakStr = 'Lost 1';
          streakClass = 'loss';
        } else {
          streakStr = 'Drew 1';
          streakClass = '';
        }
      }
    }
  }

  if (upcomingEvent && isGameDay(upcomingEvent)) {
    await fetchLineup(team, upcomingEvent);
  }

  let lastGameHtml = '';
  let nextGameHtml = '';
  const computedStatus = determineStatus(team, lastGameEvent, upcomingEvent, teamNextEvent);
  let statusText = computedStatus.text;
  let statusClass = computedStatus.className;

  function renderEventComp(ev, isLast) {
    const comp = ev.competitions[0];
    const st = comp.status.type;
    const homeAway = comp.competitors.find(c => String(c.team.id) === String(team.id));
    const opponent = comp.competitors.find(c => String(c.team.id) !== String(team.id));
    if (!homeAway || !opponent) return;
    const isHome = homeAway.homeAway === 'home';
    const vs = isHome ? 'vs' : '@';
    const oppAbbr = opponent.team.abbreviation;

    if (st.completed === true || st.state === 'post') {
      const ourScore = homeAway.score ? homeAway.score.displayValue : '?';
      const oppScore = opponent.score ? opponent.score.displayValue : '?';
      const won = homeAway.winner;
      const resultChar = won ? 'W' : 'L';
      const resultClass = won ? 'win' : 'loss';
      const dateLabel = formatDateStr(comp.date);
      lastGameHtml = `<span class="stat-value ${resultClass}">${resultChar} ${ourScore}-${oppScore} ${vs} ${oppAbbr} &middot; ${dateLabel}</span>`;
    } else if (st.state === 'in') {
      const comps = team._liveScoreData || comp.competitors;
      const ha = comps.find(c => String(c.team.id) === String(team.id));
      const opp = comps.find(c => String(c.team.id) !== String(team.id));
      const ourScore = getScoreDisplay(ha);
      const oppScore = getScoreDisplay(opp);
      team._liveEvent = ev;
      if (isLast) {
        const detail = st.detail ? ` &middot; ${st.detail}` : '';
        lastGameHtml = `<span class="stat-value win">${ourScore}-${oppScore} ${vs} ${oppAbbr}${detail}</span>`;
      } else {
        nextGameHtml = renderNextGameHtml(ev, comp, st, vs, opponent, true);
      }
      statusText = 'Live';
      statusClass = 'status-live';
    } else if (!isLast) {
      nextGameHtml = renderNextGameHtml(ev, comp, st, vs, opponent, false);
    }
  }

  function renderNextGameHtml(ev, comp, st, vs, opponent, isLive) {
    const dateStrFull = formatDateStr(comp.date, true);
    const timeStr = formatTimeStr(comp.date);
    const venue = comp.venue ? comp.venue.fullName : '';
    const broadcasts = comp.broadcasts && comp.broadcasts.length > 0
      ? [...new Set(comp.broadcasts.map(b => b.media ? b.media.shortName : '').filter(Boolean))].join(', ')
      : '';
    const label = isLive ? 'In Progress' : 'Next Game';
    let detailHtml = '';
    if (isLive && st.detail) {
      const dc = comp.status.displayClock;
      const clock = dc && dc !== '0:00' ? ` (${dc})` : '';
      detailHtml = `<div style="color:#888;font-size:0.75rem;margin-top:2px;">${st.detail}${clock}</div>`;
    }
    let winHtml = '';
    if (team._winProb !== undefined) {
      const wp = team._winProb;
      const color = wp > 60 ? '#4caf50' : wp > 40 ? '#ff9800' : '#f44336';
      winHtml = `<div style="font-size:0.75rem;margin-top:3px;color:${isLive ? color : '#aaa'};">${isLive ? 'Live Win' : 'Win'}: ${wp}%</div>`;
    }
    let lineupHtml = '';
    const ld = team._lineupData;
    if (ld) {
      let rows = '';
      if (ld.sport === 'baseball') {
        rows = ld.batters.map(b =>
          `<div class="lineup-row"><span class="order">${b.batOrder}.</span><span class="pos">${b.position}</span><span class="name">${b.name}</span></div>`
        ).join('');
        if (ld.startingPitcher) {
          rows += `<div class="sp-label">SP: ${ld.startingPitcher.name}${ld.startingPitcher.throws ? ' (' + ld.startingPitcher.throws + ')' : ''}</div>`;
        }
      } else if (ld.sport === 'soccer') {
        const formLabel = ld.formation ? ` &middot; ${ld.formation}` : '';
        rows = `<div class="lineup-header">Starting XI${formLabel}</div>`;
        rows += ld.starters.map(s =>
          `<div class="lineup-row"><span class="pos">${s.position}</span><span class="name">${s.name}</span></div>`
        ).join('');
      } else if (ld.sport === 'hockey') {
        rows = `<div class="lineup-header">Lineup</div>`;
        if (ld.forwards.length) {
          rows += `<div class="lineup-row"><span class="pos">F:</span><span class="name">${ld.forwards.map(f => f.name).join(', ')}</span></div>`;
        }
        if (ld.defensemen.length) {
          rows += `<div class="lineup-row"><span class="pos">D:</span><span class="name">${ld.defensemen.map(d => d.name).join(', ')}</span></div>`;
        }
        if (ld.startingGoalie) {
          rows += `<div class="lineup-row"><span class="pos">G:</span><span class="name">${ld.startingGoalie.name}</span></div>`;
        } else if (ld.goalies.length) {
          rows += `<div class="lineup-row"><span class="pos">G:</span><span class="name">${ld.goalies.map(g => g.name).join(', ')}</span></div>`;
        }
      }
      lineupHtml = `
        <button class="lineup-toggle" onclick="toggleLineup(this,'${team.cardClass}')">
          <span class="lineup-toggle-icon">&#9654;</span> Lineup
        </button>
        <div class="lineup-panel">${rows}</div>
      `;
    }
    return `
      <div class="next-game">
        <div class="next-game-label">${label}</div>
        <div class="next-game-detail">${vs} ${opponent.team.displayName} &middot; ${dateStrFull} &middot; ${timeStr}</div>
        ${detailHtml}
        ${venue ? `<div style="color:#888;font-size:0.75rem;margin-top:2px;">${venue}${broadcasts ? ' &middot; ' + broadcasts : ''}</div>` : ''}
        ${winHtml}
        ${lineupHtml}
      </div>
    `;
  }

  if (lastGameEvent) renderEventComp(lastGameEvent, true);
  if (upcomingEvent) renderEventComp(upcomingEvent, false);

  document.getElementById(`record-${team.cardClass}`).textContent = recordStr;

  const pointsRow = document.getElementById(`pointsRow-${team.cardClass}`);
  const pointsEl = document.getElementById(`points-${team.cardClass}`);
  const showPoints = (team.sport === 'hockey' || team.sport === 'soccer') && pts !== null;
  if (showPoints) {
    pointsRow.style.display = '';
    pointsEl.textContent = Math.round(pts);
  } else {
    pointsRow.style.display = 'none';
  }

  const standingRow = document.getElementById(`standingRow-${team.cardClass}`);
  const standingEl = document.getElementById(`standing-${team.cardClass}`);
  if (standingSummary) {
    standingRow.style.display = '';
    standingEl.textContent = standingSummary;
  } else {
    standingRow.style.display = 'none';
  }

  const streakRow = document.getElementById(`streakRow-${team.cardClass}`);
  const streakEl = document.getElementById(`streak-${team.cardClass}`);
  if (streakStr) {
    streakRow.style.display = '';
    streakEl.textContent = streakStr;
    streakEl.className = `stat-value ${streakClass}`;
  } else {
    streakRow.style.display = 'none';
  }

  const lastGameEl = document.getElementById(`lastGame-${team.cardClass}`);
  lastGameEl.innerHTML = lastGameHtml || '<span style="color:#666;">N/A</span>';

  const nextGameEl = document.getElementById(`nextGame-${team.cardClass}`);
  if (nextGameHtml) {
    nextGameEl.innerHTML = nextGameHtml;
    if (team._lineupData && window._lineupOpen[team.cardClass]) {
      const toggle = nextGameEl.querySelector('.lineup-toggle');
      if (toggle) {
        toggle.classList.add('open');
        toggle.nextElementSibling.classList.add('open');
      }
    }
  } else if (lastGameHtml) {
    nextGameEl.innerHTML = '';
  } else {
    nextGameEl.innerHTML = '<div class="empty-msg">No upcoming games scheduled</div>';
  }

  const timerEl = document.getElementById(`countdown-${team.cardClass}`);
  if (timerEl) {
    if (upcomingEvent && !(upcomingEvent.competitions?.[0]?.status?.type?.state === 'in')) {
      timerEl.dataset.target = upcomingEvent.date;
      timerEl.style.display = '';
    } else {
      timerEl.style.display = 'none';
    }
  }

  const linksEl = document.getElementById(`links-${team.cardClass}`);
  linksEl.innerHTML = team.links.map(l => `<a href="${l.href}" target="_blank" rel="noopener">${l.text}</a>`).join('');

  const banner = document.getElementById(`liveBanner-${team.cardClass}`);
  const scoreEl = document.getElementById(`liveScore-${team.cardClass}`);
  const infoEl = document.getElementById(`liveInfo-${team.cardClass}`);
  if (banner && scoreEl && infoEl) {
    const liveState = team._liveStatus?.type?.state || team._liveEvent?.competitions?.[0]?.status?.type?.state;
    if (liveState === 'in') {
      const comps = team._liveScoreData || team._liveEvent.competitions[0].competitors;
      const ha = comps.find(c => String(c.team.id) === String(team.id));
      const opp = comps.find(c => String(c.team.id) !== String(team.id));
      if (ha && opp) {
        banner.style.display = 'flex';
        scoreEl.textContent = `${getScoreDisplay(ha)}-${getScoreDisplay(opp)}`;
        const isHome = ha.homeAway === 'home';
        const st = team._liveStatus || team._liveEvent.competitions[0].status;
        const dc = st.displayClock;
        const clock = dc && dc !== '0:00' ? ` (${dc})` : '';
        infoEl.innerHTML = `${isHome ? 'vs' : '@'} ${opp.team.abbreviation}<br>${st.type?.detail || ''}${clock}`;
      } else {
        banner.style.display = 'none';
      }
    } else {
      banner.style.display = 'none';
    }
  }

  renderStatLeaders(team);

  if (badge) {
    badge.textContent = statusText;
    badge.className = `status-badge ${statusClass}`;
  }
}

init();
</script>
</body>
</html>
